---
layout: default
title: Akèy - Boutique Piyay
---

<!-- 1. 🚀 SEKSYON PWODWI VEDÈT (ANLÈ NÈT) -->
<section id="boosted-section" class="container" style="margin-top: 20px; margin-bottom: 40px;">
    <div class="section-header-modern" style="margin-bottom: 20px;">
        <h2 class="sora" style="font-size: 20px; margin: 0; font-weight: 800;">Pwodwi Vedèt 🔥</h2>
        <div style="width: 40px; height: 3px; background: #ff4747; margin-top: 6px; border-radius: 10px;"></div>
    </div>
    <div id="boosted-grid" class="product-grid-modern">
        <div class="loading-msg">⏳ Chajman pwodwi vedèt...</div>
    </div>
</section>

<!-- 2. SEKSYON GID VIDEYO (RAPÒ 16:9 POU PAYSAGE) -->
<section id="guide-video" class="container" style="margin-bottom: 50px;">
    <div style="max-width: 650px; margin: 0 auto;">
        <div style="width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 45px rgba(0,0,0,0.1); background: #000; position: relative; padding-top: 56.25%;">
            <iframe
                    src="LINK_VIDEYO_OU_A"
                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"
                    allowfullscreen>
            </iframe>
        </div>
        <p style="text-align: center; color: #64748b; font-size: 13px; margin-top: 15px; font-weight: 700;">📺 Kijan Boutique Piyay Mache?</p>
    </div>
</section>

<!-- 3. CATÉGORIES -->
<section id="categories-section" class="container" style="margin-bottom: 60px;">
  <div class="section-header-modern" style="margin-bottom: 25px;">
    <h2 class="sora" style="font-size: 20px; margin: 0; font-weight: 800;">Chwazi pa Kategori</h2>
    <div style="width: 50px; height: 4px; background: #ff4747; margin-top: 8px; border-radius: 10px;"></div>
  </div>

  <div class="category-scroll-wrapper">
    {% for cat in site.categories %}
    <a href="{{ cat.url }}" class="cat-item-bubble">
      <div class="bubble-img">
        <img src="{{ cat.image }}" onerror="this.src='https://ui-avatars.com/api/?name={{ cat.title }}&background=ff4747&color=fff'">
      </div>
      <span>{{ cat.display_name | default: cat.title }}</span>
    </a>
    {% endfor %}
  </div>
</section>

<!-- 4. FLASH SALE SECTION -->
<section id="flash-sale" class="container" style="margin-bottom: 80px;">
    <div class="flash-header-modern" style="margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <div class="flash-title">
            <span class="flash-icon-box" style="font-size: 24px; margin-right: 10px;">⚡</span>
            <h2 style="font-size: 22px; margin: 0; font-weight: 800; display: inline-block;">Vante Flash</h2>
        </div>
        <div id="countdown" class="timer-modern" style="display: flex; align-items: center; gap: 8px;">
            <div class="t-segment" style="background: #0f172a; color: white; padding: 8px 12px; border-radius: 10px; display: flex; align-items: center; gap: 4px;"><span id="hours" style="font-size: 18px; font-weight: 900;">02</span><small style="font-size: 10px; opacity: 0.8;">h</small></div>
            <div class="t-divider" style="font-weight: 900; color: #0f172a;">:</div>
            <div class="t-segment" style="background: #0f172a; color: white; padding: 8px 12px; border-radius: 10px; display: flex; align-items: center; gap: 4px;"><span id="minutes" style="font-size: 18px; font-weight: 900;">30</span><small style="font-size: 10px; opacity: 0.8;">m</small></div>
            <div class="t-divider" style="font-weight: 900; color: #0f172a;">:</div>
            <div class="t-segment" style="background: #0f172a; color: white; padding: 8px 12px; border-radius: 10px; display: flex; align-items: center; gap: 4px;"><span id="seconds" style="font-size: 18px; font-weight: 900;">00</span><small style="font-size: 10px; opacity: 0.8;">s</small></div>
        </div>
    </div>

    <div class="flash-slider-container">
        <div id="flash-slider-inner" class="flash-slider-inner" style="display: flex; gap: 20px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; scroll-behavior: smooth;">
            <!-- Pwodwi via JS -->
        </div>
    </div>
</section>

<!-- 5. MARKETPLACE SECTION -->
<section id="user-market" class="container" style="margin-bottom: 100px; padding-top: 40px; border-top: 1px solid #f1f5f9;">
  <div class="marketplace-card-container">
    <div class="section-header-modern" style="margin-bottom: 35px;">
        <h2 class="sora" style="font-size: 24px; margin: 0; font-weight: 800;">Marketplace 🚀</h2>
        <div style="width: 60px; height: 4px; background: #ff4747; margin-top: 10px; border-radius: 10px;"></div>
    </div>

    <div class="market-nav-tabs" style="display: flex; gap: 20px; margin-bottom: 40px; border-bottom: 2px solid #f1f5f9;">
        <button id="tab-sellers" class="market-tab active" onclick="switchMarketTab('sellers')" style="padding: 15px 30px; font-weight: 800; cursor: pointer; border: none; background: none; font-size: 17px; color: #94a3b8; transition: 0.3s; border-radius: 15px 15px 0 0;">🏪 Machann yo</button>
        <button id="tab-products" class="market-tab" onclick="switchMarketTab('products')" style="padding: 15px 30px; font-weight: 800; cursor: pointer; border: none; background: none; font-size: 17px; color: #94a3b8; transition: 0.3s; border-radius: 15px 15px 0 0;">🛍️ Tout Pwodwi</button>
    </div>

    <div id="sellers-view">
        <div id="sellers-grid-home" class="sellers-grid-modern" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px;">
            <!-- SKELETON LOADERS -->
            <div class="skeleton-card"><div class="skeleton-img skeleton" style="height:100px; border-radius:50%; width:100px; margin:0 auto;"></div><div class="skeleton-title skeleton" style="width:60%; margin:15px auto;"></div><div class="skeleton-btn skeleton"></div></div>
            <div class="skeleton-card"><div class="skeleton-img skeleton" style="height:100px; border-radius:50%; width:100px; margin:0 auto;"></div><div class="skeleton-title skeleton" style="width:60%; margin:15px auto;"></div><div class="skeleton-btn skeleton"></div></div>
        </div>
    </div>

    <div id="products-view" style="display: none;">
        <div id="supabase-products-grid" class="product-grid-modern" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px;">
            <!-- SKELETON LOADERS -->
            <div class="skeleton-card"><div class="skeleton-img skeleton"></div><div class="skeleton-title skeleton"></div><div class="skeleton-price skeleton"></div><div class="skeleton-btn skeleton"></div></div>
            <div class="skeleton-card"><div class="skeleton-img skeleton"></div><div class="skeleton-title skeleton"></div><div class="skeleton-price skeleton"></div><div class="skeleton-btn skeleton"></div></div>
            <div class="skeleton-card"><div class="skeleton-img skeleton"></div><div class="skeleton-title skeleton"></div><div class="skeleton-price skeleton"></div><div class="skeleton-btn skeleton"></div></div>
            <div class="skeleton-card"><div class="skeleton-img skeleton"></div><div class="skeleton-title skeleton"></div><div class="skeleton-price skeleton"></div><div class="skeleton-btn skeleton"></div></div>
        </div>
    </div>
  </div>
</section>

<style>
.category-scroll-wrapper { display: flex; gap: 25px; overflow-x: auto; padding: 15px 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.category-scroll-wrapper::-webkit-scrollbar { display: none; }
.cat-item-bubble { display: flex; flex-direction: column; align-items: center; min-width: 100px; text-decoration: none; transition: 0.3s; }
.bubble-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ff4747; overflow: hidden; background: #f8fafc; margin-bottom: 12px; box-shadow: 0 5px 15px rgba(255, 71, 71, 0.1); }
.bubble-img img { width: 100%; height: 100%; object-fit: cover; }
.cat-item-bubble span { font-size: 13px; font-weight: 700; color: #334155; text-align: center; }

.flash-slider-inner::-webkit-scrollbar { display: none; }
.flash-card-mini { min-width: 180px; max-width: 180px; background: white; border-radius: 25px; padding: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); flex-shrink: 0; border: 1px solid #f1f5f9; position: relative; }
.flash-badge-percent { position: absolute; top: 10px; right: 10px; background: #ff4747; color: white; padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: 900; z-index: 5; box-shadow: 0 4px 10px rgba(255,71,71,0.3); }

.seller-card-home { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; transition: 0.3s; display: flex; flex-direction: column; }
.seller-header-home { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
.seller-logo-home { width: 70px; height: 70px; border-radius: 50%; background: #ff4747; color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 28px; border: 4px solid #fff5f5; flex-shrink: 0; overflow: hidden; }
.seller-logo-home img { width: 100%; height: 100%; object-fit: cover; }
.seller-info-home h4 { margin: 0; font-family: 'Sora', sans-serif; font-size: 20px; color: #0f172a; font-weight: 800; }
.seller-info-home p { margin: 6px 0 0; font-size: 14px; color: #64748b; font-weight: 600; }
.seller-previews-home { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 25px; border-top: 1px dashed #e2e8f0; padding-top: 25px; margin-bottom: 25px; }
.preview-img-home { aspect-ratio: 1; border-radius: 12px; background: #f8fafc; overflow: hidden; border: 1px solid #f1f5f9; }
.preview-img-home img { width: 100%; height: 100%; object-fit: cover; }

.market-tab.active { color: #ff4747 !important; border-bottom: 4px solid #ff4747 !important; background: #fff5f5 !important; }

@media (max-width: 768px) {
    .sellers-grid-modern { grid-template-columns: 1fr !important; }
    .product-grid-modern { grid-template-columns: repeat(2, 1fr) !important; gap: 15px !important; }
    .market-tab { padding: 12px 20px !important; font-size: 15px !important; }
}
</style>

<script>
    const supabaseHome = typeof supabase !== 'undefined' ? supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13") : null;
    let allSellers = [];
    let allProducts = [];

    function startFlashTimers() {
        const hEl = document.getElementById('hours');
        const mEl = document.getElementById('minutes');
        const sEl = document.getElementById('seconds');
        if (!hEl || !mEl || !sEl) return;
        let time = 3600 * 2.5;
        setInterval(() => {
            let h = Math.floor(time / 3600); let m = Math.floor((time % 3600) / 60); let s = time % 60;
            hEl.innerText = h < 10 ? '0' + h : h; mEl.innerText = m < 10 ? '0' + m : m; sEl.innerText = s < 10 ? '0' + s : s;
            if (time > 0) time--; else time = 3600 * 2.5;
        }, 1000);
    }

    async function loadAllData() {
        if (!supabaseHome) return;
        try {
            const { data: prods } = await supabaseHome.from('user_products').select('*, profiles(*)').order('created_at', { ascending: false });
            allProducts = prods || [];
            const { data: sellers } = await supabaseHome.from('profiles').select('*').eq('is_active_seller', true);
            allSellers = sellers || [];

            renderSellers(allSellers);
            renderProducts(allProducts);
            renderFlashSlider(allProducts.filter(p => p.old_price && p.old_price > p.price));

            // CHAJMAN PWODWI VEDÈT (BOOSTED)
            const boosted = allProducts.filter(p => p.is_boosted === true);
            renderBoosted(boosted);

            startFlashTimers();
        } catch (e) { console.error(e); }
    }

    function renderBoosted(list) {
        const section = document.getElementById('boosted-section');
        const grid = document.getElementById('boosted-grid');
        if (!grid) return;

        if (list.length === 0) {
            grid.innerHTML = '<div style="padding:80px 20px; text-align:center; color:#94a3b8; font-size:15px; border:2px dashed #cbd5e1; border-radius:25px; grid-column: 1 / -1; background: #f8fafc;">Pa gen okenn pwodwi vedèt pou kounye a. 🚀</div>';
            return;
        }

        grid.innerHTML = list.map(p => `
            <div style="background:white; padding:20px; border-radius:25px; box-shadow: 0 15px 35px rgba(255, 71, 71, 0.1); border:2px solid #fff1f1; display:flex; flex-direction:column; position:relative;">
                <span style="position:absolute; top:15px; left:15px; background:#ff4747; color:white; padding:5px 12px; border-radius:10px; font-size:10px; font-weight:900; z-index:10; box-shadow:0 5px 15px rgba(255,71,71,0.3);">VEDÈT 🔥</span>
                <a href="/pwodwi-machann.html?id=${p.id}"><img src="${p.image_url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:20px;"></a>
                <h3 style="font-size:15px; margin:15px 0; height:40px; overflow:hidden; font-weight:700; color:#0f172a;">${p.title}</h3>
                <div style="color:#ff4747; font-weight:900; font-size:19px; margin-top:auto;">${p.price} HTG</div>
                <button onclick="orderProduct('${p.title.replace(/'/g, "\\'")}', '${p.price}', '${p.id}', '${p.image_url}')" style="width:100%; background:#0f172a; color:white; border:none; padding:14px; border-radius:15px; margin-top:15px; font-weight:800; cursor:pointer; font-size:13px;">🛒 Ajoute</button>
            </div>`).join('');
    }

    function renderSellers(list) {
        const grid = document.getElementById('sellers-grid-home');
        if (!grid) return;
        grid.innerHTML = list.map(s => {
            const sProds = allProducts.filter(p => p.seller_id === s.id).slice(0, 4);
            let previews = sProds.map(p => `<div class="preview-img-home"><img src="${p.image_url}"></div>`).join('');
            for(let i=sProds.length; i<4; i++) previews += `<div class="preview-img-home" style="display:flex; align-items:center; justify-content:center; color:#ddd; font-size:18px;">📦</div>`;
            return `
                <div class="seller-card-home">
                    <div class="seller-header-home">
                        <div class="seller-logo-home">${s.avatar_url ? `<img src="${s.avatar_url}">` : (s.full_name || "M").charAt(0).toUpperCase()}</div>
                        <div class="seller-info-home"><h4>${s.full_name || "Boutik"}</h4><p>📍 ${s.address || "Ayiti"}</p></div>
                    </div>
                    <div class="seller-previews-home">${previews}</div>
                    <a href="/boutik-machann.html?id=${s.id}" style="display:block; text-align:center; background:#0f172a; color:white; padding:18px; border-radius:15px; text-decoration:none; font-weight:800; font-size:15px; transition: 0.3s;">Vizite Boutik →</a>
                </div>`;
        }).join('');
    }

    function renderProducts(list) {
        const grid = document.getElementById('supabase-products-grid');
        if (!grid) return;
        grid.innerHTML = list.map(p => `
            <div style="background:white; padding:20px; border-radius:25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border:1px solid #f1f5f9; display:flex; flex-direction:column;">
                <a href="/pwodwi-machann.html?id=${p.id}"><img src="${p.image_url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:20px;"></a>
                <h3 style="font-size:15px; margin:15px 0; height:40px; overflow:hidden; font-weight:700; color:#0f172a;">${p.title}</h3>
                <div style="color:#ff4747; font-weight:900; font-size:19px; margin-top:auto;">${p.price} HTG</div>
                <button onclick="orderProduct('${p.title.replace(/'/g, "\\'")}', '${p.price}', '${p.id}', '${p.image_url}')" style="width:100%; background:#f1f5f9; border:none; padding:14px; border-radius:15px; margin-top:15px; font-weight:800; cursor:pointer; font-size:13px;">🛒 Ajoute</button>
            </div>`).join('');
    }

    function renderFlashSlider(flashProds) {
        const slider = document.getElementById('flash-slider-inner');
        if (!slider || flashProds.length === 0) return;
        slider.innerHTML = flashProds.map(p => {
            const discount = Math.round(((p.old_price - p.price) / p.old_price) * 100);
            return `
                <div class="flash-card-mini">
                    <span class="flash-badge-percent">-${discount}%</span>
                    <div style="position:relative; aspect-ratio:1; overflow:hidden; border-radius:15px;"><a href="/pwodwi-machann.html?id=${p.id}"><img src="${p.image_url}" style="width:100%; height:100%; object-fit:cover;"></a></div>
                    <h3 style="font-size:14px; margin:12px 0 5px; font-weight:700; height:35px; overflow:hidden;">${p.title}</h3>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="color:#ff4747; font-weight:900; font-size:16px;">${p.price} HTG</span>
                        <span style="color:#94a3b8; font-size:12px; text-decoration:line-through; font-weight:600;">${p.old_price} HTG</span>
                    </div>
                    <button onclick="orderProduct('${p.title.replace(/'/g, "\\'")}', '${p.price}', '${p.id}', '${p.image_url}')" style="width:100%; background:#0f172a; color:white; border:none; padding:10px; border-radius:10px; margin-top:10px; font-size:12px; font-weight:700; cursor:pointer;">Ajoute 🛒</button>
                </div>`;
        }).join('');
    }

    function switchMarketTab(tab) {
        document.getElementById('tab-sellers').classList.toggle('active', tab === 'sellers');
        document.getElementById('tab-products').classList.toggle('active', tab === 'products');
        document.getElementById('sellers-view').style.display = tab === 'sellers' ? 'block' : 'none';
        document.getElementById('products-view').style.display = tab === 'products' ? 'block' : 'none';
    }

    document.addEventListener('DOMContentLoaded', loadAllData);
</script>
