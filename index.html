---
layout: default
title: Akèy - Boutique Piyay
---

<!-- 1. HERO BANNER (RESTORED) -->
<div class="hero-wrapper-container" style="margin-bottom: 40px;">
  <section id="hero-marketplace" class="main-hero-custom" style="position: relative; width: 100%; max-width: 1200px; margin: 0 auto; border-radius: 25px; overflow: hidden; background: #f8fafc; height: 350px;">
    {% include boutique-piyay-banner.html %}
  </section>
</div>

<!-- 2. CATÉGORIES (BUBBLES) -->
<section id="categories-section" class="container" style="margin-top: 50px; margin-bottom: 50px;">
  <div class="section-header-modern" style="margin-bottom: 25px;">
    <h2 class="sora" style="font-size: 20px; margin: 0; font-weight: 800;">Chwazi pa Kategori</h2>
    <div style="width: 50px; height: 4px; background: #ff4747; margin-top: 8px; border-radius: 10px;"></div>
  </div>

  <div class="category-scroll-wrapper">
    {% for cat in site.categories %}
    <a href="{{ cat.url }}" class="cat-item-bubble">
      <div class="bubble-img">
        <img src="{{ cat.image }}" onerror="this.src='https://ui-avatars.com/api/?name={{ cat.title }}&background=ff4747&color=fff'">
      </div>
      <span>{{ cat.display_name | default: cat.title }}</span>
    </a>
    {% endfor %}
  </div>
</section>

<!-- 3. FLASH SALE SECTION -->
<section id="flash-sale" class="container" style="margin-bottom: 70px;">
    <div class="flash-header-modern" style="margin-bottom: 30px;">
        <div class="flash-title">
            <span class="flash-icon-box" style="font-size: 24px; margin-right: 10px;">⚡</span>
            <h2 style="font-size: 22px; margin: 0; font-weight: 800; display: inline-block;">Vante Flash</h2>
        </div>
        <div id="countdown" class="timer-modern">
            <div class="t-segment"><span id="hours">02</span><small>h</small></div>
            <div class="t-divider">:</div>
            <div class="t-segment"><span id="minutes">30</span><small>m</small></div>
            <div class="t-divider">:</div>
            <div class="t-segment"><span id="seconds">00</span><small>s</small></div>
        </div>
    </div>

    <div class="flash-slider-container">
        <div id="flash-slider-inner" class="flash-slider-inner">
            <!-- Pwodwi via JS -->
        </div>
    </div>
</section>

<!-- 4. MARKETPLACE SECTION -->
<section id="user-market" class="container" style="margin-bottom: 100px; padding-top: 40px; border-top: 1px solid #f1f5f9;">
  <div class="marketplace-card-container">
    <div class="section-header-modern" style="margin-bottom: 35px;">
        <h2 class="sora" style="font-size: 24px; margin: 0; font-weight: 800;">Marketplace 🚀</h2>
        <div style="width: 60px; height: 4px; background: #ff4747; margin-top: 10px; border-radius: 10px;"></div>
    </div>

    <!-- TABS AVÈK ESPAS -->
    <div class="market-nav-tabs" style="display: flex; gap: 20px; margin-bottom: 40px; border-bottom: 2px solid #f1f5f9;">
        <button id="tab-sellers" class="market-tab active" onclick="switchMarketTab('sellers')">🏪 Machann yo</button>
        <button id="tab-products" class="market-tab" onclick="switchMarketTab('products')">🛍️ Tout Pwodwi</button>
    </div>

    <div id="sellers-view">
        <div id="sellers-grid-home" class="sellers-grid-modern">
            <div class="loading-msg">⏳ Chaje machann yo...</div>
        </div>
    </div>

    <div id="products-view" style="display: none;">
        <div id="supabase-products-grid" class="product-grid-modern">
            <div class="loading-msg">⏳ Chaje pwodwi yo...</div>
        </div>
    </div>
  </div>
</section>

<style>
/* CSS KATEGORI */
.category-scroll-wrapper { display: flex; gap: 25px; overflow-x: auto; padding: 15px 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.category-scroll-wrapper::-webkit-scrollbar { display: none; }
.cat-item-bubble { display: flex; flex-direction: column; align-items: center; min-width: 100px; text-decoration: none; transition: 0.3s; }
.bubble-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ff4747; overflow: hidden; background: #f8fafc; margin-bottom: 12px; box-shadow: 0 5px 15px rgba(255, 71, 71, 0.1); }
.bubble-img img { width: 100%; height: 100%; object-fit: cover; }
.cat-item-bubble span { font-size: 13px; font-weight: 700; color: #334155; text-align: center; }

/* CSS TIMER */
.timer-modern { display: flex !important; align-items: center !important; gap: 10px !important; }
.t-segment { background: #0f172a; color: white; padding: 10px 15px; border-radius: 12px; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.t-segment span { font-size: 20px; font-weight: 900; }
.t-segment small { font-size: 12px; opacity: 0.8; font-weight: 700; }
.t-divider { font-weight: 900; color: #0f172a; font-size: 22px; }

/* CSS SELLERS (RESTORED) */
.sellers-grid-modern { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; }
.seller-card-home { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; transition: 0.3s; display: flex; flex-direction: column; }
.seller-header-home { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
.seller-logo-home { width: 70px; height: 70px; border-radius: 50%; background: #ff4747; color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 28px; border: 4px solid #fff5f5; flex-shrink: 0; overflow: hidden; }
.seller-logo-home img { width: 100%; height: 100%; object-fit: cover; }
.seller-info-home h4 { margin: 0; font-family: 'Sora', sans-serif; font-size: 20px; color: #0f172a; font-weight: 800; }
.seller-info-home p { margin: 6px 0 0; font-size: 14px; color: #64748b; font-weight: 600; }
.seller-previews-home { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 25px; border-top: 1px dashed #e2e8f0; padding-top: 25px; margin-bottom: 25px; }
.preview-img-home { aspect-ratio: 1; border-radius: 15px; background: #f8fafc; overflow: hidden; border: 1px solid #f1f5f9; }
.preview-img-home img { width: 100%; height: 100%; object-fit: cover; }

/* FLASH SLIDER & PRODUCTS */
.flash-slider-inner { display: flex; gap: 20px; overflow-x: auto; padding: 15px 5px; scrollbar-width: none; scroll-behavior: smooth; }
.flash-card-mini { min-width: 180px; max-width: 180px; background: white; border-radius: 25px; padding: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); flex-shrink: 0; border: 1px solid #f1f5f9; }
.product-grid-modern { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }

/* TABS STYLE */
.market-tab { padding: 15px 30px; font-weight: 800; cursor: pointer; border: none; background: none; font-size: 17px; color: #94a3b8; transition: 0.3s; border-radius: 15px 15px 0 0; }
.market-tab.active { color: #ff4747; border-bottom: 4px solid #ff4747; background: #fff5f5; }

@media (max-width: 768px) {
    .main-hero-custom { height: 220px !important; border-radius: 15px !important; margin: 0 10px !important; }
    .sellers-grid-modern { grid-template-columns: 1fr; }
    .market-tab { padding: 12px 20px; font-size: 15px; }
}
</style>

<script>
    const supabaseHome = typeof supabase !== 'undefined' ? supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13") : null;
    let allSellers = [];
    let allProducts = [];

    function startFlashTimers() {
        const hEl = document.getElementById('hours');
        const mEl = document.getElementById('minutes');
        const sEl = document.getElementById('seconds');
        if (!hEl || !mEl || !sEl) return;
        let time = 3600 * 2.5;
        setInterval(() => {
            let h = Math.floor(time / 3600); let m = Math.floor((time % 3600) / 60); let s = time % 60;
            hEl.innerText = h < 10 ? '0' + h : h; mEl.innerText = m < 10 ? '0' + m : m; sEl.innerText = s < 10 ? '0' + s : s;
            if (time > 0) time--; else time = 3600 * 2.5;
        }, 1000);
    }

    async function loadAllData() {
        if (!supabaseHome) return;
        try {
            const { data: prods } = await supabaseHome.from('user_products').select('*, profiles(*)').order('created_at', { ascending: false });
            allProducts = prods || [];
            const { data: sellers } = await supabaseHome.from('profiles').select('*').eq('is_active_seller', true);
            allSellers = sellers || [];
            renderSellers(allSellers);
            renderProducts(allProducts);
            renderFlashSlider(allProducts.filter(p => p.is_flash_sale));
            startFlashTimers();
        } catch (e) { console.error(e); }
    }

    function renderSellers(list) {
        const grid = document.getElementById('sellers-grid-home');
        if (!grid) return;
        grid.innerHTML = list.map(s => {
            const sProds = allProducts.filter(p => p.seller_id === s.id).slice(0, 4);
            let previews = sProds.map(p => `<div class="preview-img-home"><img src="${p.image_url}"></div>`).join('');
            for(let i=sProds.length; i<4; i++) previews += `<div class="preview-img-home" style="display:flex; align-items:center; justify-content:center; color:#ddd; font-size:18px;">📦</div>`;
            return `
                <div class="seller-card-home">
                    <div class="seller-header-home">
                        <div class="seller-logo-home">${s.avatar_url ? `<img src="${s.avatar_url}">` : (s.full_name || "M").charAt(0).toUpperCase()}</div>
                        <div class="seller-info-home"><h4>${s.full_name || "Boutik"}</h4><p>📍 ${s.address || "Ayiti"}</p></div>
                    </div>
                    <div class="seller-previews-home">${previews}</div>
                    <a href="/boutik-machann.html?id=${s.id}" style="display:block; text-align:center; background:#0f172a; color:white; padding:18px; border-radius:15px; text-decoration:none; font-weight:800; font-size:15px; transition: 0.3s;">Vizite Boutik →</a>
                </div>`;
        }).join('');
    }

    function renderProducts(list) {
        const grid = document.getElementById('supabase-products-grid');
        if (!grid) return;
        grid.innerHTML = list.map(p => `
            <div style="background:white; padding:20px; border-radius:25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border:1px solid #f1f5f9; display:flex; flex-direction:column;">
                <a href="/pwodwi-machann.html?id=${p.id}"><img src="${p.image_url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:20px;"></a>
                <h3 style="font-size:15px; margin:15px 0; height:40px; overflow:hidden; font-weight:700; color:#0f172a;">${p.title}</h3>
                <div style="color:#ff4747; font-weight:900; font-size:19px; margin-top:auto;">${p.price} HTG</div>
                <button onclick="orderProduct('${p.title.replace(/'/g, "\\'")}', '${p.price}', '${p.id}', '${p.image_url}')" style="width:100%; background:#f1f5f9; border:none; padding:14px; border-radius:15px; margin-top:15px; font-weight:800; cursor:pointer; font-size:13px;">🛒 Ajoute</button>
            </div>
        `).join('');
    }

    function renderFlashSlider(flashProds) {
        const slider = document.getElementById('flash-slider-inner');
        if (!slider || flashProds.length === 0) return;
        slider.innerHTML = flashProds.map(p => `
            <div class="flash-card-mini">
                <div style="position:relative; aspect-ratio:1; overflow:hidden; border-radius:15px;"><a href="/pwodwi-machann.html?id=${p.id}"><img src="${p.image_url}" style="width:100%; height:100%; object-fit:cover;"></a></div>
                <h3 style="font-size:14px; margin:12px 0 5px; font-weight:700; height:35px; overflow:hidden;">${p.title}</h3>
                <div style="color:#ff4747; font-weight:900; font-size:16px;">${p.price} HTG</div>
                <button onclick="orderProduct('${p.title.replace(/'/g, "\\'")}', '${p.price}', '${p.id}', '${p.image_url}')" style="width:100%; background:#0f172a; color:white; border:none; padding:12px; border-radius:10px; margin-top:12px; font-size:12px; font-weight:700; cursor:pointer;">Ajoute 🛒</button>
            </div>
        `).join('');
        setInterval(() => {
            if (slider.scrollLeft + slider.clientWidth >= slider.scrollWidth) slider.scrollTo({ left: 0, behavior: 'smooth' });
            else slider.scrollBy({ left: 200, behavior: 'smooth' });
        }, 4000);
    }

    function switchMarketTab(tab) {
        document.getElementById('tab-sellers').classList.toggle('active', tab === 'sellers');
        document.getElementById('tab-products').classList.toggle('active', tab === 'products');
        document.getElementById('sellers-view').style.display = tab === 'sellers' ? 'block' : 'none';
        document.getElementById('products-view').style.display = tab === 'products' ? 'block' : 'none';
    }

    document.addEventListener('DOMContentLoaded', loadAllData);
</script>
