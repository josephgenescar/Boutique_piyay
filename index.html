---
layout: default
title: Akèy - Boutique Piyay
---

<!-- 1. HERO BANNER -->
<div class="hero-wrapper-container">
  <section id="hero-marketplace" class="main-hero-custom">
    <div class="hero-bg-layer">
      {% include boutique-piyay-banner.html %}
    </div>
  </section>
</div>

<!-- 2. CATÉGORIES (BUBBLES) -->
<section id="categories-section" class="container" style="margin-top: 30px;">
  <div class="section-header-modern" style="margin-bottom: 20px;">
    <h2 class="sora" style="font-size: 18px; margin: 0;">Chwazi pa Kategori</h2>
    <div style="width: 40px; height: 3px; background: #ff4747; margin-top: 5px;"></div>
  </div>

  <div class="category-scroll-wrapper">
    {% for cat in site.categories %}
    <a href="{{ cat.url }}" class="cat-item-bubble">
      <div class="bubble-img">
        <img src="{{ cat.image }}" onerror="this.src='https://ui-avatars.com/api/?name={{ cat.title }}&background=ff4747&color=fff'">
      </div>
      <span>{{ cat.display_name | default: cat.title }}</span>
    </a>
    {% endfor %}
  </div>
</section>

<!-- 3. FLASH SALE SECTION -->
<section id="flash-sale" class="container section-margin">
    <div class="flash-header-modern">
        <div class="flash-title">
            <span class="flash-icon-box">⚡</span>
            <h2 style="font-size: 18px; margin: 0;">Vante Flash</h2>
        </div>
        <div id="countdown" class="timer-modern">
            <div class="t-segment"><span id="hours">02</span><small>h</small></div>
            <div class="t-divider">:</div>
            <div class="t-segment"><span id="minutes">30</span><small>m</small></div>
            <div class="t-divider">:</div>
            <div class="t-segment"><span id="seconds">00</span><small>s</small></div>
        </div>
    </div>

    <div class="flash-slider-container">
        <div id="flash-slider-inner" class="flash-slider-inner">
            <!-- Pwodwi yo ap chaje via JS -->
        </div>
    </div>
</section>

<!-- 4. MARKETPLACE SECTION -->
<section id="user-market" class="container section-margin">
  <div class="marketplace-card-container">
    <div class="section-header-modern">
        <h2 class="sora" style="font-size: 18px; margin: 0;">Marketplace 🚀</h2>
        <div style="width: 40px; height: 3px; background: #ff4747; margin-top: 5px;"></div>
    </div>

    <div class="market-nav-tabs">
        <button id="tab-sellers" class="market-tab active" onclick="switchMarketTab('sellers')">🏪 Machann yo</button>
        <button id="tab-products" class="market-tab" onclick="switchMarketTab('products')">🛍️ Tout Pwodwi</button>
    </div>

    <div id="sellers-view">
        <div id="sellers-grid-home" class="sellers-grid-modern">
            <div class="loading-msg">⏳ Chaje machann yo...</div>
        </div>
    </div>

    <div id="products-view" style="display: none;">
        <div id="supabase-products-grid" class="product-grid-modern">
            <div class="loading-msg">⏳ Chaje pwodwi yo...</div>
        </div>
    </div>
  </div>
</section>

<style>
/* CSS KATEGORI */
.category-scroll-wrapper { display: flex; gap: 15px; overflow-x: auto; padding: 10px 5px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.category-scroll-wrapper::-webkit-scrollbar { display: none; }
.cat-item-bubble { display: flex; flex-direction: column; align-items: center; min-width: 80px; text-decoration: none; }
.bubble-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #ff4747; overflow: hidden; background: #f8fafc; margin-bottom: 8px; }
.bubble-img img { width: 100%; height: 100%; object-fit: cover; }
.cat-item-bubble span { font-size: 11px; font-weight: 700; color: #334155; text-align: center; }

/* CSS TIMER */
.flash-header-modern { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.timer-modern { display: flex !important; align-items: center !important; gap: 5px !important; }
.t-segment { background: #0f172a; color: white; padding: 5px 8px; border-radius: 8px; display: flex; align-items: center; gap: 2px; }
.t-segment span { font-size: 16px; font-weight: 800; }
.t-segment small { font-size: 10px; opacity: 0.8; }
.t-divider { font-weight: 900; color: #0f172a; }

/* CSS SELLERS (RESTORED ORIGINAL DESIGN) */
.sellers-grid-modern { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
.seller-card-home { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; transition: 0.3s; display: flex; flex-direction: column; }
.seller-header-home { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
.seller-logo-home { width: 60px; height: 60px; border-radius: 50%; background: #ff4747; color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 24px; border: 3px solid #fff5f5; flex-shrink: 0; overflow: hidden; }
.seller-logo-home img { width: 100%; height: 100%; object-fit: cover; }
.seller-info-home h4 { margin: 0; font-family: 'Sora', sans-serif; font-size: 17px; color: #0f172a; }
.seller-info-home p { margin: 3px 0 0; font-size: 12px; color: #64748b; }
.seller-previews-home { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; border-top: 1px dashed #eee; padding-top: 15px; }
.preview-img-home { aspect-ratio: 1; border-radius: 10px; background: #f8fafc; overflow: hidden; border: 1px solid #f1f5f9; }
.preview-img-home img { width: 100%; height: 100%; object-fit: cover; }

/* FLASH SLIDER & PRODUCTS */
.flash-slider-inner { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; scroll-behavior: smooth; }
.flash-card-mini { min-width: 155px; max-width: 155px; background: white; border-radius: 15px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex-shrink: 0; border: 1px solid #f1f5f9; }
.product-grid-modern { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

@media (min-width: 769px) {
    .product-grid-modern { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}
</style>

<script>
    const supabaseHome = typeof supabase !== 'undefined' ? supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13") : null;
    let allSellers = [];
    let allProducts = [];

    async function loadAllData() {
        if (!supabaseHome) return;
        try {
            const { data: prods } = await supabaseHome.from('user_products').select('*, profiles(*)').order('created_at', { ascending: false });
            allProducts = prods || [];
            const { data: sellers } = await supabaseHome.from('profiles').select('*').eq('is_active_seller', true);
            allSellers = sellers || [];
            renderSellers(allSellers);
            renderProducts(allProducts);
            renderFlashSlider(allProducts.filter(p => p.is_flash_sale));
        } catch (e) { console.error(e); }
    }

    function renderSellers(list) {
        const grid = document.getElementById('sellers-grid-home');
        if (!grid) return;
        grid.innerHTML = list.map(s => {
            const sProds = allProducts.filter(p => p.seller_id === s.id).slice(0, 4);
            let previews = sProds.map(p => `<div class="preview-img-home"><img src="${p.image_url}"></div>`).join('');
            for(let i=sProds.length; i<4; i++) previews += `<div class="preview-img-home" style="display:flex; align-items:center; justify-content:center; color:#ddd; font-size:18px;">📦</div>`;

            const initial = (s.full_name || "M").charAt(0).toUpperCase();
            const logo = s.avatar_url ? `<img src="${s.avatar_url}">` : initial;

            return `
                <div class="seller-card-home">
                    <div class="seller-header-home">
                        <div class="seller-logo-home">${logo}</div>
                        <div class="seller-info-home">
                            <h4>${s.full_name || "Boutik"}</h4>
                            <p>📍 ${s.address || "Ayiti"}</p>
                        </div>
                    </div>
                    <div class="seller-previews-home">${previews}</div>
                    <a href="/boutik-machann.html?id=${s.id}" style="display:block; text-align:center; background:#0f172a; color:white; padding:12px; border-radius:12px; margin-top:20px; text-decoration:none; font-weight:700; font-size:13px;">Vizite Boutik →</a>
                </div>`;
        }).join('');
    }

    function renderProducts(list) {
        const grid = document.getElementById('supabase-products-grid');
        if (!grid) return;
        grid.innerHTML = list.map(p => `
            <div style="background:white; padding:10px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05); border:1px solid #f1f5f9;">
                <a href="/pwodwi-machann.html?id=${p.id}"><img src="${p.image_url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:12px;"></a>
                <h3 style="font-size:13px; margin:8px 0; height:32px; overflow:hidden;">${p.title}</h3>
                <div style="color:#ff4747; font-weight:900; font-size:15px;">${p.price} HTG</div>
                <button onclick="orderProduct('${p.title.replace(/'/g, "\\'")}', '${p.price}', '${p.id}', '${p.image_url}')" style="width:100%; background:#f1f5f9; border:none; padding:8px; border-radius:10px; margin-top:8px; font-weight:700; cursor:pointer; font-size:11px;">🛒 Ajoute</button>
            </div>
        `).join('');
    }

    function renderFlashSlider(flashProds) {
        const slider = document.getElementById('flash-slider-inner');
        if (!slider || flashProds.length === 0) return;
        slider.innerHTML = flashProds.map(p => `
            <div class="flash-card-mini">
                <div style="position:relative; aspect-ratio:1; overflow:hidden; border-radius:10px;">
                    <a href="/pwodwi-machann.html?id=${p.id}"><img src="${p.image_url}" style="width:100%; height:100%; object-fit:cover;"></a>
                </div>
                <h3 style="font-size:12px; margin:8px 0 4px; font-weight:700; height:30px; overflow:hidden;">${p.title}</h3>
                <div style="color:#ff4747; font-weight:900; font-size:14px;">${p.price} HTG</div>
                <button onclick="orderProduct('${p.title.replace(/'/g, "\\'")}', '${p.price}', '${p.id}', '${p.image_url}')" style="width:100%; background:#0f172a; color:white; border:none; padding:8px; border-radius:8px; margin-top:8px; font-size:10px; font-weight:700; cursor:pointer;">Ajoute 🛒</button>
            </div>
        `).join('');
        setInterval(() => {
            if (slider.scrollLeft + slider.clientWidth >= slider.scrollWidth) slider.scrollTo({ left: 0, behavior: 'smooth' });
            else slider.scrollBy({ left: 160, behavior: 'smooth' });
        }, 4000);
    }

    function switchMarketTab(tab) {
        document.getElementById('tab-sellers').classList.toggle('active', tab === 'sellers');
        document.getElementById('tab-products').classList.toggle('active', tab === 'products');
        document.getElementById('sellers-view').style.display = tab === 'sellers' ? 'block' : 'none';
        document.getElementById('products-view').style.display = tab === 'products' ? 'block' : 'none';
    }

    document.addEventListener('DOMContentLoaded', loadAllData);
</script>
