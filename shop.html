<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
    :root {
      --primary: #ff4747;
      --dark: #0f172a;
      --gray: #64748b;
      --white: #ffffff;
      --radius: 18px;
    }

    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: var(--dark); margin: 0; }

    .shop-hero {
      background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%);
      padding: 40px 20px;
      color: white;
      text-align: center;
    }
    .search-box {
      max-width: 600px; margin: 20px auto 0; position: relative;
    }
    .search-box input {
      width: 100%; padding: 15px 25px; border-radius: 50px; border: none; outline: none; font-size: 1rem;
    }

    .shop-container {
      max-width: 1300px; margin: 30px auto; padding: 0 20px;
      display: grid; grid-template-columns: 250px 1fr; gap: 30px;
    }

    .sidebar { background: white; padding: 20px; border-radius: var(--radius); height: fit-content; position: sticky; top: 100px; }
    .sidebar h3 { font-size: 0.9rem; text-transform: uppercase; color: var(--gray); margin-bottom: 15px; }
    .cat-btn {
        display: block; width: 100%; text-align: left; padding: 10px;
        background: none; border: none; cursor: pointer; font-weight: 600; color: var(--dark);
        border-radius: 8px; transition: 0.2s;
    }
    .cat-btn:hover, .cat-btn.active { background: #fee2e2; color: var(--primary); }

    .products-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;
    }

    .product-card {
      background: white; border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s;
      display: flex; flex-direction: column; height: 100%;
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

    .img-wrap { width: 100%; aspect-ratio: 1; background: #f8fafc; overflow: hidden; }
    .img-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
    .info .cat { font-size: 10px; color: var(--primary); font-weight: 800; text-transform: uppercase; }
    .info .title { font-size: 0.95rem; font-weight: 700; margin: 5px 0; color: var(--dark); }
    .info .price { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-top: auto; }

    .btn-add {
      width: 100%; padding: 12px; background: var(--dark); color: white;
      border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px;
    }
    .btn-add:hover { background: var(--primary); }

    .loading-msg { grid-column: 1/-1; text-align: center; padding: 50px; font-weight: 700; color: var(--gray); }

    /* ADSTERRA STYLES */
    .adsterra-banner {
        margin: 30px auto;
        text-align: center;
        max-width: 1000px;
        width: 100%;
        overflow: hidden;
        border-radius: 12px;
        min-height: 90px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
    }

    @media (max-width: 850px) {
        .shop-container { grid-template-columns: 1fr; }
        .sidebar { display: none; }
    }
</style>

<div class="shop-hero">
    <h1>Boutik Machann yo 🏪</h1>
    <p>Tout pwodwi machann nou yo ap parèt isit la</p>
    <div class="search-box">
        <input type="text" id="shopSearch" placeholder="Chèche yon pwodwi (eg: rad, telefon...)" oninput="filterLocal()">
    </div>
</div>

<div class="shop-container">
    <aside class="sidebar">
        <h3>Kategori</h3>
        <button class="cat-btn active" onclick="filterCat('all', this)">Tout Pwodwi</button>
        <button class="cat-btn" onclick="filterCat('electronique', this)">⚡ Elektwonik</button>
        <button class="cat-btn" onclick="filterCat('habillement', this)">👗 Rad & Mòd</button>
        <button class="cat-btn" onclick="filterCat('maison', this)">🏠 Kay & Biwo</button>
        <button class="cat-btn" onclick="filterCat('beaute', this)">💄 Bote</button>
    </aside>

    <main>
        <div id="productsGrid" class="products-grid">
            <div id="loadingStatus" class="loading-msg">
                <p>⏳ Ap prepare koneksyon ak Supabase...</p>
                <small id="debug-log" style="display:block; margin-top:10px; color:#94a3b8;"></small>
            </div>
        </div>
    </main>
</div>

<!-- SUPABASE SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // Itilize yon lòt non pou evite konfli ak main.js
    const SHOP_SUP_URL = "https://letyferfjpxmstohvgcj.supabase.co";
    const SHOP_SUP_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg";

    let allProducts = [];

    function log(msg) {
        console.log(msg);
        const debugEl = document.getElementById('debug-log');
        if (debugEl) debugEl.innerHTML += " > " + msg + "<br>";
    }

    async function initShop() {
        const grid = document.getElementById('productsGrid');
        const status = document.getElementById('loadingStatus');

        try {
            log("Y ap tcheke bibliyotèk Supabase...");

            if (typeof window.supabase === 'undefined') {
                log("ERÈ: SDK pa jwenn!");
                status.innerHTML = "❌ Erè: Bibliyotèk Supabase la pa chaje. Tanpri rafrechi paj la (F5).";
                return;
            }

            log("SDK jwenn. Y ap kreye kliyan...");
            // Itilize nouvo non varyab yo
            const supabaseShop = window.supabase.createClient(SHOP_SUP_URL, SHOP_SUP_KEY);

            log("Kliyan kreye. Y ap rekipere done nan tablo 'user_products'...");
            const { data, error } = await supabaseShop
                .from('user_products')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                log("ERÈ SUPABASE: " + error.message);
                throw error;
            }

            log("Done rekipere! Kantite pwodwi: " + (data ? data.length : 0));
            allProducts = data || [];

            if (allProducts.length === 0) {
                grid.innerHTML = `<div class="loading-msg">📭 Pa gen okenn pwodwi machann yo ajoute kounye a nan baz de done a.</div>`;
            } else {
                renderProducts(allProducts);
            }

        } catch (err) {
            log("ERÈ KRITIK: " + err.message);
            grid.innerHTML = `<div class="loading-msg" style="color:red">
                ❌ Erè: ${err.message || 'Koneksyon echwe'}.<br>
                <small>Asire w ou gen entènèt epi tablo 'user_products' la egziste.</small>
            </div>`;
        }
    }

    function renderProducts(products) {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = products.map(p => `
            <div class="product-card">
                <div class="img-wrap">
                    <img src="${p.image_url}" alt="${p.title}" onerror="this.src='https://via.placeholder.com/300?text=Imaj+pa+disponib'">
                </div>
                <div class="info">
                    <div class="cat">${p.category || 'Boutik'}</div>
                    <div class="title">${p.title}</div>
                    <div class="price">${p.price ? Number(p.price).toLocaleString() : 0} HTG</div>
                    <button class="btn-add" onclick="if(window.orderProduct) window.orderProduct('${p.title.replace(/'/g, "\\'")}', '${p.price || 0}', '${p.id}', '${p.image_url}')">
                        🛒 Ajoute nan Panye
                    </button>
                </div>
            </div>
        `).join('');
    }

    function filterLocal() {
        const txt = document.getElementById('shopSearch').value.toLowerCase();
        const filtered = allProducts.filter(p =>
            p.title.toLowerCase().includes(txt) ||
            (p.category && p.category.toLowerCase().includes(txt))
        );
        renderProducts(filtered);
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (cat === 'all') {
            renderProducts(allProducts);
        } else {
            const filtered = allProducts.filter(p => p.category === cat);
            renderProducts(filtered);
        }
    }

    // Lanse chajman an dirèktman
    document.addEventListener('DOMContentLoaded', initShop);
</script>
