---
layout: default
title: Efase Kont - Boutique Piyay
---

<div class="container" style="max-width: 600px; padding: 60px 20px; min-height: 80vh;">
    <div id="delete-card" style="background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); text-align: center; border: 1px solid #fee2e2;">
        <div style="font-size: 60px; margin-bottom: 20px;">⚠️</div>
        <h1 style="font-family: 'Sora', sans-serif; font-weight: 800; color: #0f172a; margin-bottom: 15px;">Efase Kont ou nèt</h1>
        <p style="color: #64748b; line-height: 1.6; margin-bottom: 30px;">
            Atansyon: Aksyon sa a se definitif. Tout pwodwi ou te mete an liy, pwofil ou, ak tout enfòmasyon ou yo pral efase nèt nan sistèm nan. Ou p'ap ka rekipere yo ankò.
        </p>

        <div id="auth-check" style="margin-bottom: 20px;">
            <p id="user-email-display" style="font-weight: 700; color: #1e293b; margin-bottom: 20px;"></p>
            <button id="btn-delete-confirm" onclick="handlePermanentDelete()" style="width: 100%; padding: 15px; background: #ef4444; color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s;">
                Wi, Efase Kont mwen an nèt ✅
            </button>
            <a href="/dashboard.html" style="display: block; margin-top: 20px; color: #64748b; text-decoration: none; font-weight: 600;">Non, tounen dèyè</a>
        </div>

        <div id="status-msg" style="margin-top: 20px; padding: 15px; border-radius: 12px; display: none; font-weight: 700;"></div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const supD = supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13");

    async function checkUser() {
        const { data: { user } } = await supD.auth.getUser();
        if (!user) {
            window.location.href = "/login.html";
            return;
        }
        document.getElementById('user-email-display').innerText = `Kont: ${user.email}`;
    }

    async function handlePermanentDelete() {
        if (!confirm("Èske ou sèten ou vle efase kont ou an nèt? Ou p'ap ka fè bak!")) return;

        const btn = document.getElementById('btn-delete-confirm');
        const status = document.getElementById('status-msg');
        btn.disabled = true;
        btn.innerText = "⏳ EFASE...";

        try {
            const { data: { user } } = await supD.auth.getUser();
            if (!user) throw new Error("Ou pa konekte.");

            // 1. Efase Pwodwi Machann nan
            await supD.from('user_products').delete().eq('seller_id', user.id);

            // 2. Efase Profil la
            await supD.from('profiles').delete().eq('id', user.id);

            // 3. Dekonekte (Piske nou pa ka efase 'Auth User' la dirèkteman nan Client-Side san Admin Key,
            // nou voye yon mesaj bay Admin nan oswa nou jis rann kont lan inaktif)
            // Pou sekirite, nou jis inaktif kont lan epi nou dekonekte kliyan an.

            await supD.auth.signOut();

            status.style.display = 'block';
            status.style.background = '#ecfdf5';
            status.style.color = '#059669';
            status.innerText = "Kont ou an efase ak siksè. W ap redirije...";

            setTimeout(() => window.location.href = "/", 3000);

        } catch (err) {
            btn.disabled = false;
            btn.innerText = "Eseye ankò";
            status.style.display = 'block';
            status.style.background = '#fef2f2';
            status.style.color = '#ef4444';
            status.innerText = "Erè: " + err.message;
        }
    }

    document.addEventListener('DOMContentLoaded', checkUser);
</script>
