<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --orange: #FF5722;
    --orange-light: #FF7043;
    --navy: #0D1B2A;
    --gray-100: #F8F9FA;
    --gray-200: #EAEDF0;
    --gray-500: #8A94A6;
    --gray-700: #4A5568;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #F4F5F7; color: var(--navy); min-height: 100vh; }

  /* DASHBOARD */
  .dashboard { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
  .welcome-bar { background: linear-gradient(135deg, var(--navy) 0%, #1E3A5F 100%); border-radius: var(--radius); padding: 24px 28px; display: flex; align-items: center; gap: 20px; margin-bottom: 24px; position: relative; overflow: hidden; color: white; }
  .user-avatar-big { width: 56px; height: 56px; border-radius: 50%; background: var(--orange); color: white; display: flex; align-items: center; justify-content: center; font-family: 'Sora', sans-serif; font-size: 1.4rem; font-weight: 800; flex-shrink: 0; border: 3px solid rgba(255,255,255,0.3); }
  .welcome-text { flex: 1; }
  .welcome-text h2 { font-family: 'Sora', sans-serif; font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
  .logout-btn { padding: 8px 18px; background: rgba(255,255,255,0.15); color: white; border: 1.5px solid rgba(255,255,255,0.25); border-radius: 100px; font-weight: 600; cursor: pointer; transition: 0.2s; }

  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: white; border-radius: var(--radius-sm); padding: 18px; box-shadow: var(--shadow-sm); text-align: center; }
  .stat-num { font-family: 'Sora', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--orange); }

  .dash-panel { background: white; border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 24px; }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-200); font-weight: 700; }

  .order-item { padding: 16px 20px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
  .order-info { flex: 1; min-width: 200px; }
  .order-title { font-weight: 700; font-size: 0.9rem; }
  .order-status { font-size: 0.7rem; font-weight: 800; padding: 3px 10px; border-radius: 100px; text-transform: uppercase; }
  .status-pending { background: #FFF9C4; color: #F57F17; }
  .status-delivered { background: #E3F2FD; color: #1565C0; }
  .status-completed { background: #E8F5E9; color: #2E7D32; }

  /* BUTTONS */
  .btn-action {
    padding: 10px 16px; background: var(--orange); color: white; border: none;
    border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer;
    text-decoration: none; display: inline-block; transition: 0.2s; margin-top: 5px;
  }
  .btn-action.approve { background: #2E7D32; }
  .btn-action.review { background: var(--navy); }
  .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }

  /* AUTH */
  #authScreen { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { background: white; padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow-md); width: 100%; max-width: 400px; text-align: center; }
  .form-group { text-align: left; margin-bottom: 15px; }
  .form-input { width: 100%; padding: 12px; border: 2px solid var(--gray-200); border-radius: 8px; outline: none; }
  .btn-auth { width: 100%; padding: 14px; background: var(--orange); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
</style>

<div id="authScreen">
  <div class="auth-card">
    <h2 style="font-family: 'Sora', sans-serif; margin-bottom: 20px;">Kont Kliyan</h2>
    <div class="form-group">
      <label class="form-label">📧 Email</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="ou@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">🔒 Modpas</label>
      <input class="form-input" id="loginPwd" type="password" placeholder="Modpas ou...">
    </div>
    <button class="btn-auth" onclick="handleLogin()">🔑 Konekte</button>
    <p id="authMsg" style="margin-top: 15px; color: red; font-size: 0.8rem; display: none;"></p>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <div class="dashboard">
    <div class="welcome-bar">
      <div class="user-avatar-big" id="userAvatar">?</div>
      <div class="welcome-text">
        <h2 id="welcomeName">Bonjou! 👋</h2>
        <p id="userEmailLabel">kliyan@email.com</p>
      </div>
      <button class="logout-btn" onclick="handleLogout()">🚪 Soti</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="statOrders">0</div><div class="stat-label">Kòmand</div></div>
      <div class="stat-card"><div class="stat-num">⭐</div><div class="stat-label">Avis Mwen</div></div>
    </div>

    <div class="dash-panel">
      <div class="panel-header">📦 Istwa Kòmand mwen yo</div>
      <div id="ordersList">
        <div style="padding: 30px; text-align: center; color: #888;">⏳ Chaje kòmand yo...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const S_URL = "https://letyferfjpxmstohvgcj.supabase.co";
const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg";
const client = supabase.createClient(S_URL, S_KEY);

async function handleLogin() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPwd').value;
  const msg = document.getElementById('authMsg');

  const { data, error } = await client.auth.signInWithPassword({ email, password: pass });
  if (error) { msg.innerText = error.message; msg.style.display = 'block'; }
  else { checkUser(); }
}

async function checkUser() {
  const { data: { user } } = await client.auth.getUser();
  if (user) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('welcomeName').innerText = "Bonjou " + (user.user_metadata.full_name || 'Kliyan') + "! 👋";
    document.getElementById('userEmailLabel').innerText = user.email;
    document.getElementById('userAvatar').innerText = (user.email.charAt(0)).toUpperCase();
    loadOrders(user.id);
  }
}

async function loadOrders(userId) {
  const { data: orders } = await client.from('orders').select('*').eq('customer_email', (await client.auth.getUser()).data.user.email);
  const list = document.getElementById('ordersList');

  if (!orders || orders.length === 0) {
    list.innerHTML = '<div style="padding:30px; text-align:center; color:#888;">Okenn kòmand poko.</div>';
    return;
  }

  document.getElementById('statOrders').innerText = orders.length;
  list.innerHTML = orders.map(o => {
    const status = o.status || 'pending';
    let actionsHtml = '';

    if (status === 'delivered') {
      actionsHtml = `<button onclick="approveOrder('${o.id}', '${o.seller_id}', ${o.amount})" class="btn-action approve">✅ Aprouve Resepsyon</button>`;
    } else if (status === 'completed') {
      actionsHtml = `<a href="/pwodwi-machann.html?id=${o.product_id}" class="btn-action review">⭐ Bay Avis</a>`;
    }

    return `
      <div class="order-item">
        <div class="order-info">
          <div class="order-title">Kòmand #${o.id.substring(0,8)}</div>
          <div style="font-size:0.8rem; color:#666;">Pwodwi: ${o.product_name || 'N/A'} · <b>${o.amount} HTG</b></div>
          <div style="margin-top:5px;">
            <span class="order-status status-${status}">${status}</span>
          </div>
        </div>
        <div style="display:flex; flex-direction:column; gap:8px; align-items:flex-end;">
          ${actionsHtml}
        </div>
      </div>
    `;
  }).join('');
}

async function approveOrder(orderId, sellerId, amount) {
  if (!confirm("Èske ou resevwa kòmand lan tout bon? Sa pral lage lajan an bay machann nan.")) return;

  // 1. Make kòmand lan konplè
  const { error: err1 } = await client.from('orders').update({ status: 'completed' }).eq('id', orderId);
  if (err1) { alert(err1.message); return; }

  // 2. Mizajou balans machann nan (Wallet)
  // Nan yon sistèm reyèl, nou ta fè sa via yon Edge Function pou sekirite,
  // men isit la nou pral chèche balans lan epi ajoute li.
  const { data: profile } = await client.from('profiles').select('wallet_balance').eq('id', sellerId).single();
  const currentBal = parseFloat(profile.wallet_balance || 0);
  const newBal = currentBal + parseFloat(amount);

  await client.from('profiles').update({ wallet_balance: newBal }).eq('id', sellerId);

  alert("✅ Mèsi! Kòmand lan konplè epi lajan an transfere bay machann nan.");
  loadOrders();
}

function handleLogout() { client.auth.signOut().then(() => location.reload()); }

window.onload = checkUser;
</script>
