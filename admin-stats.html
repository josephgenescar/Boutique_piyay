---
layout: default
title: Sant Kontwòl Admin - Boutique Piyay
---

<div id="admin-login-section" class="container" style="padding: 80px 20px; text-align: center;">
    <div style="max-width: 400px; margin: 0 auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid #eee;">
        <div style="font-size: 50px; margin-bottom: 20px;">🛡️</div>
        <h1 style="font-family: 'Sora', sans-serif; font-weight: 800; font-size: 22px; color: #0f172a; margin-bottom: 10px;">Aksè Administratè</h1>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 30px;">Konekte ak kont pèsonèl ou.</p>
        <input type="email" id="adminEmail" placeholder="admin@email.com" style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc; margin-bottom: 15px;">
        <input type="password" id="adminPass" placeholder="••••••••" style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc; margin-bottom: 25px;">
        <button onclick="handleAdminLogin()" id="loginBtn" style="width: 100%; padding: 16px; background: #0f172a; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer;">ANTRE NAN SANT KONTWÒL</button>
        <div id="loginError" style="color: #ff4747; font-size: 13px; margin-top: 15px; display: none; padding: 10px; background: #fee2e2; border-radius: 8px;"></div>
    </div>
</div>

<div id="admin-dashboard" class="container" style="display: none; padding: 40px 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
        <h1 style="font-family: 'Sora', sans-serif; font-weight: 800; margin: 0; color: #ff4747;">🛡️ Sant Kontwòl Admin</h1>
        <button onclick="handleAdminLogout()" style="padding: 10px 20px; background: #f3f4f6; color: #333; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;">🚪 Logout</button>
    </div>

    <!-- STATS -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px;">
        <div class="stat-card" style="border-bottom-color: #ff4747;">
            <div class="stat-num" id="totalSellers">0</div>
            <div class="stat-label">MACHANN</div>
        </div>
        <div class="stat-card" style="border-bottom-color: #3b82f6;">
            <div class="stat-num" id="totalProducts">0</div>
            <div class="stat-label">PWODWI LIVE</div>
        </div>
        <div class="stat-card" style="border-bottom-color: #25d366;">
            <div class="stat-num" id="totalFeedback">0</div>
            <div class="stat-label">FEEDBACK</div>
        </div>
    </div>

    <!-- TABS MENU -->
    <div class="tabs-container">
        <button onclick="showTab('tab-sellers')" class="tab-btn active">👥 Machann & Abonman</button>
        <button onclick="showTab('tab-comms')" class="tab-btn">💬 Kominikasyon</button>
        <button onclick="showTab('tab-all-products')" class="tab-btn">📦 Tout Pwodwi</button>
    </div>

    <!-- TAB: MACHANN (AK NOUVO DONE YO) -->
    <div id="tab-sellers" class="tab-content">
        <div class="table-card">
            <table style="width: 100%; border-collapse: collapse; min-width: 1000px;">
                <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #f1f5f9;">
                        <th style="padding: 15px;">Machann</th>
                        <th style="padding: 15px;">Dat Enskri</th>
                        <th style="padding: 15px;">Dat Finizon</th>
                        <th style="padding: 15px;">Status / Tan</th>
                        <th style="padding: 15px;">Aksyon</th>
                    </tr>
                </thead>
                <tbody id="sellersTable"></tbody>
            </table>
        </div>
    </div>

    <!-- TAB: KOMINIKASYON -->
    <div id="tab-comms" class="tab-content" style="display: none;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
            <div class="table-card">
                <h3>📣 Mizajou Global</h3>
                <textarea id="globalMsgInput" class="admin-textarea" placeholder="Mizajou pou tout moun..."></textarea>
                <button onclick="sendGlobalMessage()" class="btn-primary">VOYE POU TOUT MOUN</button>
                <div id="announcementsList" style="margin-top: 20px; display: grid; gap: 10px;"></div>
            </div>
            <div class="table-card">
                <h3>✉️ Mesaj Machann</h3>
                <select id="sellerSelect" class="admin-input" style="margin-bottom: 15px;"></select>
                <textarea id="sellerMsgInput" class="admin-textarea" placeholder="Ekri mesaj pèsonèl..."></textarea>
                <button onclick="sendSellerMessageDirect()" class="btn-blue">VOYE MESAJ BA LI</button>
            </div>
        </div>
    </div>

    <!-- TAB: TOUT PWODWI -->
    <div id="tab-all-products" class="tab-content" style="display: none;">
        <div class="table-card">
            <table style="width: 100%; border-collapse: collapse; min-width: 900px;">
                <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #f1f5f9;"><th style="padding: 15px;">Foto</th><th style="padding: 15px;">Pwodwi</th><th style="padding: 15px;">Machann</th><th style="padding: 15px;">Pri</th><th style="padding: 15px;">Aksyon</th></tr>
                </thead>
                <tbody id="allProductsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const supA = supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13");

    async function handleAdminLogin() {
        const { data, error } = await supA.auth.signInWithPassword({ email: document.getElementById('adminEmail').value, password: document.getElementById('adminPass').value });
        if (error) { alert("Erè: " + error.message); } else { location.reload(); }
    }

    async function checkAccess() {
        const { data: { user } } = await supA.auth.getUser();
        if (user) {
            const { data: profile } = await supA.from('profiles').select('*').eq('id', user.id).single();
            if (profile && profile.role === 'admin') {
                document.getElementById('admin-login-section').style.display = "none";
                document.getElementById('admin-dashboard').style.display = "block";
                loadAdminData();
            }
        }
    }

    async function loadAdminData() {
        const { data: sellers } = await supA.from('profiles').select('*').neq('role', 'admin').order('created_at', { ascending: false });
        const { data: prods } = await supA.from('user_products').select('*, profiles(full_name)').order('created_at', { ascending: false });
        const { data: announcements } = await supA.from('admin_announcements').select('*').order('created_at', { ascending: false });
        const { data: fb } = await supA.from('feedback').select('*');

        document.getElementById('totalSellers').innerText = sellers ? sellers.length : 0;
        document.getElementById('totalProducts').innerText = prods ? prods.length : 0;
        document.getElementById('totalFeedback').innerText = fb ? fb.length : 0;

        // Seller Select
        document.getElementById('sellerSelect').innerHTML = '<option value="">-- Chwazi --</option>' + (sellers || []).map(s => `<option value="${s.id}">${s.full_name}</option>`).join('');

        // Sellers Table
        document.getElementById('sellersTable').innerHTML = (sellers || []).map(s => {
            const regDate = new Date(s.created_at).toLocaleDateString();
            const endDate = s.subscription_ends_at ? new Date(s.subscription_ends_at) : null;
            const today = new Date();

            let timeLabel = "Poko aktif";
            let labelClass = "bloke";

            if (endDate) {
                const diffTime = endDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays > 0) {
                    timeLabel = `${diffDays} jou rete`;
                    labelClass = "aktif";
                } else {
                    timeLabel = "EKSPIRÉ";
                    labelClass = "bloke";
                }
            }

            return `
                <tr style="border-bottom: 1px solid #f1f5f9;">
                    <td style="padding: 15px;"><strong>${s.full_name}</strong><br><small>${s.email || ''}</small></td>
                    <td style="padding: 15px;">${regDate}</td>
                    <td style="padding: 15px;">
                        <input type="date" value="${s.subscription_ends_at ? s.subscription_ends_at.split('T')[0] : ''}"
                        onchange="updateSubDirect('${s.id}', this.value)" style="padding:5px; border-radius:5px; border:1px solid #ddd; font-size:12px;">
                    </td>
                    <td style="padding: 15px;"><span class="status-badge ${labelClass}">${timeLabel}</span></td>
                    <td style="padding: 15px;">
                        <button onclick="toggleSeller('${s.id}', ${s.is_active_seller})" class="btn-action ${s.is_active_seller ? 'red' : 'green'}">${s.is_active_seller ? 'Bloke' : 'Aktive'}</button>
                    </td>
                </tr>
            `;
        }).join('');

        // Announcements
        document.getElementById('announcementsList').innerHTML = (announcements || []).map(m => `
            <div style="padding:10px; background:#f8fafc; border-radius:8px; border-left:3px solid #0f172a; font-size:13px; position:relative;">
                ${m.message} <br> <small style="color:#999;">${new Date(m.created_at).toLocaleDateString()}</small>
                <button onclick="deleteGlobalMsg('${m.id}')" style="position:absolute; right:10px; top:10px; border:none; background:none; cursor:pointer;">🗑️</button>
            </div>
        `).join('');

        // Products
        document.getElementById('allProductsTable').innerHTML = (prods || []).map(p => `
            <tr style="border-bottom: 1px solid #f1f5f9;">
                <td style="padding: 15px;"><img src="${p.image_url}" style="width:40px; height:40px; object-fit:cover; border-radius:6px;"></td>
                <td style="padding: 15px;"><strong>${p.title}</strong></td>
                <td style="padding: 15px;">${p.profiles ? p.profiles.full_name : '---'}</td>
                <td style="padding: 15px;">${p.price} HTG</td>
                <td style="padding: 15px;"><button onclick="deleteProduct('${p.id}')" class="btn-action red">Efase</button></td>
            </tr>
        `).join('');
    }

    async function updateSubDirect(id, date) {
        const { error } = await supA.from('profiles').update({ subscription_ends_at: date, is_active_seller: true }).eq('id', id);
        if (!error) loadAdminData();
    }
    async function toggleSeller(id, status) { if(confirm("Vle chanje status machann nan?")) { await supA.from('profiles').update({ is_active_seller: !status }).eq('id', id); loadAdminData(); } }
    async function deleteProduct(id) { if(confirm("Efase pwodwi sa a?")) { await supA.from('user_products').delete().eq('id', id); loadAdminData(); } }
    async function deleteGlobalMsg(id) { await supA.from('admin_announcements').delete().eq('id', id); loadAdminData(); }

    async function sendGlobalMessage() {
        const msg = document.getElementById('globalMsgInput').value;
        if (msg) { await supA.from('admin_announcements').insert([{ message: msg }]); document.getElementById('globalMsgInput').value = ""; loadAdminData(); }
    }

    async function sendSellerMessageDirect() {
        const id = document.getElementById('sellerSelect').value;
        const msg = document.getElementById('sellerMsgInput').value;
        if (id && msg) { await supA.from('profiles').update({ admin_message: msg }).eq('id', id); alert("Mesaj voye!"); document.getElementById('sellerMsgInput').value = ""; }
    }

    function showTab(tabId) { document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none'); document.getElementById(tabId).style.display = 'block'; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); event.currentTarget.classList.add('active'); }
    async function handleAdminLogout() { await supA.auth.signOut(); location.reload(); }
    checkAccess();
</script>

<style>
    .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .stat-num { font-size: 28px; font-weight: 900; }
    .stat-label { font-size: 10px; font-weight: 700; color: #888; margin-top: 5px; }
    .tabs-container { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; }
    .tab-btn { padding: 12px 25px; border: none; border-radius: 12px; background: #fff; cursor: pointer; font-weight: 700; transition: 0.3s; white-space: nowrap; }
    .tab-btn.active { background: #ff4747; color: white; }
    .table-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow-x: auto; }
    .status-badge { padding: 4px 10px; border-radius: 50px; font-size: 10px; font-weight: 800; }
    .status-badge.aktif { background: #dcfce7; color: #15803d; }
    .status-badge.bloke { background: #fee2e2; color: #ef4444; }
    .btn-action { padding: 8px 15px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 11px; }
    .btn-action.red { background: #fee2e2; color: #ef4444; }
    .btn-action.green { background: #dcfce7; color: #15803d; }
    .admin-textarea { width: 100%; height: 80px; padding: 12px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px; font-family: inherit; font-size: 14px; background: #fafafa; }
    .admin-input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-family: inherit; }
    .btn-primary { width: 100%; padding: 12px; background: #ff4747; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .btn-blue { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    th { color: #64748b; font-weight: 700; text-transform: uppercase; font-size: 10px; padding: 15px; }
</style>
