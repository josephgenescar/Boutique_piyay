---
layout: default
title: Sant Kontwòl Marketplace - Boutique Piyay
---

<div id="admin-login-section" class="container" style="padding: 80px 20px; text-align: center;">
    <div style="max-width: 400px; margin: 0 auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid #eee;">
        <div style="font-size: 50px; margin-bottom: 20px;">🛡️</div>
        <h1 style="font-family: 'Sora', sans-serif; font-weight: 800; font-size: 22px; color: #0f172a; margin-bottom: 10px;">Aksè Administratè</h1>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 30px;">Konekte ak kont pèsonèl ou.</p>
        <input type="email" id="adminEmail" placeholder="admin@email.com" style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc; margin-bottom: 15px;">
        <input type="password" id="adminPass" placeholder="••••••••" style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc; margin-bottom: 25px;">
        <button onclick="handleAdminLogin()" id="loginBtn" style="width: 100%; padding: 16px; background: #0f172a; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer;">ANTRE NAN SANT KONTWÒL</button>
        <div id="loginError" style="color: #ff4747; font-size: 13px; margin-top: 15px; display: none;"></div>
    </div>
</div>

<div id="admin-dashboard" class="container" style="display: none; padding: 40px 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
        <h1 style="font-family: 'Sora', sans-serif; font-weight: 800; margin: 0; color: #ff4747;">🛡️ Sant Kontwòl Marketplace</h1>
        <button onclick="handleAdminLogout()" style="padding: 10px 20px; background: #f3f4f6; color: #333; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;">🚪 Logout</button>
    </div>

    <!-- STATS -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;">
        <div style="background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid #ff4747;">
            <div style="font-size: 28px; font-weight: 900;" id="totalSellers">0</div>
            <div style="font-size: 11px; font-weight: 700; color: #888;">MACHANN</div>
        </div>
        <div style="background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid #3b82f6;">
            <div style="font-size: 28px; font-weight: 900;" id="totalOrders">0</div>
            <div style="font-size: 11px; font-weight: 700; color: #888;">KÒMAND TOTAL</div>
        </div>
        <div style="background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid #25d366;">
            <div style="font-size: 28px; font-weight: 900;" id="totalFeedback">0</div>
            <div style="font-size: 11px; font-weight: 700; color: #888;">MESAJ / FEEDBACK</div>
        </div>
    </div>

    <!-- TABS MENU -->
    <div style="display: flex; gap: 10px; margin-bottom: 25px;">
        <button onclick="showTab('tab-sellers')" class="tab-btn active">👥 Machann</button>
        <button onclick="showTab('tab-orders')" class="tab-btn">📦 Kòmand</button>
        <button onclick="showTab('tab-feedback')" class="tab-btn">💬 Feedback</button>
    </div>

    <!-- TAB: MACHANN -->
    <div id="tab-sellers" class="tab-content">
        <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; min-width: 800px;">
                <thead><tr style="text-align: left; border-bottom: 2px solid #f1f5f9;"><th style="padding: 15px;">Machann</th><th style="padding: 15px;">Abonman</th><th style="padding: 15px;">Status</th><th style="padding: 15px;">Aksyon</th></tr></thead>
                <tbody id="sellersTable"></tbody>
            </table>
        </div>
    </div>

    <!-- TAB: KÒMAND -->
    <div id="tab-orders" class="tab-content" style="display: none;">
        <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; min-width: 800px;">
                <thead><tr style="text-align: left; border-bottom: 2px solid #f1f5f9;"><th style="padding: 15px;">Dat</th><th style="padding: 15px;">Pwodwi</th><th style="padding: 15px;">Kliyan</th><th style="padding: 15px;">Total</th></tr></thead>
                <tbody id="ordersTable"></tbody>
            </table>
        </div>
    </div>

    <!-- TAB: FEEDBACK -->
    <div id="tab-feedback" class="tab-content" style="display: none;">
        <div style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
            <div id="feedbackList" style="display: grid; gap: 15px;"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const supA = supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13");

    async function handleAdminLogin() {
        const { data, error } = await supA.auth.signInWithPassword({ email: document.getElementById('adminEmail').value, password: document.getElementById('adminPass').value });
        if (error) { alert("Email oswa Modpas pa bon!"); }
        else {
            const { data: profile } = await supA.from('profiles').select('role').eq('id', data.user.id).single();
            if (profile && profile.role === 'admin') { location.reload(); }
            else { await supA.auth.signOut(); alert("Ou pa gen dwa Admin!"); }
        }
    }

    async function checkAccess() {
        const { data: { user } } = await supA.auth.getUser();
        if (user) {
            const { data: profile } = await supA.from('profiles').select('*').eq('id', user.id).single();
            if (profile && profile.role === 'admin') {
                document.getElementById('admin-login-section').style.display = "none";
                document.getElementById('admin-dashboard').style.display = "block";
                loadAdminData();
            }
        }
    }

    async function loadAdminData() {
        const { data: sellers } = await supA.from('profiles').select('*').order('created_at', { ascending: false });
        const { data: orders } = await supA.from('orders').select('*').order('created_at', { ascending: false });
        const { data: feedback } = await supA.from('feedback').select('*').order('created_at', { ascending: false });

        document.getElementById('totalSellers').innerText = sellers ? sellers.length : 0;
        document.getElementById('totalOrders').innerText = orders ? orders.length : 0;
        document.getElementById('totalFeedback').innerText = feedback ? feedback.length : 0;

        // Render Sellers
        document.getElementById('sellersTable').innerHTML = (sellers || []).map(s => `
            <tr style="border-bottom: 1px solid #f1f5f9;">
                <td style="padding: 15px;"><strong>${s.full_name}</strong><br><small>${s.email}</small></td>
                <td style="padding: 15px;">${s.subscription_ends_at ? new Date(s.subscription_ends_at).toLocaleDateString() : 'Non-aktif'}</td>
                <td style="padding: 15px;"><span style="padding:5px 10px; border-radius:50px; font-size:10px; font-weight:800; background:${s.is_active_seller ? '#dcfce7' : '#fee2e2'}; color:${s.is_active_seller ? '#15803d' : '#ef4444'};">${s.is_active_seller ? 'AKTIF' : 'BLOKE'}</span></td>
                <td style="padding: 15px;"><button onclick="toggleSeller('${s.id}', ${s.is_active_seller})" style="padding:8px 12px; border-radius:8px; border:1px solid #ddd; cursor:pointer;">Aktive/Bloke</button></td>
            </tr>
        `).join('');

        // Render Orders
        document.getElementById('ordersTable').innerHTML = (orders || []).map(o => `
            <tr style="border-bottom: 1px solid #f1f5f9;">
                <td style="padding: 15px;">${new Date(o.created_at).toLocaleDateString()}</td>
                <td style="padding: 15px;">${o.product_title}</td>
                <td style="padding: 15px;">${o.customer_name}</td>
                <td style="padding: 15px; font-weight:800; color:#ff4747;">${o.total_price} HTG</td>
            </tr>
        `).join('');

        // Render Feedback
        document.getElementById('feedbackList').innerHTML = (feedback || []).map(f => `
            <div style="padding:15px; background:#f9f9f9; border-radius:12px; border-left:4px solid #ff4747;">
                <div style="font-weight:800;">${f.name} (${f.email})</div>
                <div style="font-size:14px; color:#444; margin-top:5px;">${f.message}</div>
                <div style="font-size:10px; color:#aaa; margin-top:10px;">${new Date(f.created_at).toLocaleString()}</div>
            </div>
        `).join('') || '<p>Okenn mesaj poko rive.</p>';
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(tabId).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    async function toggleSeller(id, status) { await supA.from('profiles').update({ is_active_seller: !status }).eq('id', id); loadAdminData(); }
    async function handleAdminLogout() { await supA.auth.signOut(); location.reload(); }
    checkAccess();
</script>

<style>
    .tab-btn { padding: 10px 20px; border: none; border-radius: 8px; background: #eee; cursor: pointer; font-weight: 700; transition: 0.3s; }
    .tab-btn.active { background: #ff4747; color: white; }
    th { color: #64748b; font-weight: 700; text-transform: uppercase; font-size: 11px; }
</style>
