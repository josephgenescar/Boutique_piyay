---
layout: default
title: Kategori Pwodwi
---

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  :root {
    --primary: #ff4747;
    --primary-light: rgba(255,71,71,0.08);
    --dark: #0f172a;
    --gray: #64748b;
    --light: #f1f5f9;
    --green: #10b981;
    --gold: #f59e0b;
    --radius: 20px;
    --radius-sm: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.06);
    --shadow-md: 0 8px 30px rgba(0,0,0,0.1);
  }

  .kat-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 20px 80px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  /* ── HERO HEADER ── */
  .kat-hero {
    background: linear-gradient(135deg, var(--dark) 0%, #1e293b 55%, #1a0f35 100%);
    border-radius: 24px;
    padding: 40px 36px;
    color: white;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .kat-hero::before {
    content: '';
    position: absolute; top: -70px; right: -70px;
    width: 240px; height: 240px; border-radius: 50%;
    background: var(--primary); opacity: 0.07;
  }
  .kat-hero::after {
    content: '';
    position: absolute; bottom: -40px; left: 30%;
    width: 160px; height: 160px; border-radius: 50%;
    background: var(--gold); opacity: 0.04;
  }

  .kat-hero-left { position: relative; }
  .kat-hero-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,71,71,0.15); border: 1px solid rgba(255,71,71,0.3);
    color: #ff8080; font-size: 10px; font-weight: 800;
    padding: 4px 12px; border-radius: 50px; margin-bottom: 12px;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .kat-hero h1 {
    font-size: 28px; font-weight: 900; letter-spacing: -0.5px;
    margin: 0 0 8px; color: white;
  }
  .kat-hero-desc {
    font-size: 13px; color: rgba(255,255,255,0.45); font-weight: 500; margin: 0;
  }
  .kat-count-badge {
    position: relative;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 20px 28px; text-align: center;
    flex-shrink: 0;
  }
  .kat-count-num { font-size: 36px; font-weight: 900; color: white; letter-spacing: -1px; display: block; }
  .kat-count-lbl { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  /* ── FILTER BAR ── */
  .filter-bar {
    background: white; border-radius: var(--radius);
    padding: 14px 18px; margin-bottom: 24px;
    box-shadow: var(--shadow);
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .filter-label { font-size: 10px; font-weight: 800; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
  .filter-btn {
    padding: 8px 16px; border: 1.5px solid #f1f5f9;
    background: #fafbfc; border-radius: 50px;
    cursor: pointer; font-size: 12px; font-weight: 700;
    transition: 0.2s; color: var(--gray); font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
  .filter-btn.active {
    background: var(--primary); color: white;
    border-color: var(--primary);
    box-shadow: 0 4px 12px rgba(255,71,71,0.25);
  }

  /* ── PRODUCT GRID ── */
  .prod-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 18px;
  }

  .prod-card {
    background: white; border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow);
    transition: transform 0.22s, box-shadow 0.22s;
    position: relative; display: flex; flex-direction: column;
    border: 1.5px solid #f8fafc;
  }
  .prod-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }

  .prod-img-wrap {
    aspect-ratio: 1; overflow: hidden;
    background: var(--light); position: relative;
  }
  .prod-img-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.35s;
  }
  .prod-card:hover .prod-img-wrap img { transform: scale(1.06); }
  .prod-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; color: #cbd5e1;
  }

  .badge-featured {
    position: absolute; top: 10px; left: 10px;
    background: var(--gold); color: white;
    padding: 3px 9px; border-radius: 8px;
    font-size: 9px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.5px;
    box-shadow: 0 4px 10px rgba(245,158,11,0.3);
  }
  .badge-soldout {
    position: absolute; top: 10px; right: 10px;
    background: rgba(15,23,42,0.8); color: #94a3b8;
    padding: 3px 9px; border-radius: 8px;
    font-size: 9px; font-weight: 800;
  }

  .prod-body { padding: 14px; flex: 1; display: flex; flex-direction: column; }
  .prod-name {
    font-size: 13px; font-weight: 700; color: var(--dark);
    margin: 0 0 6px; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .prod-desc {
    font-size: 11px; color: var(--gray); font-weight: 500;
    margin: 0 0 8px; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .prod-stock {
    font-size: 11px; font-weight: 700; margin-bottom: 10px;
    display: flex; align-items: center; gap: 5px;
  }
  .prod-stock.in  { color: var(--green); }
  .prod-stock.out { color: #ef4444; }

  .prod-footer {
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid #f8fafc; padding-top: 12px; margin-top: auto;
  }
  .prod-price { font-size: 17px; font-weight: 900; color: var(--primary); letter-spacing: -0.3px; }
  .prod-price small { font-size: 11px; color: var(--gray); font-weight: 600; margin-left: 2px; }

  .btn-ajoute {
    padding: 9px 14px; background: var(--dark);
    color: white; border: none; border-radius: 10px;
    font-weight: 800; font-size: 11px; cursor: pointer;
    font-family: inherit; transition: 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-ajoute:hover { background: var(--primary); transform: translateY(-1px); }
  .btn-ajoute:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; transform: none; }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1/-1; text-align: center; padding: 70px 20px; color: var(--gray);
  }
  .empty-state .e-icon { font-size: 52px; margin-bottom: 16px; display: block; }
  .empty-state .e-title { font-size: 18px; font-weight: 900; color: var(--dark); margin-bottom: 8px; }
  .empty-state .e-sub { font-size: 13px; line-height: 1.6; }

  /* ── SKELETON ── */
  .skeleton {
    background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 10px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  @media (max-width: 600px) {
    .prod-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .kat-hero { padding: 28px 20px; }
    .kat-count-badge { display: none; }
  }
</style>

<div class="kat-wrap">

  <!-- HERO -->
  <div class="kat-hero">
    <div class="kat-hero-left">
      <div class="kat-hero-tag">🏷️ Kategori</div>
      <h1 id="categoryTitle">🛍️ Kategori</h1>
      <p class="kat-hero-desc" id="categoryDesc">Dekouvri tout pwodwi nan kategori sa a</p>
    </div>
    <div class="kat-count-badge">
      <span class="kat-count-num" id="prodCount">0</span>
      <div class="kat-count-lbl">Pwodwi</div>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span class="filter-label">Triye:</span>
    <button class="filter-btn active" onclick="filterBySort('all', this)">🏪 Tout</button>
    <button class="filter-btn" onclick="filterBySort('featured', this)">⭐ Rekòmande</button>
    <button class="filter-btn" onclick="filterBySort('price-asc', this)">💰 Pri ↑</button>
    <button class="filter-btn" onclick="filterBySort('price-desc', this)">💰 Pri ↓</button>
  </div>

  <!-- GRID -->
  <div id="productsList" class="prod-grid">
    <!-- skeletons while loading -->
    ${[1,2,3,4,5,6].map(() => `
    <div style="background:white;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.06);">
      <div class="skeleton" style="aspect-ratio:1;border-radius:0;"></div>
      <div style="padding:14px;">
        <div class="skeleton" style="height:13px;width:80%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:11px;width:60%;margin-bottom:14px;"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f8fafc;padding-top:12px;">
          <div class="skeleton" style="height:18px;width:35%;"></div>
          <div class="skeleton" style="height:34px;width:30%;border-radius:10px;"></div>
        </div>
      </div>
    </div>`).join('')}
  </div>

</div>

<script>
  var allProducts = JSON.parse(localStorage.getItem('bp_products') || '[]');
  var currentCategory = new URLSearchParams(window.location.search).get('cat') || 'habillement';
  var currentSort = 'all';

  var catNames = {
    'electronique':  '⚡ Électronique',
    'habillement':   '👗 Mode & Habillement',
    'maison':        '🏠 Maison & Bureau',
    'beaute':        '💄 Beauté & Cosmétiques',
    'epicerie':      '🛒 Épicerie & Supermarché',
    'accessoires-electronique': '⚡ Électronique'
  };

  function displayProducts() {
    var filtered = allProducts.filter(function(p) { return p.category === currentCategory; });

    if (currentSort === 'featured')   filtered = filtered.filter(function(p) { return p.featured; });
    if (currentSort === 'price-asc')  filtered.sort(function(a, b) { return a.price - b.price; });
    if (currentSort === 'price-desc') filtered.sort(function(a, b) { return b.price - a.price; });

    var name = catNames[currentCategory] || ('🏷️ ' + currentCategory);
    document.getElementById('categoryTitle').textContent = name;
    document.getElementById('categoryDesc').textContent  = filtered.length + ' pwodwi disponib nan kategori sa a';
    document.getElementById('prodCount').textContent     = filtered.length;

    var list = document.getElementById('productsList');

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">' +
        '<span class="e-icon">📦</span>' +
        '<div class="e-title">Poko gen pwodwi</div>' +
        '<div class="e-sub">Kategori sa a poko gen pwodwi.<br>Tounen pi ta oswa eseye yon lòt kategori.</div>' +
        '</div>';
      return;
    }

    list.innerHTML = filtered.map(function(p) {
      var imgHTML = p.image
        ? '<img src="' + p.image + '" alt="' + p.title + '" onerror="this.parentElement.innerHTML=\'<div class=\\\"prod-img-placeholder\\\">🛍️</div>\'">'
        : '<div class="prod-img-placeholder">🛍️</div>';

      var inStock = p.stock > 0;

      return '<div class="prod-card">' +
        (p.featured ? '<div class="badge-featured">⭐ Rekòmande</div>' : '') +
        (!inStock   ? '<div class="badge-soldout">Piwasa</div>' : '') +
        '<div class="prod-img-wrap">' + imgHTML + '</div>' +
        '<div class="prod-body">' +
          '<div class="prod-name">' + p.title + '</div>' +
          '<div class="prod-desc">' + (p.description || '') + '</div>' +
          '<div class="prod-stock ' + (inStock ? 'in' : 'out') + '">' +
            (inStock ? '✅ Disponib: ' + p.stock + ' atik' : '❌ Piwasa') +
          '</div>' +
          '<div class="prod-footer">' +
            '<div class="prod-price">' + p.price + ' <small>HTG</small></div>' +
            '<button class="btn-ajoute" ' +
              (inStock ? 'onclick="orderProduct(\'' + p.title.replace(/'/g, "\\'") + '\', ' + p.price + ', \'' + p.id + '\')"' : 'disabled') +
            '>' +
              (inStock ? '🛒 Ajoute' : 'Piwasa') +
            '</button>' +
          '</div>' +
        '</div>' +
        '</div>';
    }).join('');
  }

  function filterBySort(sort, btn) {
    currentSort = sort;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    displayProducts();
  }

  displayProducts();
</script>
