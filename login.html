<div class="container" style="max-width: 500px; padding: 60px 20px;">
    <div class="auth-card" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;">
        <h1 style="font-family: 'Sora', sans-serif; font-weight: 800; margin-bottom: 10px;">👋 Bonretou!</h1>

        <form id="loginForm">

                <input type="email" id="email" required style="width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px;">
            </div>
            <div style="margin-bottom: 25px; text-align: left;">

            </div>

            <button type="submit" id="loginBtn" style="width: 100%; padding: 16px; background: #ff4747; color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s;">

</div>
