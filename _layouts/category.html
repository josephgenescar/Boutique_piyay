---
layout: default
---

{% assign category_id = page.title %}

<div class="category-hero" style="background-image: url('{{ page.image }}');">
    <div class="hero-overlay">
        <div class="container">
            <h1 class="hero-title">{{ page.display_name | default: page.title }}</h1>
            <p class="hero-desc">{{ page.description }}</p>
            <div class="hero-badge">
                <span id="product-count-label">Chajman pwodwi yo...</span>
            </div>
        </div>
    </div>
</div>

<div class="container" style="margin-top: 40px;">
    <!-- GRID PWODWI YO (KOTE PWODWI MACHANN PRAL PARÈT) -->
    <div id="category-grid" class="product-grid-modern">
        <div id="loading-msg" style="text-align: center; padding: 50px; grid-column: 1/-1;">
            <div style="font-size: 40px; animation: spin 1s linear infinite;">⏳</div>
            <p>Nou ap chèche pwodwi nan kategori sa a...</p>
        </div>
    </div>

    <!-- SI PAGEN PWODWI -->
    <div id="no-products" style="display: none; text-align: center; padding: 60px 20px; color: #888;">
        <span style="font-size: 4rem; display: block; margin-bottom: 20px;">😔</span>
        <h3 style="font-weight: 800;">Poko gen pwodwi nan kategori sa a</h3>
        <a href="/" class="btn-primary-back" style="display: inline-block; margin-top: 20px; background: #ff4747; color: white; padding: 12px 30px; border-radius: 10px; text-decoration: none; font-weight: bold;">Retounen nan Akèy</a>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    // ✅ URL AK KLE SUPABASE KI KORÈK
    const supC = supabase.createClient(
        "https://letyferfjpxmstohvgcj.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg"
    );
    const catId = "{{ category_id }}";

    async function loadCategoryProducts() {
        const grid = document.getElementById('category-grid');
        const countLabel = document.getElementById('product-count-label');
        const noProds = document.getElementById('no-products');

        try {
            // Nou rale tout pwodwi ki apwouve nan kategori sa a
            const { data: products, error } = await supC
                .from('user_products')
                .select('*')
                .eq('category', catId.toLowerCase()) // Asire kategori a an miniskil pou konparezon
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!products || products.length === 0) {
                grid.style.display = 'none';
                noProds.style.display = 'block';
                countLabel.innerText = "0 pwodwi disponib";
                return;
            }

            countLabel.innerText = `${products.length} pwodwi disponib`;
            grid.style.display = 'grid';
            noProds.style.display = 'none';

            grid.innerHTML = products.map(p => `
                <div class="product-card-modern">
                    <div class="card-img-wrap" style="position:relative;">
                        <a href="/pwodwi-machann.html?id=${p.id}">
                            <img src="${p.image_url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:20px;">
                        </a>
                        ${p.old_price ? `<span style="position:absolute; top:10px; left:10px; background:#ff4747; color:white; padding:5px 12px; border-radius:50px; font-size:10px; font-weight:900;">⚡ FLASH</span>` : ''}
                    </div>
                    <div class="card-info" style="padding:15px;">
                        <h3 style="font-size:14px; font-weight:800; margin-bottom:8px;">
                            <a href="/pwodwi-machann.html?id=${p.id}" style="text-decoration:none; color:inherit;">${p.title}</a>
                        </h3>
                        <div class="price-modern" style="color:#ff4747; font-weight:900; font-size:18px;">
                            ${p.price} HTG
                            ${p.old_price ? `<span style="text-decoration:line-through; color:#888; font-size:12px; margin-left:8px; font-weight:600;">${p.old_price} HTG</span>` : ''}
                        </div>
                        <button class="btn-add-modern" onclick="location.href='/pwodwi-machann.html?id=${p.id}'" style="width:100%; margin-top:12px; background:#0f172a; color:white; border:none; padding:12px; border-radius:12px; font-weight:800; cursor:pointer;">🛍️ Detay</button>
                    </div>
                </div>
            `).join('');

        } catch (e) {
            console.error(e);
            grid.innerHTML = '<p style="color:red; text-align:center; grid-column:1/-1;">Erè nan chajman pwodwi yo. Tanpri verifye koneksyon ou.</p>';
        }
    }

    document.addEventListener('DOMContentLoaded', loadCategoryProducts);
</script>

<style>
@keyframes spin { 100% { transform: rotate(360deg); } }
.category-hero { width: 100%; height: 300px; background-size: cover; background-position: center; position: relative; border-radius: 0 0 40px 40px; overflow: hidden; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7)); display: flex; align-items: center; justify-content: center; text-align: center; color: white; padding: 0 20px; }
.hero-title { font-size: 3rem; font-weight: 900; text-transform: uppercase; }
.hero-badge { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 8px 25px; border-radius: 50px; margin-top: 15px; font-weight: 800; border: 1px solid rgba(255,255,255,0.3); }

/* Grid modern style si style.css pa genyen l */
.product-grid-modern {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 25px;
    padding: 20px 0;
}
.product-card-modern {
    background: white;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    transition: transform 0.3s;
}
.product-card-modern:hover { transform: translateY(-10px); }
</style>
