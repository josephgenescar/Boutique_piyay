---
layout: default
---

<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --primary: #ff4747;
    --dark: #0f172a;
    --gray-100: #F8F9FA;
    --gray-200: #EAEDF0;
    --gray-500: #8A94A6;
    --radius: 20px;
  }

  .product-page-container { max-width: 1200px; margin: 0 auto; padding: 20px 15px; }

  /* BREADCRUMB */
  .breadcrumb { font-size: 13px; color: var(--gray-500); margin-bottom: 20px; display: flex; gap: 8px; align-items: center; }
  .breadcrumb a { text-decoration: none; color: var(--primary); font-weight: 700; }

  /* FLEX LAYOUT */
  .product-flex { display: flex; gap: 40px; flex-wrap: wrap; align-items: flex-start; }
  .product-left { flex: 1; min-width: 320px; position: sticky; top: 100px; }
  .product-right { flex: 1.2; min-width: 320px; background: white; padding: 30px; border-radius: var(--radius); border: 1px solid #eee; }

  /* GALLERY */
  .main-img-box { width: 100%; aspect-ratio: 1; border-radius: var(--radius); overflow: hidden; background: white; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; }
  .main-img-box img { width: 100%; height: 100%; object-fit: contain; }

  /* INFO */
  .p-cat { background: #fff0f0; color: var(--primary); padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
  .p-title { font-size: 2rem; font-weight: 900; color: var(--dark); margin: 15px 0; line-height: 1.2; }

  /* NEW: ZONE BADGE */
  .seller-zone-badge { display: inline-flex; align-items: center; gap: 6px; background: #f1f5f9; color: #475569; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; margin-bottom: 15px; }

  .p-price-box { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
  .p-current-price { font-size: 32px; font-weight: 900; color: var(--primary); }

  /* ACTIONS */
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .btn-p { padding: 18px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-black { background: var(--dark); color: white; }
  .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(255,71,71,0.2); }

  /* SELLER CARD */
  .seller-info-card { margin-top: 30px; padding: 25px; border: 1px solid #eee; border-radius: 20px; background: #f8fafc; }
  .seller-name-title { font-size: 16px; font-weight: 800; color: var(--dark); margin-bottom: 5px; }
  .seller-location { font-size: 13px; color: #64748b; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }

  .social-links { display: flex; gap: 10px; flex-wrap: wrap; }
  .social-item { text-decoration: none; color: white; font-size: 12px; font-weight: 700; padding: 10px 15px; border-radius: 10px; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
  .btn-wa { background: #25D366; }
  .btn-fb { background: #1877F2; }

  @media (max-width: 768px) { .product-left { position: static; } .btn-grid { grid-template-columns: 1fr; } }
</style>

<div class="product-page-container">
  <div class="breadcrumb">
    <a href="/">🏠 Akèy</a> / <span>{{ page.category | capitalize }}</span> / <strong>{{ page.title }}</strong>
  </div>

  <div class="product-flex">
    <div class="product-left">
      <div class="main-img-box">
        <img id="main-img" src="{{ page.image }}" alt="{{ page.title }}">
      </div>
    </div>

    <div class="product-right">
      <span class="p-cat">{{ page.category }}</span>
      <h1 class="p-title">{{ page.title }}</h1>

      <!-- DISPLAY ZONE DYNAMIK -->
      <div id="zoneLoader" class="seller-zone-badge">📍 Zòn: Chaje...</div>

      <div class="p-price-box">
        <span class="p-current-price">{{ page.price }} HTG</span>
      </div>

      <div class="btn-grid">
        <button class="btn-p btn-black" onclick="orderProduct('{{ page.title }}', '{{ page.price }}', '{{ page.id }}', '{{ page.image }}')">🛒 Nan Panye</button>
        <button class="btn-p btn-primary" onclick="buyDirect()">⚡ Achte Kounye a</button>
      </div>

      <!-- ENFÒMASYON MACHANN LAN -->
      <div class="seller-info-card">
        <div id="sellerName" class="seller-name-title">Boutique Piyay</div>
        <div id="sellerAddr" class="seller-location">📍 Zòn Livrezon: Chaje...</div>

        <div class="social-links">
          <a id="waLink" href="#" target="_blank" class="social-item btn-wa">💬 WhatsApp</a>
          <a id="fbLink" href="#" target="_blank" class="social-item btn-fb" style="display:none;">🔵 Facebook</a>
        </div>
      </div>
    </div>
  </div>

  <div class="p-desc-section">
    <h2 style="font-family: 'Sora', sans-serif; font-weight: 800; margin-bottom: 20px;">Detay sou pwodwi a</h2>
    <div class="p-desc-content">{{ content }}</div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  const supP = supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13");

  async function loadSellerInfo() {
    const sellerId = "{{ page.seller_id }}"; // Nou bezwen ID sa nan front-matter a
    if (!sellerId || sellerId === "") return;

    const { data: profile, error } = await supP.from('profiles').select('*').eq('id', sellerId).single();

    if (profile) {
      const zone = profile.address || "Ayiti";
      document.getElementById('zoneLoader').innerText = "📍 Zòn: " + zone;
      document.getElementById('sellerName').innerText = "Vandè: " + (profile.full_name || "Machann");
      document.getElementById('sellerAddr').innerText = "📍 Zòn Livrezon: " + zone;

      if (profile.whatsapp) {
        document.getElementById('waLink').href = "https://wa.me/" + profile.whatsapp.replace(/\+/g, '');
      }
      if (profile.facebook_url) {
        document.getElementById('fbLink').href = profile.facebook_url;
        document.getElementById('fbLink').style.display = 'flex';
      }
    }
  }

  function buyDirect() {
    orderProduct('{{ page.title }}', '{{ page.price }}', '{{ page.id }}', '{{ page.image }}');
    openOrderModal();
  }

  document.addEventListener('DOMContentLoaded', loadSellerInfo);
</script>
