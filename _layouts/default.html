<!DOCTYPE html>
<html lang="{{ site.lang | default: 'fr-FR' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#ff4747">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- ✅ NOUVO: META TAGS POU WHATSAPP (LOGO AK TEKS) -->
    <meta property="og:title" content="Boutique Piyay 🚀 - Vin Vann ak Achte Pi Fasil">
    <meta property="og:description" content="Pi bon Marketplace an Ayiti! Kreye boutik ou gratis, jwenn kliyan rapid, epi jwi pi bon pri sou mache a.">
    <meta property="og:image" content="{{ '/assets/images/logo.png' | absolute_url }}">
    <meta property="og:url" content="{{ site.url }}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/png" href="{{ '/assets/images/logo.png' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/images/logo.png' | relative_url }}">

    {% seo %}

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">

    {% feed_meta %}

    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
      #welcome-social-bar {
        position: fixed; bottom: 20px; left: 20px; background: white; padding: 12px 20px;
        border-radius: 15px; box-shadow: 0 10px 35px rgba(0,0,0,0.15); display: none;
        align-items: center; gap: 12px; z-index: 9999; border-left: 5px solid #ff4747;
        animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); max-width: 300px;
      }
      @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .wsb-icon { width: 40px; height: 40px; background: #fff0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
      .wsb-title { display: block; font-weight: 800; font-size: 13px; color: #111; margin-bottom: 2px; }
      .wsb-desc { display: block; font-size: 11px; color: #666; }
      .wsb-close { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 0; }

      /* WhatsApp Floating Button */
      .whatsapp-float {
        position: fixed; width: 60px; height: 60px; bottom: 20px; right: 20px;
        background-color: #25d366; color: #FFF; border-radius: 50px; text-align: center;
        font-size: 30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); z-index: 10000;
        display: flex; align-items: center; justify-content: center; text-decoration: none;
        transition: all 0.3s ease;
      }
      .whatsapp-float:hover { transform: scale(1.1); background-color: #128c7e; }

      @media (max-width: 480px) {
        #welcome-social-bar { left: 10px; right: 10px; bottom: 90px; max-width: calc(100% - 20px); }
        .whatsapp-float { width: 50px; height: 50px; bottom: 15px; right: 15px; font-size: 25px; }
      }

      /* Toast notifications */
      #toast {
        position: fixed; top: 20px; right: 20px; background: #333; color: white;
        padding: 12px 24px; border-radius: 10px; z-index: 10000; display: none;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-weight: 600;
      }
    </style>
  </head>
  <body style="background-color: #f4f4f4; margin: 0; padding: 0;">
    <div id="toast"></div>
    <div style="width: 100%; background-color: white; min-height: 100vh; display: flex; flex-direction: column;">

      <!-- Header -->
      {% include header.html %}

      <!-- Content -->
      <main class="page-content" style="flex: 1;">
        {{ content }}
      </main>

      <!-- Footer -->
      {% include footer.html %}

      <!-- MODAL PANIER -->
      {% include order-modal.html %}

      <!-- WELCOME SOCIAL BAR -->
      <div id="welcome-social-bar">
        <div class="wsb-icon">🎁</div>
        <div class="wsb-content">
          <span class="wsb-title">Byenvini nan Boutique Piyay!</span>
          <span class="wsb-desc">Jwi pi bon pri yo jodi a. 🚀</span>
        </div>
        <button class="wsb-close" onclick="document.getElementById('welcome-social-bar').style.display='none'">&times;</button>
      </div>

      <!-- WHATSAPP FLOATING BUTTON -->
      <a href="https://wa.me/+50948868964?text=Bonjou%20Boutique%20Piyay,%20mwen%20bezwen%20yon%20enfòmasyon." class="whatsapp-float" target="_blank" aria-label="WhatsApp">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" viewBox="0 0 16 16">
          <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.573 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
      </a>

    </div>

    <!-- Script prensipal -->
    <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
    <script src="{{ '/assets/js/cart.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>

    <script>
      // Service Worker Registration with automatic update logic
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // Nouvo vèsyon disponib! Fòse rafrechi.
                  window.location.reload();
                }
              };
            };
          });
        });

        // Fòse rafrechi lè Service Worker a chanje
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
      }

      window.addEventListener('load', () => {
        setTimeout(() => {
          const bar = document.getElementById('welcome-social-bar');
          if (bar) bar.style.display = 'flex';
          setTimeout(() => {
            if (bar) bar.style.opacity = '0';
            setTimeout(() => { if (bar) bar.style.display = 'none'; }, 500);
          }, 8000);
        }, 2000);
      });
    </script>
  </body>
</html>
