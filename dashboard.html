<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Machann - Boutique Piyay</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #ff4747; --dark: #0f172a; --gray: #64748b; --light: #f8fafc; }
        body { background: var(--light); font-family: 'Sora', sans-serif; margin: 0; padding: 0; }
        .db-container { max-width: 900px; margin: 0 auto; padding: 20px; }

        /* NAVIGATION */
        .db-nav { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px; overflow-x: auto; scrollbar-width: none; }
        .db-nav::-webkit-scrollbar { display: none; }
        .db-tab { padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 700; color: var(--gray); white-space: nowrap; transition: 0.3s; border: none; background: none; }
        .db-tab.active { background: var(--dark); color: white; }

        /* CARDS */
        .white-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; text-align: center; border-bottom: 4px solid #eee; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-val { display: block; font-size: 24px; font-weight: 900; color: var(--dark); }
        .stat-lbl { font-size: 10px; color: var(--gray); text-transform: uppercase; font-weight: 800; margin-top: 5px; }

        /* REWARDS SYSTEM */
        .reward-box { background: #fffbeb; border: 2px solid #fef3c7; padding: 15px; border-radius: 15px; margin-top: 15px; }
        .badge-level { font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 50px; background: #94a3b8; color: white; }

        /* PWODWI CARD */
        .prod-item-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; display: flex; flex-direction: column; position: relative; }
        .prod-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; margin-bottom: 12px; }
        .prod-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-action { padding: 10px; border-radius: 10px; border: none; font-size: 11px; font-weight: 800; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-edit { background: #f1f5f9; color: var(--dark); }
        .btn-delete { background: #fee2e2; color: #ef4444; }

        /* PROFILE FORM */
        .profile-form label { display: block; font-size: 11px; font-weight: 800; color: var(--gray); margin-bottom: 8px; text-transform: uppercase; margin-top: 15px; }
        .profile-form input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-family: inherit; font-size: 14px; outline: none; box-sizing: border-box; }
        .btn-save { background: #00C853; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 20px; }

        /* SHARE BOX */
        .social-share-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-soc { flex: 1; padding: 10px; border-radius: 10px; border: none; color: white; font-weight: 800; font-size: 12px; cursor: pointer; text-align: center; text-decoration: none; }
        .bg-fb { background: #1877F2; } .bg-wa { background: #25D366; } .bg-tg { background: #0088cc; }

        /* API BOX */
        .api-card { background: #f1f5f9; border-left: 5px solid var(--dark); padding: 20px; border-radius: 10px; margin-top: 10px; }
        .api-key-box { background: white; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; border: 1px solid #ddd; margin: 10px 0; word-break: break-all; }
    </style>
</head>
<body>
    <div class="db-container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="/assets/images/logo.png" style="width:45px;">
                <h1 style="font-size: 20px; font-weight:900;">Boutik Pa m</h1>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <a href="/" style="text-decoration: none; background:#f1f5f9; color:var(--dark); padding:8px 15px; border-radius:10px; font-size:12px; font-weight:800;">MACHE 🏠</a>
                <button onclick="handleLogout()" style="background:#fee2e2; border:none; color:var(--primary); padding:8px 15px; border-radius:10px; font-size:12px; font-weight:800; cursor:pointer;">DEKONEKTE 🚪</button>
            </div>
        </header>

        <nav class="db-nav">
            <button class="db-tab active" onclick="switchTab('stat')">Statistik & Pwen</button>
            <button class="db-tab" onclick="switchTab('prod')">Pwodwi m yo</button>
            <button class="db-tab" onclick="switchTab('wallet')">Lajan 💰</button>
            <button class="db-tab" onclick="switchTab('profile')">Boutik & Profil 🔗</button>
            <button class="db-tab" onclick="switchTab('integration')" style="color: #6366f1;">API 🛠️</button>
            <button class="db-tab" onclick="goToVendre()" style="color:var(--primary); font-weight:900;">+ METE PWODWI</button>
        </nav>

        <!-- TAB: STATISTIK -->
        <div id="tab-stat" class="tab-content">
            <div class="stat-grid">
                <div class="stat-card" style="border-bottom-color: #3b82f6;"><span id="stat-orders" class="stat-val">0</span><span class="stat-lbl">Vant</span></div>
                <div class="stat-card" style="border-bottom-color: #f59e0b;"><span id="stat-points" class="stat-val">0</span><span class="stat-lbl">💎 Pwen</span></div>
                <div class="stat-card" style="border-bottom-color: #10b981;"><span id="stat-level" class="stat-val">Bronze</span><span class="stat-lbl">Nivo</span></div>
            </div>
            <div class="reward-box">
                <h3 style="margin:0 0 10px 0; font-size:16px;">🎁 Rekonpans</h3>
                <p style="font-size:13px; color:#92400e;">Ou gen <b id="p-count">0</b> pwen.</p>
                <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
                    <span class="badge-level">Bronze (100)</span>
                    <span class="badge-level">Argent (500)</span>
                    <span class="badge-level">Or (1000)</span>
                </div>
            </div>
        </div>

        <!-- TAB: PWODWI -->
        <div id="tab-prod" class="tab-content" style="display:none;">
            <div id="prods-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px;"></div>
        </div>

        <!-- TAB: WALLET -->
        <div id="tab-wallet" class="tab-content" style="display:none;">
            <div style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; padding: 30px; border-radius: 25px;">
                <span id="wall-balance" style="font-size:36px; font-weight:900; display:block;">0 HTG</span>
                <button style="background:var(--primary); color:white; border:none; padding:15px; border-radius:12px; font-weight:800; width:100%; cursor:pointer; margin-top:15px;">Retire Lajan 💸</button>
            </div>
        </div>

        <!-- TAB: PROFIL -->
        <div id="tab-profile" class="tab-content" style="display:none;">
            <div class="white-card">
                <h3>🔗 Pataje Boutik ou</h3>
                <div style="background:#f8fafc; padding:15px; border-radius:12px; display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                    <span id="shop-url-display" style="font-family:monospace; font-size:11px; flex:1; overflow:hidden; text-overflow:ellipsis;">Chaje...</span>
                    <button onclick="copyShopUrl()" style="background:var(--dark); color:white; border:none; padding:8px 15px; border-radius:8px; font-size:11px; cursor:pointer;">KOPYE</button>
                </div>
                <div class="social-share-btns">
                    <a id="share-wa" target="_blank" class="btn-soc bg-wa">WhatsApp</a>
                    <a id="share-fb" target="_blank" class="btn-soc bg-fb">Facebook</a>
                    <a id="share-tg" target="_blank" class="btn-soc bg-tg">Telegram</a>
                </div>
            </div>
            <div class="profile-form white-card">
                <h3>✏️ Edite Profil Boutik</h3>
                <label>Non Boutik</label><input type="text" id="prof-name">
                <label>WhatsApp</label><input type="text" id="prof-whatsapp">
                <label>Adrès</label><input type="text" id="prof-address">
                <button class="btn-save" onclick="saveProfile()">Sove Chanjman ✅</button>
            </div>
        </div>

        <!-- TAB: ENTEGRASYON API -->
        <div id="tab-integration" class="tab-content" style="display:none;">
            <div class="white-card">
                <h2 style="font-weight: 900; color: #6366f1;">🛠️ Entegrasyon API</h2>
                <div class="api-card">
                    <label style="font-weight: 800; font-size: 11px;">MERCHANT ID (API KEY)</label>
                    <div id="api-key-display" class="api-key-box">Chaje...</div>
                    <button onclick="copyApiKey()" style="width:100%; background:var(--dark); color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:800;">KOPYE KLE API 📋</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supD = supabase.createClient("https://letyferfjpxmstohvgcj.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg");
        let currentUser = null;

        async function init() {
            const { data: { user } } = await supD.auth.getUser();
            if (!user) return window.location.href = "/login.html";
            currentUser = user;
            loadAll();
            syncPointsWithSales();
        }

        async function syncPointsWithSales() {
            const { data: orders } = await supD.from('orders').select('amount').eq('seller_id', currentUser.id);
            if (orders) {
                const totalSales = orders.reduce((sum, o) => sum + parseFloat(o.amount || 0), 0);
                const newPoints = Math.floor(totalSales);
                await supD.from('profiles').update({ points: newPoints }).eq('id', currentUser.id);
                document.getElementById('stat-points').innerText = newPoints;
                document.getElementById('p-count').innerText = newPoints;
                updateRewardUI(newPoints);
            }
        }

        function updateRewardUI(points) {
            const levels = [{t:100, c:'#cd7f32', n:'Bronze'}, {t:500, c:'#c0c0c0', n:'Argent'}, {t:1000, c:'#ffd700', n:'Or'}];
            let currentLevel = 'Debutants';
            const badges = document.querySelectorAll('.badge-level');
            levels.forEach((l, i) => {
                if (points >= l.t) { currentLevel = l.n; badges[i].style.background = l.c; }
            });
            document.getElementById('stat-level').innerText = currentLevel;
        }

        async function loadAll() {
            const { data: prods } = await supD.from('user_products').select('*').eq('seller_id', currentUser.id);
            if (prods) {
                document.getElementById('prods-grid').innerHTML = prods.map(p => `
                    <div class="prod-item-card">
                        <img src="${p.image_url}" class="prod-img" onerror="this.src='https://ui-avatars.com/api/?name=P&background=f1f5f9&color=cbd5e1'">
                        <div style="font-size:13px; font-weight:800;">${p.title}</div>
                        <div style="color:var(--primary); font-weight:900;">${p.price} HTG</div>
                        <div class="prod-actions">
                            <a href="/edit-product.html?id=${p.id}" class="btn-action btn-edit">✏️ Edit</a>
                            <button onclick="deleteProduct('${p.id}')" class="btn-action btn-delete">🗑️ Retire</button>
                        </div>
                    </div>
                `).join('');
            }

            const { data: prof } = await supD.from('profiles').select('*').eq('id', currentUser.id).single();
            if (prof) {
                document.getElementById('prof-name').value = prof.full_name || '';
                document.getElementById('prof-whatsapp').value = prof.whatsapp_number || '';
                document.getElementById('prof-address').value = prof.address || '';
                document.getElementById('api-key-display').innerText = currentUser.id;
                const shopLink = `${window.location.origin}/boutik-machann.html?id=${currentUser.id}`;
                document.getElementById('shop-url-display').innerText = shopLink;

                document.getElementById('share-wa').href = `https://wa.me/?text=Vizite boutik mwen sou Boutique Piyay: ${shopLink}`;
                document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${shopLink}`;
                document.getElementById('share-tg').href = `https://t.me/share/url?url=${shopLink}`;
            }
        }

        async function saveProfile() {
            const { error } = await supD.from('profiles').update({
                full_name: document.getElementById('prof-name').value,
                whatsapp_number: document.getElementById('prof-whatsapp').value,
                address: document.getElementById('prof-address').value
            }).eq('id', currentUser.id);
            if (error) alert("Erè: " + error.message);
            else alert("✅ Profil sove!");
        }

        async function deleteProduct(id) {
            if (confirm("Efase pwodwi sa a?")) { await supD.from('user_products').delete().eq('id', id); loadAll(); }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.db-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = 'block';
            event.target.classList.add('active');
        }

        function copyShopUrl() { navigator.clipboard.writeText(document.getElementById('shop-url-display').innerText).then(() => alert("Kopye!")); }
        function copyApiKey() { navigator.clipboard.writeText(document.getElementById('api-key-display').innerText).then(() => alert("Kle API kopye!")); }
        function handleLogout() { supD.auth.signOut().then(() => location.href='/'); }
        function goToVendre() { location.href='/vendre.html'; }

        init();
    </script>
</body>
</html>
