---
layout: default
title: Espas Kontwòl Mwen - Boutique Piyay
---

<style>
    .dashboard-container { padding: 20px 15px; max-width: 1200px; margin: 0 auto; }
    .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 25px; }
    @media (max-width: 992px) { .main-grid { grid-template-columns: 1fr; } }
    .card-style { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 25px; }
    .btn-action { padding: 10px 15px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; font-size: 12px; transition: 0.3s; }
    .btn-flash { background: #fff5f5; color: #ff4747; border: 1px solid #ff4747; }
    .btn-flash:hover { background: #ff4747; color: white; }
</style>

<div class="dashboard-container">
    <div class="card-style" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <h1 style="font-family: 'Sora', sans-serif; font-weight: 800; margin: 0; font-size: 24px;">🏠 Espas Kontwòl</h1>
        <div style="display: flex; gap: 10px;">
            <a href="/vendre.html" class="btn-action" style="background: #ff4747; color: white; text-decoration: none;">➕ Vann Pwodwi</a>
            <button onclick="handleLogout()" class="btn-action" style="background: #f1f5f9; color: #334155;">🚪 Soti</button>
        </div>
    </div>

    <!-- 🛡️ KONSÈY SEKIRITE -->
    <div style="background: #fffbeb; border: 1px solid #fef3c7; padding: 20px; border-radius: 20px; margin-bottom: 25px;">
        <h3 style="margin: 0; font-size: 15px; font-weight: 800; color: #92400e;">🛡️ KONSÈY SEKIRITE</h3>
        <p style="margin: 5px 0 0; font-size: 13px; color: #b45309;">Mande 50% garanti avan ou deplase livre pwodwi a.</p>
    </div>

    <div class="main-grid">
        <div class="content-left">
            <!-- PWODWI GRID -->
            <div class="card-style">
                <h2 style="font-size: 18px; font-weight: 800; margin-bottom: 20px;">🛒 Pwodwi Mwen yo</h2>
                <div id="myProductsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px;">
                    <!-- JS ap chaje sa -->
                </div>
            </div>
        </div>

        <div class="content-right">
            <div class="card-style">
                <h2 style="font-size: 18px; font-weight: 800; margin-bottom: 20px;">👤 Pwofil & Sosyal</h2>
                <label style="display: block; font-size: 10px; font-weight: 800; color: #94a3b8; margin-bottom: 5px;">WHATSAPP</label>
                <input type="tel" id="waNumber" style="width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; margin-bottom: 15px;">
                <label style="display: block; font-size: 10px; font-weight: 800; color: #94a3b8; margin-bottom: 5px;">ADRÈS</label>
                <input type="text" id="userAddress" style="width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; margin-bottom: 20px;">
                <button onclick="saveProfile()" id="saveBtn" style="width: 100%; padding: 15px; background: #0f172a; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer;">Sove Chanjman</button>
                <div id="saveStatus" style="margin-top: 10px; font-size: 12px; text-align: center; display: none;"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const supD = supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13");
    let currentUser = null;

    async function initDashboard() {
        const { data: { user } } = await supD.auth.getUser();
        if (!user) { window.location.href = "/login.html"; return; }
        currentUser = user;
        const { data: profile } = await supD.from('profiles').select('*').eq('id', user.id).single();
        if (profile) {
            document.getElementById('waNumber').value = profile.whatsapp || "";
            document.getElementById('userAddress').value = profile.address || "";
        }
        loadMyProducts(user.id);
    }

    async function loadMyProducts(userId) {
        const { data: prods } = await supD.from('user_products').select('*').eq('seller_id', userId).order('created_at', { ascending: false });
        const grid = document.getElementById('myProductsGrid');

        if (!prods || prods.length === 0) { grid.innerHTML = '<p>Okenn pwodwi.</p>'; return; }

        grid.innerHTML = prods.map(p => `
            <div style="background:#f8fafc; padding:10px; border-radius:15px; border:1px solid #e2e8f0; text-align:center;">
                <img src="${p.image_url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; margin-bottom:8px;">
                <div style="font-weight:800; font-size:11px; height:30px; overflow:hidden;">${p.title}</div>
                <div style="color:#ff4747; font-weight:900; margin-bottom:10px;">${p.price} HTG</div>

                <div style="display:flex; flex-direction:column; gap:5px;">
                    <button onclick="toggleFlash('${p.id}', ${p.is_flash_sale})" class="btn-action btn-flash">
                        ${p.is_flash_sale ? '⚡ Retire Flash' : '⚡ Mete Flash'}
                    </button>
                    <button onclick="handleDeleteProduct('${p.id}')" style="background:none; border:none; color:#ef4444; font-size:10px; cursor:pointer; font-weight:700;">🗑️ Efase</button>
                </div>
            </div>
        `).join('');
    }

    async function toggleFlash(id, currentStatus) {
        if (!currentStatus) {
            // Tcheke limit 3 a
            const { count } = await supD.from('user_products').select('*', { count: 'exact', head: true }).eq('seller_id', currentUser.id).eq('is_flash_sale', true);
            if (count >= 3) return alert("Ou ka gen sèlman 3 pwodwi nan vante flash!");

            const oldP = prompt("Tape Ansyen Pri a (sa k ap bare a):", "700");
            if (!oldP) return;

            await supD.from('user_products').update({
                is_flash_sale: true,
                old_price: parseFloat(oldP),
                flash_expiry: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000)
            }).eq('id', id);
        } else {
            await supD.from('user_products').update({ is_flash_sale: false, old_price: null }).eq('id', id);
        }
        loadMyProducts(currentUser.id);
    }

    async function handleDeleteProduct(id) {
        if (confirm("Efase pwodwi sa a?")) {
            await supD.from('user_products').delete().eq('id', id);
            loadMyProducts(currentUser.id);
        }
    }

    async function saveProfile() {
        await supD.from('profiles').update({
            whatsapp: document.getElementById('waNumber').value.trim(),
            address: document.getElementById('userAddress').value.trim()
        }).eq('id', currentUser.id);
        alert("Sove! ✅");
    }

    async function handleLogout() { await supD.auth.signOut(); window.location.href = "/"; }
    document.addEventListener('DOMContentLoaded', initDashboard);
</script>
