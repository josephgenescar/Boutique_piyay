<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Boutique Piyay</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: white; width: 100%; max-width: 400px; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; }
    h1 { font-weight: 900; margin-bottom: 10px; color: #0f172a; font-size: 24px; }
    p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
    .form-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
    input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; outline: none; transition: 0.3s; }
    input:focus { border-color: #ff4747; }
    .btn-login { width: 100%; padding: 16px; background: #0f172a; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
    #msg { margin-top: 15px; font-size: 13px; font-weight: 700; display: none; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🛡️ Admin Access</h1>
    <p>Antre imèl ak modpas pèsonèl ou</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@email.com">
    </div>
    <div class="form-group">
      <label>Modpas</label>
      <input type="password" id="pass" placeholder="••••••••">
    </div>
    <button id="loginBtn" onclick="handleLogin()" class="btn-login">KONEKTE</button>
    <div id="msg"></div>
  </div>

  <script>
    const SB_URL = "https://letyferfjpxmstohvgcj.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg";
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    async function handleLogin() {
      const e = document.getElementById('email').value.trim();
      const p = document.getElementById('pass').value;
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('msg');

      if(!e || !p) return showMsg("Antre tout enfòmasyon yo!", true);

      btn.innerText = "Y AP VERIFYE..."; btn.disabled = true;

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email: e, password: p });
        if (error) throw error;

        // Tcheke si se yon admin
        const { data: profile } = await supabase.from('profiles').select('role').eq('id', data.user.id).single();

        if (profile?.role === 'admin') {
          showMsg("✅ Aksè otorize! Redireksyon...", false);
          // Kreye token lokal pou konpatibilite ak lòt paj yo
          localStorage.setItem('admin_auth_token', 'sb_session_' + Date.now());
          localStorage.setItem('admin_auth_time', Date.now().toString());
          setTimeout(() => window.location.href = '/admin-stats.html', 1500);
        } else {
          await supabase.auth.signOut();
          throw new Error("Ou pa gen dwa admin!");
        }
      } catch (err) {
        showMsg("❌ " + err.message, true);
        btn.innerText = "KONEKTE"; btn.disabled = false;
      }
    }

    function showMsg(m, isErr) {
      const msg = document.getElementById('msg');
      msg.innerText = m;
      msg.style.display = 'block';
      msg.style.background = isErr ? '#fee2e2' : '#dcfce7';
      msg.style.color = isErr ? '#ef4444' : '#15803d';
    }
  </script>
</body>
</html>
