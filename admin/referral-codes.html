<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Kòd Referans — Boutique Piyay</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { margin: 0; font-family: Inter, sans-serif; background: #eef2ff; color: #0f172a; }
    .page-wrap { max-width: 1040px; margin: 0 auto; padding: 32px 24px; }
    .hero { margin-bottom: 28px; }
    .hero h1 { margin: 0 0 8px; font-size: 2rem; }
    .hero p { margin: 0; color: #475569; max-width: 720px; line-height: 1.7; }
    .card { background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08); padding: 28px; margin-bottom: 24px; }
    .grid { display: grid; gap: 18px; }
    .field-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: stretch; }
    .field-row input { width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 16px; font-size: 14px; }
    .btn { border: none; border-radius: 16px; padding: 14px 20px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-secondary { background: #f8fafc; color: #111827; border: 1px solid #cbd5e1; }
    .btn-generate { background: #ef4444; color: white; }
    .alert { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; border-radius: 18px; padding: 18px 22px; margin-bottom: 20px; font-weight: 700; }
    .note { color: #475569; font-size: 14px; line-height: 1.7; }
    .message { min-height: 24px; font-size: 14px; margin-top: 14px; }
    .table { width: 100%; border-collapse: collapse; margin-top: 14px; }
    .table th, .table td { text-align: left; padding: 14px 12px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
    .table th { color: #334155; font-weight: 700; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .status-unused { background: #dcfce7; color: #166534; }
    .status-used { background: #fee2e2; color: #b91c1c; }
    .top-link { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; color: #2563eb; text-decoration: none; font-weight: 700; }
    .top-link:hover { text-decoration: underline; }
    .page-wrap { max-width: 760px; margin: 0 auto; padding: 32px 24px; }
    .card { background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08); padding: 28px; margin-top: 40px; }
    .card h1 { font-size: 2rem; margin-bottom: 16px; }
    .card p { color: #475569; line-height: 1.8; margin-bottom: 16px; }
    .card a { color: #2563eb; font-weight: 700; text-decoration: none; }
    .card a:hover { text-decoration: underline; }
    .redirect-note { display: inline-flex; align-items: center; gap: 8px; background: #dbeafe; color: #1d4ed8; padding: 14px 18px; border-radius: 16px; margin-top: 12px; }
    @media (max-width: 720px) { .page-wrap { padding: 24px 18px; } }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="card">
      <h1>Page Referans Retire</h1>
      <p>Kòd referans yo kounye a jere dirèkteman nan <strong>admin-stats.html</strong>. Paj sa a pa itilize ankò.</p>
      <p>Paj sa a ap redireksyonnen ou otomatikman nan admin stats nan kèk segond.</p>
      <div class="redirect-note">Si redireksyon an pa mache, klike <a href="/admin-stats.html">isit la pou ale nan Admin Stats</a>.</div>
    </div>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = '/admin-stats.html';
    }, 2500);
  </script>
</body>
</html>
