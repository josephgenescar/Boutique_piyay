backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

locale: 'fr'

collections:
  # 1. MARKETPLACE INSIGHTS (Done ki soti nan Supabase)
  - name: "marketplace_admin"
    label: "🚀 Marketplace Insights (Live)"
    files:
      - label: "Statistik & Feedback"
        name: "insights"
        file: "_data/marketplace_insights.yml" # Fichye sa a ap sèvi kòm "placeholder"
        fields:
          - {label: "Nòt Admin", name: "admin_notes", widget: "text", default: "Paj sa a pèmèt ou wè sa k ap pase nan Supabase an tan reyèl."}

  # 2. PWODWI YO (Akseswa chanm yo)
  - name: "products"
    label: "📦 Pwodwi (Akseswa)"
    folder: "_products"
    create: true
    fields:
      - {label: "Non Pwodwi a", name: "title", widget: "string"}
      - {label: "Pri (HTG)", name: "price", widget: "number"}
      - {label: "Kategori", name: "category", widget: "relation", collection: "categories", search_fields: ["title"], value_field: "title", display_fields: ["display_name"]}
      - {label: "Foto Prensipal", name: "image", widget: "image"}
      - {label: "Vente Flash ?", name: "flash_sale", widget: "boolean", default: false}
      - {label: "Deskripsyon", name: "body", widget: "markdown"}

  # 3. KATEGORI YO
  - name: "categories"
    label: "🗂 Kategori (Chanm)"
    folder: "_categories"
    create: true
    fields:
      - {label: "ID Kategori", name: "title", widget: "string"}
      - {label: "Non k ap parèt", name: "display_name", widget: "string"}
      - {label: "Foto", name: "image", widget: "image"}

  # 4. SETTINGS
  - name: "settings"
    label: "⚙️ Kontwòl Kay la"
    files:
      - label: "Enfòmasyon & Rezo Sosyal"
        name: "general"
        file: "_data/settings.yml"
        fields:
          - {label: "Email Kontak", name: "email", widget: "string"}
          - {label: "WhatsApp Admin", name: "whatsapp", widget: "string"}
