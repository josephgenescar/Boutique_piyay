---
layout: default
title: Vann yon Pwodwi - Boutique Piyay
---

<div class="container" style="max-width: 800px; padding: 40px 20px;">
    <div id="vendreCard" class="seller-card" style="background: white; padding: 35px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.08);">
        <h1 style="font-family: 'Sora', sans-serif; font-weight: 800; margin-bottom: 25px; color: #0f172a;">🚀 Pibliye yon Pwodwi</h1>

        <form id="uploadForm">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 13px;">NON PWODWI A *</label>
                <input type="text" id="prodTitle" required placeholder="Eg: Chemise Soie Ble" style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 13px;">PRI PWODWI A (HTG) *</label>
                    <input type="number" id="prodPrice" required placeholder="Eg: 500" style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc;">
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 13px;">CHWAZI KATEGORI *</label>
                    <select id="prodCat" required style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc;">
                        <option value="">-- Chwazi --</option>
                        <option value="electronique">Électronique</option>
                        <option value="habillement">Mode & Habillement</option>
                        <option value="maison">Maison & Bureau</option>
                        <option value="beaute">Beauté & Cosmétiques</option>
                        <option value="epicerie">Épicerie & Supermarché</option>
                    </select>
                </div>
            </div>

            <!-- SEKSYON VANTE FLASH -->
            <div style="background: #fff5f5; padding: 20px; border-radius: 15px; border: 2px dashed #ff4747; margin-bottom: 25px;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <input type="checkbox" id="isFlash" style="width: 20px; height: 20px; accent-color: #ff4747;">
                    <label for="isFlash" style="font-weight: 800; color: #ff4747; cursor: pointer;">⚡ METE PWODWI SA NAN VANTE FLASH</label>
                </div>
                <div id="flashOptions" style="display: none;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 11px;">ANSYEN PRI (HTG)</label>
                    <input type="number" id="oldPrice" placeholder="Eg: 1000" style="width: 100%; padding: 12px; border: 1px solid #ffcccc; border-radius: 10px;">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 13px;">DESKRIPSYON PWODWI A *</label>
                <textarea id="prodDesc" required placeholder="Bay detay sou pwodwi a..." style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc; min-height: 80px; font-family: inherit;"></textarea>
            </div>

            <div class="form-group" style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 13px;">FOTO PWODWI A *</label>
                <input type="file" id="prodImage" accept="image/*" required style="width: 100%; padding: 12px; border: 2px dashed #cbd5e1; border-radius: 12px; background: #f8fafc;">
            </div>

            <button type="submit" id="submitBtn" style="width: 100%; padding: 20px; background: #ff4747; color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer;">🚀 PIBLIYE PWODWI A</button>
        </form>
        <div id="statusMsg" style="margin-top: 25px; text-align: center; font-weight: 700; display: none; padding: 15px; border-radius: 10px;"></div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const supV = window._supabaseClient || supabase.createClient("https://letyferfjpxmstohvgcj.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg");

    document.getElementById('isFlash').onchange = function() {
        document.getElementById('flashOptions').style.display = this.checked ? 'block' : 'none';
    };

    async function uploadToImageKit(file) {
        try {
            // ✅ ITILIZE CHEMEN DIRÈK LA KI MACHE SOU NETLIFY
            const authRes = await fetch("/.netlify/functions/auth");

            if (!authRes.ok) {
                const text = await authRes.text();
                console.error("Auth Error Response:", text);
                throw new Error("Sèvis foto a pa ka konekte. Si w ap teste lokalman, sèvi ak 'netlify dev'.");
            }

            const authData = await authRes.json();

            const formData = new FormData();
            formData.append("file", file);
            formData.append("publicKey", authData.publicKey);
            formData.append("signature", authData.signature);
            formData.append("expire", authData.expire);
            formData.append("token", authData.token);
            formData.append("fileName", `prod_${Date.now()}.jpg`);

            const uploadRes = await fetch("https://upload.imagekit.io/api/v1/files/upload", {
                method: "POST",
                body: formData
            });

            if (!uploadRes.ok) throw new Error("Erè ImageKit: " + uploadRes.statusText);

            const uploadData = await uploadRes.json();
            return uploadData.url;
        } catch (err) {
            throw new Error(err.message);
        }
    }

    document.getElementById('uploadForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('statusMsg');
        const file = document.getElementById('prodImage').files[0];
        const isFlash = document.getElementById('isFlash').checked;

        btn.disabled = true; btn.innerText = "⏳ Tanpri tann...";
        status.style.display = 'block'; status.innerText = "Piblikasyon foto a...";

        try {
            const { data: { user } } = await supV.auth.getUser();
            if(!user) throw new Error("Ou dwe konekte anvan w pibliye.");

            const imageUrl = await uploadToImageKit(file);

            status.innerText = "Anrejistreman pwodwi...";
            const { error: dbErr } = await supV.from('user_products').insert([{
                title: document.getElementById('prodTitle').value,
                price: parseFloat(document.getElementById('prodPrice').value),
                old_price: isFlash ? parseFloat(document.getElementById('oldPrice').value) : null,
                category: document.getElementById('prodCat').value,
                description: document.getElementById('prodDesc').value,
                image_url: imageUrl,
                seller_id: user.id,
                is_approved: true,
                created_at: new Date().toISOString()
            }]);

            if (dbErr) throw dbErr;

            status.style.color = "#00C853"; status.innerText = "🎉 Pwodwi pibliye ak siksè!";
            setTimeout(() => window.location.href = "/index.html", 2000);
        } catch (err) {
            status.style.color = "#ff4747"; status.innerText = "❌ Erè: " + err.message;
            btn.disabled = false; btn.innerText = "ESEYE ANKÒ";
        }
    };
</script>
