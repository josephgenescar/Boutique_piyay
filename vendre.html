---
layout: default
title: Vann yon Pwodwi - Boutique Piyay
---

<div class="container" style="max-width: 800px; padding: 40px 20px;">

    <div id="loading" style="text-align: center; padding: 100px 0;">
        <div style="font-size: 50px; animation: spin 1s linear infinite;">⏳</div>
        <p style="margin-top: 15px; color: #666;">Verifikasyon kont ou...</p>
    </div>

    <div id="vendreCard" class="seller-card" style="display: none; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.08);">
        <h1 style="font-family: 'Sora', sans-serif; font-weight: 800; margin-bottom: 25px; color: #0f172a;">🚀 Mete yon pwodwi an liy</h1>
        <p style="font-size: 13px; color: #64748b; margin-bottom: 20px; background: #f0f9ff; padding: 10px; border-radius: 8px; border-left: 4px solid #3b82f6;">ℹ️ Ou p ap peye okenn frè pou pibliye. Platfòm nan ap pran sèlman 3% komisyon sou chak vant ou fè.</p>

        <form id="uploadForm">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 13px;">NON PWODWI A *</label>
                <input type="text" id="prodTitle" required placeholder="Eg: Chemise Soie Ble" style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 13px;">PRI PWODWI A (HTG) *</label>
                    <input type="number" id="prodPrice" required placeholder="Eg: 500" style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc;" oninput="calculateDiscount()">
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 13px;">CHWAZI KATEGORI *</label>
                    <select id="prodCat" required style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc;">
                        <option value="">-- Chwazi --</option>
                        <option value="electronique">Électronique</option>
                        <option value="habillement">Mode & Habillement</option>
                        <option value="maison">Maison & Bureau</option>
                        <option value="beaute">Beauté & Cosmétiques</option>
                        <option value="epicerie">Épicerie & Supermarché</option>
                    </select>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 13px;">DESKRIPSYON PWODWI A *</label>
                <textarea id="prodDesc" required placeholder="Bay detay sou pwodwi a..." style="width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; background: #f8fafc; min-height: 80px; font-family: inherit;"></textarea>
            </div>

            <div id="flashOption" style="background: #fff5f5; padding: 25px; border-radius: 20px; border: 2px dashed #ff4747; margin-bottom: 25px;">
                <label style="display: flex; align-items: center; gap: 12px; cursor: pointer; font-weight: 800; color: #ff4747; font-size: 16px;">
                    <input type="checkbox" id="isFlash" style="width: 22px; height: 22px;" onchange="toggleFlash()"> ⚡ Aktive Vante Flash
                </label>

                <div id="flashDetails" style="display: none; margin-top: 20px; border-top: 1px solid #ffcbcb; padding-top: 15px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: end;">
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #ff4747; font-size: 12px;">ANSYEN PRI *</label>
                            <input type="number" id="oldPrice" placeholder="Eg: 750" style="width: 100%; padding: 12px; border: 1px solid #ffcbcb; border-radius: 10px; background: white;" oninput="calculateDiscount()">
                        </div>
                        <div id="discountResult" style="padding: 12px; background: #ff4747; color: white; border-radius: 10px; text-align: center; font-weight: 800; font-size: 14px;">
                            Rabè: 0%
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 13px;">FOTO PWODWI A * <small style="color: #ff4747;">(Max: 2MB)</small></label>
                <input type="file" id="prodImage" accept="image/*" required style="width: 100%; padding: 12px; border: 2px dashed #cbd5e1; border-radius: 12px; background: #f8fafc;">
                <div id="preview" style="margin-top: 20px; display: none; text-align: center;">
                    <img id="imgPreview" src="" style="width: 180px; height: 180px; object-fit: cover; border-radius: 15px; border: 3px solid #ff4747;">
                </div>
            </div>

            <button type="submit" id="submitBtn" style="width: 100%; padding: 18px; background: #ff4747; color: white; border: none; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s;">🚀 Pibliye Pwodwi a</button>
        </form>
        <div id="statusMsg" style="margin-top: 25px; text-align: center; font-weight: 700; display: none; padding: 15px; border-radius: 10px;"></div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const supV = supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13");
    const IMAGEKIT_PUBLIC_KEY = "public_uNu7y8VCvauuJEXPsd04krw5FEg=";
    const MAX_FILE_SIZE = 2 * 1024 * 1024;

    function toggleFlash() { document.getElementById('flashDetails').style.display = document.getElementById('isFlash').checked ? 'block' : 'none'; }
    function calculateDiscount() {
        const price = parseFloat(document.getElementById('prodPrice').value) || 0;
        const oldPrice = parseFloat(document.getElementById('oldPrice').value) || 0;
        const resultDiv = document.getElementById('discountResult');
        if (price > 0 && oldPrice > price) {
            const disc = Math.round(((oldPrice - price) / oldPrice) * 100);
            resultDiv.innerText = `Rabè: -${disc}%`; resultDiv.style.background = "#00C853";
        } else { resultDiv.innerText = "Rabè: 0%"; resultDiv.style.background = "#ff4747"; }
    }

    async function checkAuthAndStatus() {
        const { data: { user } } = await supV.auth.getUser();
        if (!user) { window.location.href = "/login.html"; return; }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('vendreCard').style.display = 'block';
    }

    document.getElementById('prodImage').onchange = function() {
        const [file] = this.files;
        if (file && file.size <= MAX_FILE_SIZE) {
            document.getElementById('imgPreview').src = URL.createObjectURL(file);
            document.getElementById('preview').style.display = 'block';
        } else if (file) { alert("Foto a twò lou (Max 2MB)"); this.value = ""; }
    };

    document.getElementById('uploadForm').onsubmit = async function(e) {
        e.preventDefault();
        const { data: { user } } = await supV.auth.getUser();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('statusMsg');
        const file = document.getElementById('prodImage').files[0];
        const isFlash = document.getElementById('isFlash').checked;

        btn.disabled = true; btn.innerText = "⏳ PIBLIKASYON...";
        status.style.display = 'block'; status.innerText = "Chajman foto...";

        try {
            const fileName = `prod_${Date.now()}`;
            const authRes = await fetch(`/.netlify/functions/auth?fileName=${fileName}`);
            const authData = await authRes.json();

            const formData = new FormData();
            formData.append("file", file); formData.append("fileName", fileName);
            formData.append("publicKey", IMAGEKIT_PUBLIC_KEY); formData.append("signature", authData.signature);
            formData.append("expire", authData.expire); formData.append("token", authData.token);
            formData.append("useUniqueFileName", "true"); formData.append("folder", "/products");

            const ikRes = await fetch("https://upload.imagekit.io/api/v1/files/upload", { method: "POST", body: formData });
            const ikData = await ikRes.json();

            const { error: dbErr } = await supV.from('user_products').insert([{
                title: document.getElementById('prodTitle').value,
                price: parseFloat(document.getElementById('prodPrice').value),
                old_price: isFlash ? parseFloat(document.getElementById('oldPrice').value) : null,
                category: document.getElementById('prodCat').value,
                description: document.getElementById('prodDesc').value,
                image_url: ikData.url,
                seller_id: user.id,
                is_flash_sale: isFlash,
                created_at: new Date()
            }]);

            if (dbErr) throw dbErr;
            status.style.color = "#00C853"; status.innerText = "🎉 Pwodwi pibliye!";
            setTimeout(() => window.location.href = "/dashboard.html", 1500);
        } catch (err) {
            status.style.color = "#ff4747"; status.innerText = "❌ " + err.message;
            btn.disabled = false; btn.innerText = "ESEYE ANKÒ";
        }
    };
    document.addEventListener('DOMContentLoaded', checkAuthAndStatus);
</script>
