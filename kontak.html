<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
  :root {
    --primary: #ff4747;
    --primary-light: rgba(255,71,71,0.08);
    --dark: #0f172a;
    --gray: #64748b;
    --light: #f1f5f9;
    --green: #10b981;
    --radius: 20px;
    --radius-sm: 12px;
  }

  .kontak-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  /* ── HERO ── */
  .kontak-hero {
    background: linear-gradient(135deg, var(--dark) 0%, #1e293b 60%, #1a0f35 100%);
    border-radius: 24px;
    padding: 44px 40px;
    color: white;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .kontak-hero h1 { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
  .kontak-hero p { font-size: 14px; color: rgba(255,255,255,0.6); }

  /* ── GRID ── */
  .kontak-grid { display: grid; grid-template-columns: 1fr 1.6fr; gap: 24px; }
  @media (max-width: 720px) { .kontak-grid { grid-template-columns: 1fr; } }

  .info-card {
    background: white; border-radius: var(--radius); padding: 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px;
    text-decoration: none; transition: 0.2s;
  }
  .info-card:hover { transform: translateY(-2px); }
  .info-icon { font-size: 24px; }
  .info-text-label { font-size: 10px; font-weight: 800; color: var(--gray); text-transform: uppercase; }
  .info-text-val { font-size: 14px; font-weight: 700; color: var(--dark); }

  .form-card { background: white; border-radius: var(--radius); padding: 28px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
  .form-label { display: block; font-size: 11px; font-weight: 800; color: var(--gray); margin-bottom: 8px; }
  .form-input, .form-textarea {
    width: 100%; padding: 13px; border: 2px solid #f1f5f9; border-radius: var(--radius-sm);
    margin-bottom: 15px; outline: none; font-family: inherit;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--primary); }

  .btn-send {
    width: 100%; padding: 16px; background: var(--primary); color: white;
    border: none; border-radius: var(--radius-sm); font-weight: 900; cursor: pointer;
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    padding: 12px 25px; border-radius: 50px; color: white; transition: 0.4s; z-index: 9999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--primary); }
</style>

<div class="kontak-wrap">
  <div class="kontak-hero">
    <h1>Kontakte Nou</h1>
    <p>Ekri nou — n ap reponn ou rapid!</p>
  </div>

  <div class="kontak-grid">
    <div class="info-col">
      <a href="https://wa.me/50948868964" class="info-card">
        <div class="info-icon">💬</div>
        <div>
          <div class="info-text-label">WhatsApp</div>
          <div class="info-text-val">+509 4886-8964</div>
        </div>
      </a>
      <a href="mailto:support@boutiquepiyay.site" class="info-card">
        <div class="info-icon">✉️</div>
        <div>
          <div class="info-text-label">Email</div>
          <div class="info-text-val">support@boutiquepiyay.site</div>
        </div>
      </a>
    </div>

    <div class="form-card">
      <form id="contactForm">
        <label class="form-label">Non ou</label>
        <input type="text" id="cName" class="form-input" placeholder="Jan Batis" required>

        <label class="form-label">Email ou</label>
        <input type="email" id="cEmail" class="form-input" placeholder="ou@email.com" required>

        <label class="form-label">Mesaj ou</label>
        <textarea id="cMessage" class="form-textarea" placeholder="Ki keksyon ou genyen?" required></textarea>

        <button type="submit" id="sendBtn" class="btn-send">Voye Mesaj la</button>
      </form>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ✅ BON SUPABASE CONFIG
  const SUP_URL = "https://letyferfjpxmstohvgcj.supabase.co";
  const SUP_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg";
  const supC = window.supabase.createClient(SUP_URL, SUP_KEY);

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 4000);
  }

  document.getElementById('contactForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('sendBtn');
    btn.disabled = true; btn.innerText = '⏳ Ap voye...';

    const { error } = await supC.from('feedback').insert([{
      name:    document.getElementById('cName').value,
      email:   document.getElementById('cEmail').value,
      message: document.getElementById('cMessage').value
    }]);

    if (error) {
      showToast('❌ Erè: ' + error.message, 'error');
      btn.disabled = false; btn.innerText = 'Voye Mesaj la';
    } else {
      showToast('✅ Mèsi! Mesaj ou a ale ak siksè.', 'success');
      document.getElementById('contactForm').reset();
      btn.disabled = false; btn.innerText = 'Voye Mesaj la';
    }
  };
</script>
