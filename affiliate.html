<script>
    const SUP_URL_A = "https://letyferfjpxmstohvgcj.supabase.co";
    const SUP_KEY_A = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg";
    const supabaseA = window.supabase.createClient(SUP_URL_A, SUP_KEY_A);
    let currentAff = null;

    async function initAffiliate() {
        const { data: { user } } = await supabaseA.auth.getUser();
        if (!user) return;
        const { data: aff } = await supabaseA.from('affiliates').select('*').eq('user_id', user.id).single();
        if (!aff) { renderOnboarding(user); return; }
        currentAff = aff;
        renderDashboard(aff);
        loadTransactions();
    }

    function renderDashboard(aff) {
        const refLink = `${window.location.origin}/?ref=${aff.referral_code}`;
        const balance = parseFloat(aff.balance || 0).toFixed(0);
        document.getElementById('aff-content').innerHTML = `
            <div class="hero-banner">
                <div class="hero-tag">🚀 Afilyasyon</div>
                <h1 class="hero-title">Bonjou, Affilié!</h1>
                <div class="hero-code">${aff.referral_code}</div>
                <div class="hero-link-box"><span class="hero-link-text">${refLink}</span><button class="btn-copy-hero" onclick="copyText('${refLink}', this)">📋 Kopye</button></div>
            </div>
            <div class="stat-grid">
                <div class="stat-card"><span class="stat-val">${balance} HTG</span><span class="stat-lbl">Balans</span><div class="stat-bar red"></div></div>
                <div class="stat-card"><span class="stat-val">${aff.total_referrals || 0}</span><span class="stat-lbl">Vant</span><div class="stat-bar green"></div></div>
                <div class="stat-card"><span class="stat-val">5%</span><span class="stat-lbl">Komisyon</span><div class="stat-bar gold"></div></div>
            </div>
            <div class="withdraw-card">
                <div class="w-balance">${balance} HTG</div>
                <button class="btn-withdraw" onclick="requestWithdrawal()" ${balance < 500 ? 'disabled' : ''}>💸 Retire Lajan</button>
            </div>
            <div class="section-title">📜 Istwa Komisyon</div>
            <div class="tx-card" id="tx-list"><div style="padding:20px;text-align:center;">Chaje...</div></div>
        `;
    }

    async function loadTransactions() {
        const { data: txs } = await supabaseA.from('affiliate_transactions').select('*').eq('affiliate_id', currentAff.id).order('created_at', { ascending: false });
        const container = document.getElementById('tx-list');
        if (txs && txs.length > 0) {
            container.innerHTML = txs.map(tx => `<div class="tx-item"><div>${new Date(tx.created_at).toLocaleDateString()}</div><div class="tx-amount earn">+${parseFloat(tx.amount).toFixed(0)} HTG</div></div>`).join('');
        } else { container.innerHTML = '<div style="padding:20px;text-align:center;">Okenn tranzaksyon</div>'; }
    }

    function copyText(t, btn) { navigator.clipboard.writeText(t).then(() => { if (btn) { const o = btn.innerText; btn.innerText = '✅!'; setTimeout(() => btn.innerText = o, 2000); } }); }
    async function requestWithdrawal() {
        const m = prompt("MonCash / NatCash?"); const n = prompt("Nimewo?");
        if (m && n) { await supabaseA.from('affiliate_withdrawals').insert([{ affiliate_id: currentAff.id, amount: currentAff.balance, method: m, number: n, status: 'pending' }]); alert("Demann voye!"); }
    }
    initAffiliate();
</script>
