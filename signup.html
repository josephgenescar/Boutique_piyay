<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un Compte - Boutique Piyay</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --primary: #ff4747;
            --primary-light: rgba(255,71,71,0.08);
            --dark: #0f172a;
            --dark-2: #1e293b;
            --gray: #64748b;
            --light: #f1f5f9;
            --green: #10b981;
            --blue: #3b82f6;
            --radius: 20px;
            --radius-sm: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f1f5f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-wrap {
            width: 100%; max-width: 520px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%);
            padding: 36px 36px 28px;
            text-align: center;
            position: relative;
        }
        .auth-header img { width: 56px; border-radius: 14px; margin-bottom: 16px; position: relative; }
        .auth-header h2 { font-size: 24px; font-weight: 900; color: white; margin-bottom: 6px; position: relative; }
        .auth-header p { font-size: 13px; color: rgba(255,255,255,0.45); position: relative; }

        .auth-body { padding: 32px 36px 36px; }

        .role-label { font-size: 11px; font-weight: 800; color: var(--gray); text-transform: uppercase; margin-bottom: 12px; text-align: center; }
        .role-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 28px; }
        .role-option {
            padding: 14px 8px; border: 2px solid #f1f5f9;
            border-radius: var(--radius-sm); text-align: center;
            cursor: pointer; font-weight: 700; font-size: 11px;
            transition: 0.2s; display: flex; flex-direction: column;
            align-items: center; gap: 8px; color: var(--gray);
            background: #fafbfc;
        }
        .role-option.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
        .role-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--light); display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 11px; font-weight: 800; color: var(--gray); text-transform: uppercase; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 13px 16px; border: 2px solid #f1f5f9; border-radius: var(--radius-sm); font-family: inherit; outline: none; transition: 0.2s; background: #fafbfc; }
        .form-input:focus { border-color: var(--primary); background: white; }

        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--gray); font-size: 11px; font-weight: 700; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #f1f5f9; }

        .btn-submit {
            width: 100%; padding: 16px; background: var(--dark);
            color: white; border: none; border-radius: var(--radius-sm);
            font-weight: 900; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .btn-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(15,23,42,0.25); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        .already-member { text-align: center; margin-top: 20px; font-size: 13px; color: var(--gray); }
        .already-member a { color: var(--primary); font-weight: 800; text-decoration: none; }
    </style>
</head>
<body>

<div class="auth-wrap">
    <div class="auth-header">
        <a href="/"><img src="/assets/images/logo.png" alt="Logo"></a>
        <h2>Créer votre Compte 🚀</h2>
        <p>Bienvenue sur le plus grand réseau de commerce</p>
    </div>

    <div class="auth-body">
        <div class="role-label">Comment souhaitez-vous participer ?</div>
        <div class="role-grid">
            <div id="opt-client" class="role-option active" onclick="setRole('client')">
                <div class="role-icon">👤</div>
                <div><div class="role-name">Client</div><div class="role-sub">Acheter seulement</div></div>
            </div>
            <div id="opt-seller" class="role-option" onclick="setRole('seller')">
                <div class="role-icon">🏪</div>
                <div><div class="role-name">Vendeur</div><div class="role-sub">Vendre des produits</div></div>
            </div>
            <div id="opt-affiliate" class="role-option" onclick="setRole('affiliate')">
                <div class="role-icon">🔗</div>
                <div><div class="role-name">Affilié</div><div class="role-sub">Gagner de l'argent</div></div>
            </div>
        </div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label class="form-label">Nom complet*</label>
                <input type="text" id="fullName" class="form-input" placeholder="ex : Jean Dupont" required>
            </div>
            <div class="form-group">
                <label class="form-label">WhatsApp *</label>
                <input type="tel" id="whatsapp" class="form-input" placeholder="ex : 0612345678" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email *</label>
                <input type="email" id="email" class="form-input" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Mot de passe *</label>
                <input type="password" id="password" class="form-input" placeholder="Min. 8 caractères" required minlength="8">
            </div>

            <!-- SELLER FIELDS -->
            <div id="seller-fields" style="display:none;">
                <div class="divider">Informations Boutique</div>
                <div class="form-group">
                    <label class="form-label">Nom de la Boutique *</label>
                    <input type="text" id="shopName" class="form-input" placeholder="ex : Boutique Belle Affaire">
                </div>
            </div>

            <button type="submit" id="btnSignup" class="btn-submit">CRÉER MON COMPTE</button>
        </form>

        <div class="already-member">
            Vous avez déjà un compte ? <a href="/login.html">Se connecter ici →</a>
        </div>
    </div>
</div>

<script>
    const supS = window.supabase.createClient(
        "https://letyferfjpxmstohvgcj.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg"
    );

    let currentRole = 'client';

    function setRole(role) {
        currentRole = role;
        document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
        document.getElementById('opt-' + role).classList.add('active');
        document.getElementById('seller-fields').style.display = (role === 'seller') ? 'block' : 'none';
    }

    async function handleSignup(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSignup');
        btn.disabled = true;
        btn.innerHTML = "⏳ Veuillez patienter...";

        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value.trim();
        const wa = document.getElementById('whatsapp').value.trim();

        try {
            const { data: authData, error: authErr } = await supS.auth.signUp({
                email,
                password: pass,
                options: { data: { full_name: fullName } }
            });

            if (authErr) throw authErr;

            if (authData.user) {
                const profileData = {
                    id: authData.user.id,
                    full_name: (currentRole === 'seller' && document.getElementById('shopName').value) ? document.getElementById('shopName').value.trim() : fullName,
                    email,
                    whatsapp: wa,
                    role: currentRole,
                    is_active_seller: currentRole === 'seller'
                };

                await supS.from('profiles').upsert([profileData]);
                alert("🎉 Compte créé ! Veuillez vérifier votre email.");
                window.location.href = "/login.html";
            }
        } catch (err) {
            alert("❌ " + err.message);
            btn.disabled = false;
            btn.innerHTML = "CRÉER MON COMPTE";
        }
    }
</script>
</body>
</html>
