---
layout: default
title: Kreye yon Kont - Boutique Piyay
---

<div class="container" style="max-width: 500px; padding: 60px 20px;">
    <div class="auth-card" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;">
        <h1 style="font-family: 'Sora', sans-serif; font-weight: 800; margin-bottom: 10px;">👋 Byenvini!</h1>
        <p style="color: #666; margin-bottom: 30px;">Kreye kont ou pou w kòmanse vann sou Boutique Piyay.</p>

        <form id="signupForm">
            <div style="margin-bottom: 20px; text-align: left;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Non Konplè</label>
                <input type="text" id="fullName" required style="width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px;">
            </div>
            <div style="margin-bottom: 20px; text-align: left;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Email</label>
                <input type="email" id="email" required style="width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px;">
            </div>
            <div style="margin-bottom: 25px; text-align: left;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Modpas (min 6 karaktè)</label>
                <input type="password" id="password" required minlength="6" style="width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px;">
            </div>

            <button type="submit" id="signupBtn" style="width: 100%; padding: 16px; background: #ff4747; color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s;">
                Kreye Kont Mwen
            </button>
        </form>

        <p style="margin-top: 25px; font-size: 14px; color: #666;">
            Ou gen kont deja? <a href="/login.html" style="color: #ff4747; font-weight: 700; text-decoration: none;">Konekte isit la</a>
        </p>
        <div id="msg" style="margin-top: 20px; font-weight: 600; display: none;"></div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://lsyjnhqjssirtgrdfgcu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('signupForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('signupBtn');
        const msg = document.getElementById('msg');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value;

        btn.disabled = true;
        btn.innerText = "⏳ Preparasyon...";

        const { data, error } = await supabaseClient.auth.signUp({
            email,
            password,
            options: {
                data: { full_name: fullName }
            }
        });

        if (error) {
            msg.innerText = "❌ Erè: " + error.message;
            msg.style.color = "red";
            msg.style.display = "block";
            btn.disabled = false;
            btn.innerText = "Kreye Kont Mwen";
        } else {
            msg.innerText = "✅ Siksè! Tcheke imèl ou pou konfime kont lan.";
            msg.style.color = "green";
            msg.style.display = "block";
            setTimeout(() => { window.location.href = "/login.html"; }, 3000);
        }
    };
</script>
