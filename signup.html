<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreye Kont - Boutique Piyay</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --primary: #ff4747;
            --primary-light: rgba(255,71,71,0.08);
            --dark: #0f172a;
            --dark-2: #1e293b;
            --gray: #64748b;
            --light: #f1f5f9;
            --green: #10b981;
            --radius: 20px;
            --radius-sm: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f1f5f9;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* BG DECORATION */
        body::before {
            content: '';
            position: fixed; top: -150px; right: -150px;
            width: 400px; height: 400px; border-radius: 50%;
            background: var(--primary); opacity: 0.04;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed; bottom: -100px; left: -100px;
            width: 300px; height: 300px; border-radius: 50%;
            background: var(--dark); opacity: 0.04;
            pointer-events: none;
        }

        .auth-wrap {
            width: 100%; max-width: 520px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* HEADER */
        .auth-header {
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 100%);
            padding: 36px 36px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .auth-header::before {
            content: '';
            position: absolute; top: -60px; right: -60px;
            width: 180px; height: 180px; border-radius: 50%;
            background: var(--primary); opacity: 0.08;
        }
        .auth-header img {
            width: 56px; border-radius: 14px;
            margin-bottom: 16px; position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .auth-header h2 {
            font-size: 24px; font-weight: 900; color: white;
            letter-spacing: -0.5px; margin-bottom: 6px; position: relative;
        }
        .auth-header p { font-size: 13px; color: rgba(255,255,255,0.45); font-weight: 500; position: relative; }

        /* BODY */
        .auth-body { padding: 32px 36px 36px; }

        /* ROLE SELECTOR */
        .role-label {
            font-size: 11px; font-weight: 800; color: var(--gray);
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px;
        }
        .role-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; margin-bottom: 28px;
        }
        .role-option {
            padding: 14px 8px; border: 2px solid #f1f5f9;
            border-radius: var(--radius-sm); text-align: center;
            cursor: pointer; font-weight: 700; font-size: 11px;
            transition: 0.2s; display: flex; flex-direction: column;
            align-items: center; gap: 8px; color: var(--gray);
            background: #fafbfc; user-select: none;
        }
        .role-option:hover { border-color: #e2e8f0; background: white; }
        .role-option.active {
            border-color: var(--primary); background: var(--primary-light);
            color: var(--primary);
        }
        .role-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--light); display: flex; align-items: center;
            justify-content: center; font-size: 18px; transition: 0.2s;
        }
        .role-option.active .role-icon { background: rgba(255,71,71,0.12); }
        .role-name { font-size: 12px; font-weight: 800; }
        .role-sub { font-size: 9px; font-weight: 600; opacity: 0.7; }

        /* FORM */
        .form-group { margin-bottom: 16px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 460px) { .form-row { grid-template-columns: 1fr; } .auth-body { padding: 24px 20px 28px; } .auth-header { padding: 28px 20px 22px; } }

        .form-label {
            display: block; font-size: 11px; font-weight: 800; color: var(--gray);
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
        }
        .form-input {
            width: 100%; padding: 13px 16px;
            border: 2px solid #f1f5f9; border-radius: var(--radius-sm);
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px;
            font-weight: 500; outline: none; transition: 0.2s;
            background: #fafbfc; color: var(--dark);
        }
        .form-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(255,71,71,0.07); }
        .form-input::placeholder { color: #cbd5e1; }

        /* EXTRA FIELDS */
        .extra-fields { overflow: hidden; transition: 0.3s; }

        /* DIVIDER */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0; color: var(--gray); font-size: 11px; font-weight: 700;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #f1f5f9; }

        /* TERMS */
        .terms-wrap {
            display: flex; align-items: flex-start; gap: 10px;
            margin: 20px 0; cursor: pointer;
        }
        .terms-checkbox {
            width: 18px; height: 18px; accent-color: var(--primary);
            margin-top: 2px; flex-shrink: 0; cursor: pointer;
        }
        .terms-text { font-size: 12px; color: var(--gray); line-height: 1.5; }
        .terms-text a { color: var(--primary); font-weight: 700; text-decoration: none; }

        /* SUBMIT BTN */
        .btn-submit {
            width: 100%; padding: 16px; background: var(--dark);
            color: white; border: none; border-radius: var(--radius-sm);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 900; font-size: 14px; cursor: pointer;
            transition: 0.2s; letter-spacing: 0.3px;
            box-shadow: 0 8px 20px rgba(15,23,42,0.2);
        }
        .btn-submit:hover:not(:disabled) { background: var(--dark-2); transform: translateY(-1px); box-shadow: 0 12px 24px rgba(15,23,42,0.25); }
        .btn-submit:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; transform: none; }
        .btn-submit.loading { background: var(--primary); }

        /* ALREADY MEMBER */
        .already-member {
            text-align: center; margin-top: 20px;
            font-size: 13px; color: var(--gray); font-weight: 500;
        }
        .already-member a { color: var(--primary); font-weight: 800; text-decoration: none; }
        .already-member a:hover { text-decoration: underline; }

        /* TOAST */
        .toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--dark); color: white; padding: 14px 24px;
            border-radius: 50px; font-size: 13px; font-weight: 700;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); transition: 0.4s;
            z-index: 9999; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--green); }
        .toast.error { background: var(--primary); }
    </style>
</head>
<body>

<div class="auth-wrap">

    <!-- HEADER -->
    <div class="auth-header">
        <a href="/">
            <img src="/assets/images/logo.png" onerror="this.src='https://ui-avatars.com/api/?name=BP&background=ff4747&color=fff'">
        </a>
        <h2>Kreye Kont ou </h2>
        <p>Chwazi wòl ou epi kòmanse jodi a</p>
    </div>

    <!-- BODY -->
    <div class="auth-body">

        <!-- ROLE -->
        <div class="role-label">Kijan ou vle patisipe?</div>
        <div class="role-grid">
            <div id="opt-seller" class="role-option active" onclick="setRole('seller')">
                <div class="role-icon">🏪</div>
                <div>
                    <div class="role-name">Machann</div>
                    <div class="role-sub">Vann pwodwi</div>
                </div>
            </div>
            <div id="opt-affiliate" class="role-option" onclick="setRole('affiliate')">
                <div class="role-icon">🔗</div>
                <div>
                    <div class="role-name">Afilye</div>
                    <div class="role-sub">Fè komisyon</div>
                </div>
            </div>
            <div id="opt-delivery" class="role-option" onclick="setRole('delivery')">
                <div class="role-icon">🛵</div>
                <div>
                    <div class="role-name">Livrezon</div>
                    <div class="role-sub">Livre kòmand</div>
                </div>
            </div>
        </div>

        <!-- FORM -->
        <form id="signupForm" onsubmit="handleSignup(event)">

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Non Konplè <span style="color:var(--primary)">*</span></label>
                    <input type="text" id="fullName" class="form-input" placeholder="Jan Batis" required>
                </div>
                <div class="form-group">
                    <label class="form-label">WhatsApp <span style="color:var(--primary)">*</span></label>
                    <input type="tel" id="whatsapp" class="form-input" placeholder="50944443333" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Adrès Email <span style="color:var(--primary)">*</span></label>
                <input type="email" id="email" class="form-input" placeholder="ou@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Modpas <span style="color:var(--primary)">*</span></label>
                <input type="password" id="password" class="form-input" placeholder="Min. 8 karaktè" required minlength="8">
            </div>

            <!-- SELLER FIELDS -->
            <div id="seller-fields" class="extra-fields">
                <div class="divider">Enfòmasyon Boutik</div>
                <div class="form-group">
                    <label class="form-label">Non Boutik <span style="color:var(--primary)">*</span></label>
                    <input type="text" id="shopName" class="form-input" placeholder="Eg: Boutik Bèl Afè">
                </div>
                <div class="form-group">
                    <label class="form-label">Adrès Boutik <span style="color:var(--primary)">*</span></label>
                    <input type="text" id="address" class="form-input" placeholder="Eg: Pòtoprens, Delmas 33">
                </div>
            </div>

            <!-- DELIVERY FIELDS -->
            <div id="delivery-fields" class="extra-fields" style="display:none;">
                <div class="divider">Enfòmasyon Livrezon</div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Zòn Livrezon <span style="color:var(--primary)">*</span></label>
                        <input type="text" id="deliveryZone" class="form-input" placeholder="Eg: Delmas, PV">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Veyikil <span style="color:var(--primary)">*</span></label>
                        <input type="text" id="vehicle" class="form-input" placeholder="Eg: Moto, Velo">
                    </div>
                </div>
            </div>

            <!-- TERMS -->
            <label class="terms-wrap">
                <input type="checkbox" id="acceptTerms" class="terms-checkbox" onchange="toggleBtn()">
                <span class="terms-text">Mwen li epi aksepte <a href="/regleman" target="_blank">Regleman ak Prensip</a> Boutique Piyay yo.</span>
            </label>

            <button type="submit" id="btnSignup" class="btn-submit" disabled>
                KREYE KONT MWEN
            </button>
        </form>

        <div class="already-member">
            Ou gen kont deja? <a href="/login.html">Konekte isit →</a>
        </div>

    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    const supS = window.supabase.createClient(
        "https://letyferfjpxmstohvgcj.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg"
    );

    let currentRole = 'seller';

    function setRole(role) {
        currentRole = role;
        document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
        document.getElementById('opt-' + role).classList.add('active');
        document.getElementById('seller-fields').style.display   = role === 'seller'   ? 'block' : 'none';
        document.getElementById('delivery-fields').style.display = role === 'delivery' ? 'block' : 'none';
    }

    function toggleBtn() {
        document.getElementById('btnSignup').disabled = !document.getElementById('acceptTerms').checked;
    }

    function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.className = 'toast show ' + type;
        setTimeout(() => t.className = 'toast', 3500);
    }

    async function handleSignup(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSignup');
        btn.disabled = true;
        btn.classList.add('loading');
        btn.innerHTML = "⏳ Tanpri tann...";

        const email    = document.getElementById('email').value.trim();
        const pass     = document.getElementById('password').value;
        const fullName = document.getElementById('fullName').value.trim();
        const wa       = document.getElementById('whatsapp').value.trim();

        try {
            const { data: authData, error: authErr } = await supS.auth.signUp({
                email,
                password: pass,
                options: { data: { full_name: fullName } }
            });

            if (authErr) throw authErr;

            if (authData.user) {
                const profileData = {
                    id: authData.user.id,
                    full_name: currentRole === 'seller' ? document.getElementById('shopName').value.trim() : fullName,
                    email,
                    whatsapp: wa,
                    address: currentRole === 'seller' ? document.getElementById('address').value.trim() : '',
                    role: currentRole,
                    is_active_seller: currentRole === 'seller',
                    delivery_zone: currentRole === 'delivery' ? document.getElementById('deliveryZone').value.trim() : '',
                    vehicle: currentRole === 'delivery' ? document.getElementById('vehicle').value.trim() : ''
                };

                const { error: dbErr } = await supS.from('profiles').upsert([profileData]);
                if (dbErr) console.error("Profile error:", dbErr);

                showToast("🎉 Kont kreye! Verifye email ou.", "success");
                setTimeout(() => window.location.href = "/login.html", 2000);
            }
        } catch (err) {
            showToast("❌ " + err.message, "error");
            btn.disabled = false;
            btn.classList.remove('loading');
            btn.innerHTML = "KREYE KONT MWEN ";
        }
    }
</script>
</body>
</html>
