<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreye Kont - Boutique Piyay</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .auth-container { max-width: 400px; margin: 60px auto; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .auth-input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 15px; font-family: inherit; }
        .btn-submit { width: 100%; padding: 14px; background: #0f172a; color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }
        .terms-box { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: #64748b; margin-bottom: 20px; cursor: pointer; }
        .terms-box input { margin-top: 3px; }
    </style>
</head>
<body style="background: #f8fafc;">
    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 25px;">
            <a href="/"><img src="/assets/images/logo.png" style="width: 50px;"></a>
            <h2 style="margin: 10px 0 5px 0;">Byenveni! 🚀</h2>
            <p style="font-size: 13px; color: #64748b;">Kreye kont ou pou w ka vann oswa achte.</p>
        </div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <input type="text" id="fullName" class="auth-input" placeholder="Non konplè" required>
            <input type="email" id="email" class="auth-input" placeholder="Email ou" required>
            <input type="password" id="password" class="auth-input" placeholder="Modpas (min 6 karaktè)" required>

            <label class="terms-box">
                <input type="checkbox" id="acceptTerms" onchange="toggleBtn()">
                <span>Mwen aksepte **<a href="/regleman.html" target="_blank" style="color:#ff4747; text-decoration:none; font-weight:700;">Regleman ak Prensip</a>** platform nan.</span>
            </label>

            <button type="submit" id="btnSignup" class="btn-submit" disabled>KREYE KONT MWEN</button>
        </form>

        <p style="text-align: center; font-size: 13px; margin-top: 20px;">
            Ou gen kont deja? <a href="/login.html" style="color: #ff4747; font-weight: 700; text-decoration: none;">Konekte</a>
        </p>
    </div>

    <script>
        const supS = supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13");

        function toggleBtn() {
            document.getElementById('btnSignup').disabled = !document.getElementById('acceptTerms').checked;
        }

        async function handleSignup(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const name = document.getElementById('fullName').value.trim();
            const btn = document.getElementById('btnSignup');

            btn.disabled = true; btn.innerHTML = "⏳ Operasyon an kou...";

            try {
                const { data: { user }, error: authErr } = await supS.auth.signUp({ email, password: pass });
                if (authErr) throw authErr;

                if (user) {
                    const { error: profErr } = await supS.from('profiles').insert([{ id: user.id, full_name: name, email: email, role: 'seller', is_active_seller: true }]);
                    if (profErr) throw profErr;

                    // Kreye Wallet otomatikman
                    const { error: wallErr } = await supS.from('wallets').insert([{ user_id: user.id }]);

                    alert("Kont ou kreye ak siksè! Tcheke email ou pou konfime.");
                    window.location.href = "/login.html";
                }
            } catch (err) {
                alert("Erè: " + err.message);
                btn.disabled = false; btn.innerHTML = "KREYE KONT MWEN";
            }
        }
    </script>
</body>
</html>
