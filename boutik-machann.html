---
layout: default
title: Boutik Machann - Boutique Piyay
---

<style>
    .seller-hero-modern { background: #0f172a; padding: 30px 20px; color: white; border-radius: 0 0 30px 30px; margin-bottom: 30px; }
    .seller-header-flex { display: flex; align-items: center; gap: 20px; max-width: 1000px; margin: 0 auto; text-align: left; }
    .seller-profile-img-mini { width: 80px; height: 80px; border-radius: 50%; background: #ff4747; border: 3px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 800; overflow: hidden; flex-shrink: 0; }
    .seller-profile-img-mini img { width: 100%; height: 100%; object-fit: cover; }
    .seller-main-info { flex: 1; }
    .seller-main-info h1 { font-size: 22px; margin: 0; font-weight: 800; }
    .seller-main-info p { font-size: 13px; opacity: 0.7; margin: 5px 0 0; }
    .seller-stats-bar { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
    .mini-stat { font-size: 11px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 50px; font-weight: 600; }
    .social-btns-mini { display: flex; gap: 10px; margin-top: 15px; }
    .soc-icon { width: 35px; height: 35px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 16px; transition: 0.3s; color: white; }
    .soc-icon:hover { background: #ff4747; }
    @media (max-width: 600px) { .seller-header-flex { flex-direction: column; text-align: center; } .seller-stats-bar, .social-btns-mini { justify-content: center; } }
</style>

<div id="seller-shop-view" style="min-height: 80vh; background: #f8fafc;">
    <div class="seller-hero-modern">
        <div class="container">
            <div class="seller-header-flex">
                <div id="sellerInitialWrap" class="seller-profile-img-mini">M</div>
                <div class="seller-main-info">
                    <h1 id="sellerName">Non Boutik...</h1>
                    <p id="sellerLoc">📍 Lokalizasyon...</p>
                    <div class="seller-stats-bar">
                        <span class="mini-stat">📦 <b id="prodCount">0</b> Pwodwi</span>
                        <span class="mini-stat">⭐ <b>4.8</b> Rating</span>
                    </div>
                    <div id="sellerSocials" class="social-btns-mini"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="seller-products-grid" class="product-grid-modern" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">
            <div style="text-align: center; padding: 50px; grid-column: 1/-1;">⏳ Chaje pwodwi...</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const SUP_URL = "https://letyferfjpxmstohvgcj.supabase.co";
    const SUP_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg";
    const supS = window.supabase.createClient(SUP_URL, SUP_KEY);

    // Pran ID a nan URL la san erè
    const urlParams = new URLSearchParams(window.location.search);
    const sellerId = urlParams.get('id');

    async function loadSellerShop() {
        const grid = document.getElementById('seller-products-grid');

        if (!sellerId) {
            grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:40px;">⚠️ Erè: Machann nan pa jwenn nan URL la.</p>';
            return;
        }

        try {
            // 1. Chaje pwofil machann nan - RETIRE FILTRE IS_ACTIVE_SELLER SI L TE LA
            const { data: seller, error: sErr } = await supS.from('profiles').select('*').eq('id', sellerId.trim()).single();

            if (seller) {
                document.getElementById('sellerName').innerText = seller.full_name || 'Boutik';
                document.getElementById('sellerLoc').innerText = "📍 " + (seller.address || 'Ayiti');

                const initial = (seller.full_name || 'M').charAt(0).toUpperCase();
                if (seller.avatar_url) {
                    document.getElementById('sellerInitialWrap').innerHTML = `<img src="${seller.avatar_url}" onerror="this.style.display='none'; this.parentElement.innerText='${initial}'">`;
                } else {
                    document.getElementById('sellerInitialWrap').innerText = initial;
                }

                // Sosyal
                const soc = document.getElementById('sellerSocials');
                soc.innerHTML = "";
                if (seller.facebook_url) soc.innerHTML += `<a href="${seller.facebook_url}" target="_blank" class="soc-icon">FB</a>`;
                if (seller.instagram_url) soc.innerHTML += `<a href="${seller.instagram_url}" target="_blank" class="soc-icon">IG</a>`;
                if (seller.whatsapp) soc.innerHTML += `<a href="https://wa.me/${seller.whatsapp.replace(/[^0-9]/g, '')}" target="_blank" class="soc-icon">WA</a>`;
            }

            // 2. Chaje PWODWI yo - Nou chèche tout san filtre restriktif
            const { data: products, error: pErr } = await supS.from('user_products')
                .select('*')
                .eq('seller_id', sellerId.trim())
                .order('created_at', { ascending: false });

            if (pErr) throw pErr;

            document.getElementById('prodCount').innerText = products ? products.length : 0;

            if (products && products.length > 0) {
                grid.innerHTML = products.map(p => `
                    <div style="background:white; padding:15px; border-radius:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05); text-align:center; transition: transform 0.2s;">
                        <a href="/pwodwi-machann.html?id=${p.id}">
                            <img src="${p.image_url}" onerror="this.src='https://ui-avatars.com/api/?name=P&background=f1f5f9&color=cbd5e1'" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:12px;">
                        </a>
                        <h3 style="font-size:13px; margin:10px 0; height:35px; overflow:hidden; font-weight:700;">${p.title}</h3>
                        <div style="color:#ff4747; font-weight:900; font-size:16px;">${p.price} HTG</div>
                        <button onclick="if(window.orderProduct) window.orderProduct('${p.title.replace(/'/g, "\\'")}', '${p.price}', '${p.id}', '${p.image_url}')" style="width:100%; background:#0f172a; color:white; border:none; padding:10px; border-radius:10px; margin-top:10px; font-weight:700; cursor:pointer; font-size:11px;">🛒 Ajoute</button>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px; color:#64748b;"><div style="font-size:40px; margin-bottom:10px;">📦</div><p style="font-weight:600;">Boutik sa a pa gen okenn pwodwi pibliye toujou.</p></div>';
            }
        } catch (e) {
            console.error("Error loading shop:", e);
            grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:40px;">❌ Erè nan chajman pwodwi yo. Tanpri eseye ankò.</p>';
        }
    }

    document.addEventListener('DOMContentLoaded', loadSellerShop);
</script>
