---
layout: default
title: Boutik Machann - Boutique Piyay
---

<style>
    .seller-hero-modern {
        background: #0f172a;
        padding: 30px 20px;
        color: white;
        border-radius: 0 0 30px 30px;
        margin-bottom: 30px;
    }
    .seller-header-flex {
        display: flex;
        align-items: center;
        gap: 20px;
        max-width: 1000px;
        margin: 0 auto;
        text-align: left;
    }
    .seller-profile-img-mini {
        width: 80px; height: 80px;
        border-radius: 50%;
        background: var(--primary);
        border: 3px solid rgba(255,255,255,0.2);
        display: flex; align-items: center; justify-content: center;
        font-size: 30px; font-weight: 800;
        overflow: hidden; flex-shrink: 0;
    }
    .seller-profile-img-mini img { width: 100%; height: 100%; object-fit: cover; }

    .seller-main-info { flex: 1; }
    .seller-main-info h1 { font-size: 22px; margin: 0; font-weight: 800; }
    .seller-main-info p { font-size: 13px; opacity: 0.7; margin: 5px 0 0; }

    .seller-stats-bar {
        display: flex;
        gap: 15px;
        margin-top: 15px;
        flex-wrap: wrap;
    }
    .mini-stat {
        font-size: 11px;
        background: rgba(255,255,255,0.1);
        padding: 5px 12px;
        border-radius: 50px;
        font-weight: 600;
    }

    .social-btns-mini { display: flex; gap: 10px; margin-top: 15px; }
    .soc-icon {
        width: 35px; height: 35px; border-radius: 50%;
        background: rgba(255,255,255,0.1); display: flex;
        align-items: center; justify-content: center;
        text-decoration: none; font-size: 16px; transition: 0.3s;
    }
    .soc-icon:hover { background: var(--primary); }

    @media (max-width: 600px) {
        .seller-header-flex { flex-direction: column; text-align: center; }
        .seller-stats-bar, .social-btns-mini { justify-content: center; }
    }
</style>

<div id="seller-shop-view" style="min-height: 80vh; background: #f8fafc;">
    <div class="seller-hero-modern">
        <div class="container">
            <div class="seller-header-flex">
                <div id="sellerInitialWrap" class="seller-profile-img-mini">M</div>
                <div class="seller-main-info">
                    <h1 id="sellerName">Non Boutik...</h1>
                    <p id="sellerLoc">📍 Lokalizasyon...</p>
                    <div class="seller-stats-bar">
                        <span class="mini-stat">📦 <b id="prodCount">0</b> Pwodwi</span>
                        <span class="mini-stat">⭐ <b>4.8</b> Rating</span>
                    </div>
                    <div id="sellerSocials" class="social-btns-mini"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="seller-products-grid" class="product-grid-modern">
            <div style="text-align: center; padding: 50px; grid-column: 1/-1;">⏳ Chaje pwodwi...</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const supS = supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13");
    const sellerId = new URLSearchParams(window.location.search).get('id');

    async function loadSellerShop() {
        if (!sellerId) return window.location.href = "/";
        const { data: seller } = await supS.from('profiles').select('*').eq('id', sellerId).single();
        if (!seller) return;

        document.getElementById('sellerName').innerText = seller.full_name;
        document.getElementById('sellerLoc').innerText = "📍 " + (seller.address || 'Ayiti');

        if (seller.avatar_url) document.getElementById('sellerInitialWrap').innerHTML = `<img src="${seller.avatar_url}">`;
        else document.getElementById('sellerInitialWrap').innerText = seller.full_name.charAt(0).toUpperCase();

        const soc = document.getElementById('sellerSocials');
        if (seller.facebook_url) soc.innerHTML += `<a href="${seller.facebook_url}" target="_blank" class="soc-icon">FB</a>`;
        if (seller.instagram_url) soc.innerHTML += `<a href="${seller.instagram_url}" target="_blank" class="soc-icon">IG</a>`;
        if (seller.tiktok_url) soc.innerHTML += `<a href="${seller.tiktok_url}" target="_blank" class="soc-icon">TK</a>`;
        if (seller.youtube_url) soc.innerHTML += `<a href="${seller.youtube_url}" target="_blank" class="soc-icon">YT</a>`;
        if (seller.whatsapp) soc.innerHTML += `<a href="https://wa.me/${seller.whatsapp.replace(/[^0-9]/g, '')}" target="_blank" class="soc-icon">WA</a>`;

        const { data: products } = await supS.from('user_products').select('*').eq('seller_id', sellerId).order('created_at', { ascending: false });
        document.getElementById('prodCount').innerText = products ? products.length : 0;

        const grid = document.getElementById('seller-products-grid');
        if (products && products.length > 0) {
            grid.innerHTML = products.map(p => `
                <div class="product-card-modern">
                    <a href="/pwodwi-machann.html?id=${p.id}"><img src="${p.image_url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:15px;"></a>
                    <h3 style="font-size:14px; margin:10px 0;">${p.title}</h3>
                    <div style="color:var(--primary); font-weight:900;">${p.price} HTG</div>
                    <button class="btn-add-modern" onclick="orderProduct('${p.title.replace(/'/g, "\\'")}', '${p.price}', '${p.id}', '${p.image_url}')" style="width:100%; background:#f1f5f9; border:none; padding:10px; border-radius:10px; margin-top:10px; font-weight:700; cursor:pointer;">🛒 Ajoute</button>
                </div>
            `).join('');
        } else {
            grid.innerHTML = '<p style="grid-column:1/-1; text-align:center;">Okenn pwodwi.</p>';
        }
    }
    document.addEventListener('DOMContentLoaded', loadSellerShop);
</script>
