---
layout: default
title: Boutik Machann - Boutique Piyay
---

<div id="seller-shop-view" class="container" style="padding: 40px 20px; min-height: 80vh;">
    <!-- HEADER BOUTIK -->
    <div id="seller-header" style="background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; margin-bottom: 50px; display: none; border: 1px solid #f1f5f9;">
        <div style="width: 100px; height: 100px; background: #ff4747; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; margin: 0 auto 20px;" id="sellerInitial">M</div>
        <h1 id="sellerName" style="font-family: 'Sora', sans-serif; font-weight: 800; margin: 0; font-size: 28px;">Non Boutik la</h1>
        <div id="sellerLoc" style="color: #ff4747; font-weight: 700; margin-top: 10px;">📍 Adrès...</div>
        <div id="sellerSocials" style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;"></div>
    </div>

    <!-- LIS PWODWI -->
    <div class="section-header-modern">
        <h2 class="sora">Tout pwodwi machann sa a</h2>
    </div>

    <div id="seller-products-grid" class="product-grid-modern">
        <div style="text-align: center; padding: 50px; grid-column: 1/-1;">⏳ Chaje pwodwi yo...</div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const supS = supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13");
    const sellerId = new URLSearchParams(window.location.search).get('id');

    async function loadSellerShop() {
        if (!sellerId) return window.location.href = "/";

        try {
            // 1. Rale enfòmasyon machann
            const { data: seller, error: sErr } = await supS.from('profiles').select('*').eq('id', sellerId).single();
            if (sErr || !seller) throw new Error("Machann sa a pa egziste.");

            document.getElementById('sellerName').innerText = seller.full_name || "Machann";
            document.getElementById('sellerInitial').innerText = (seller.full_name || "M").charAt(0).toUpperCase();
            document.getElementById('sellerLoc').innerText = `📍 ${seller.address || 'Zòn non-defini'}`;

            const soc = document.getElementById('sellerSocials');
            if (seller.facebook_url) soc.innerHTML += `<a href="${seller.facebook_url}" target="_blank" style="font-size:24px; text-decoration:none;">🔵</a>`;
            if (seller.instagram_url) soc.innerHTML += `<a href="${seller.instagram_url}" target="_blank" style="font-size:24px; text-decoration:none;">📸</a>`;
            if (seller.whatsapp) soc.innerHTML += `<a href="https://wa.me/${seller.whatsapp}" target="_blank" style="font-size:24px; text-decoration:none;">🟢</a>`;

            document.getElementById('seller-header').style.display = 'block';

            // 2. Rale tout pwodwi machann nan
            const { data: products, error: pErr } = await supS.from('user_products').select('*').eq('seller_id', sellerId).order('created_at', { ascending: false });

            const grid = document.getElementById('seller-products-grid');
            if (!products || products.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">Machann sa a pa gen okenn pwodwi an liy pou kounye a.</p>';
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="product-card-modern">
                    <div class="card-img-wrap"><a href="/pwodwi-machann.html?id=${p.id}"><img src="${p.image_url}"></a></div>
                    <div class="card-info">
                        <h3>${p.title}</h3>
                        <div class="price-modern">${p.price} HTG</div>
                        <button class="btn-add-modern" onclick="orderProduct('${p.title}', '${p.price}', '${p.id}', '${p.image_url}')">🛒 Ajoute</button>
                    </div>
                </div>
            `).join('');

        } catch (e) {
            console.error(e);
            alert(e.message);
        }
    }

    document.addEventListener('DOMContentLoaded', loadSellerShop);
</script>
