---
layout: default
title: Boutik Machann - Boutique Piyay
---

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
    :root {
      --primary: #ff4747;
      --primary-light: rgba(255,71,71,0.08);
      --dark: #0f172a;
      --dark-2: #1e293b;
      --gray: #64748b;
      --light: #f1f5f9;
      --green: #10b981;
      --gold: #f59e0b;
      --radius: 20px;
      --radius-sm: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --shadow-md: 0 8px 30px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }

    .bm-hero {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 60%, #1a0f35 100%);
      padding: 36px 20px 48px;
      position: relative; overflow: hidden; margin-bottom: -24px;
    }
    .bm-hero::before {
      content: '';
      position: absolute; top: -80px; right: -80px;
      width: 280px; height: 280px; border-radius: 50%;
      background: var(--primary); opacity: 0.07;
    }
    .bm-hero-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; gap: 24px;
      flex-wrap: wrap; position: relative;
    }
    .bm-avatar {
      width: 88px; height: 88px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; font-weight: 900; flex-shrink: 0;
      border: 4px solid rgba(255,255,255,0.15);
      box-shadow: 0 8px 24px rgba(255,71,71,0.25); overflow: hidden;
    }
    .bm-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .bm-info { flex: 1; min-width: 0; }
    .bm-verified {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3);
      color: #34d399; font-size: 10px; font-weight: 800;
      padding: 3px 10px; border-radius: 50px; margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    #sellerName { font-size: 24px; font-weight: 900; color: white; letter-spacing: -0.4px; margin: 0 0 6px; display: block; }
    #sellerLoc  { font-size: 13px; color: rgba(255,255,255,0.45); font-weight: 500; }
    .bm-stats   { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .bm-stat {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 14px; border-radius: 50px;
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.7);
    }
    .bm-stat b { color: white; font-weight: 900; }
    .bm-wa-btn {
      display: none; align-items: center; gap: 8px;
      background: #25D366; color: white; border: none;
      padding: 11px 20px; border-radius: var(--radius-sm);
      font-weight: 800; font-size: 13px; cursor: pointer;
      text-decoration: none; font-family: inherit; transition: 0.2s;
      box-shadow: 0 4px 14px rgba(37,211,102,0.3); flex-shrink: 0;
    }
    .bm-wa-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

    @media (max-width: 600px) {
      .bm-hero-inner { flex-direction: column; text-align: center; }
      .bm-stats { justify-content: center; }
      .bm-wa-btn { width: 100%; justify-content: center; }
    }

    .bm-main { max-width: 1100px; margin: 0 auto; padding: 48px 20px 80px; }
    .bm-section-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .bm-section-hdr h2 { font-size: 18px; font-weight: 900; color: var(--dark); margin: 0; }
    .bm-prod-count { background: white; border-radius: 50px; padding: 5px 14px; font-size: 12px; font-weight: 800; color: var(--gray); box-shadow: var(--shadow); }

    .bm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 18px; }

    .bm-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: transform 0.22s, box-shadow 0.22s; border: 1.5px solid #f8fafc; display: flex; flex-direction: column; }
    .bm-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
    .bm-card-img-wrap { position: relative; aspect-ratio: 1; overflow: hidden; background: var(--light); }
    .bm-card-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s; }
    .bm-card:hover .bm-card-img { transform: scale(1.06); }
    .bm-flash-badge { position: absolute; top: 9px; left: 9px; background: var(--primary); color: white; font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
    .bm-discount-badge { position: absolute; top: 9px; right: 9px; background: rgba(255,71,71,0.9); color: white; font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 7px; }

    .bm-card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; }
    .bm-card-name { font-size: 13px; font-weight: 700; color: var(--dark); margin: 0 0 6px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; }
    .bm-card-prices { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .bm-price { font-size: 17px; font-weight: 900; color: var(--primary); letter-spacing: -0.3px; }
    .bm-price-old { font-size: 12px; color: var(--gray); text-decoration: line-through; font-weight: 600; }

    .btn-bm-add { width: 100%; background: var(--dark); color: white; border: none; padding: 11px; border-radius: 11px; margin-top: auto; font-family: inherit; font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-bm-add:hover { background: var(--primary); }

    .bm-empty { grid-column: 1/-1; text-align: center; padding: 70px 20px; color: var(--gray); }
    .bm-empty .e-icon  { font-size: 50px; margin-bottom: 14px; display: block; }
    .bm-empty .e-title { font-size: 17px; font-weight: 900; color: var(--dark); margin-bottom: 6px; }
    .bm-empty .e-sub   { font-size: 13px; line-height: 1.6; }

    .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 10px; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    @media (max-width: 500px) { .bm-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
</style>

<div id="seller-shop-view" style="min-height: 80vh;">

    <div class="bm-hero">
        <div class="bm-hero-inner">
            <div class="bm-avatar" id="sellerInitialWrap">M</div>
            <div class="bm-info">
                <div class="bm-verified">✅ Machann Verifye</div>
                <span id="sellerName">Ap chaje...</span>
                <div id="sellerLoc">📍 Ayiti</div>
                <div class="bm-stats">
                    <div class="bm-stat">📦 <b id="prodCount">0</b>&nbsp;Pwodwi</div>
                    <div class="bm-stat">⭐ <b>4.8</b>&nbsp;Rating</div>
                </div>
            </div>
            <a id="bm-wa-link" href="#" target="_blank" class="bm-wa-btn">📱 WhatsApp</a>
        </div>
    </div>

    <div class="bm-main">
        <div class="bm-section-hdr">
            <h2>📦 Pwodwi Boutik la</h2>
            <span class="bm-prod-count" id="prodCountBadge">0 pwodwi</span>
        </div>

        <div class="bm-grid" id="seller-products-grid">
            <div style="background:white;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.06);"><div class="skeleton" style="aspect-ratio:1;border-radius:0;"></div><div style="padding:14px;"><div class="skeleton" style="height:13px;width:80%;margin-bottom:8px;"></div><div class="skeleton" style="height:18px;width:40%;margin-bottom:12px;"></div><div class="skeleton" style="height:36px;border-radius:11px;"></div></div></div>
            <div style="background:white;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.06);"><div class="skeleton" style="aspect-ratio:1;border-radius:0;"></div><div style="padding:14px;"><div class="skeleton" style="height:13px;width:70%;margin-bottom:8px;"></div><div class="skeleton" style="height:18px;width:35%;margin-bottom:12px;"></div><div class="skeleton" style="height:36px;border-radius:11px;"></div></div></div>
            <div style="background:white;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.06);"><div class="skeleton" style="aspect-ratio:1;border-radius:0;"></div><div style="padding:14px;"><div class="skeleton" style="height:13px;width:85%;margin-bottom:8px;"></div><div class="skeleton" style="height:18px;width:45%;margin-bottom:12px;"></div><div class="skeleton" style="height:36px;border-radius:11px;"></div></div></div>
        </div>
    </div>
</div>

<script>
    async function loadSellerShop() {
      const grid     = document.getElementById('seller-products-grid');
      const sellerId = new URLSearchParams(window.location.search).get('id');

      if (!sellerId) {
        grid.innerHTML = '<div class="bm-empty"><span class="e-icon">⚠️</span><div class="e-title">Machann pa jwenn</div><div class="e-sub">ID machann manke nan URL la.</div></div>';
        return;
      }

      if (!window.supabase) { setTimeout(loadSellerShop, 500); return; }

      const supV = window.supabase.createClient(
        "https://letyferfjpxmstohvgcj.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg"
      );

      try {
        // 1. Profil machann
        const { data: prof } = await supV.from('profiles').select('*').eq('id', sellerId.trim()).single();
        if (prof) {
          const name    = prof.full_name || 'Boutik';
          const initial = name.charAt(0).toUpperCase();
          document.getElementById('sellerName').innerText = name;
          document.getElementById('sellerLoc').innerText  = "📍 " + (prof.address || 'Ayiti');
          const avatarEl = document.getElementById('sellerInitialWrap');
          if (prof.avatar_url) {
            avatarEl.innerHTML = `<img src="${prof.avatar_url}" onerror="this.style.display='none';this.parentElement.innerText='${initial}'">`;
          } else {
            avatarEl.innerText = initial;
          }
          const wa = prof.whatsapp || prof.whatsapp_number;
          if (wa) {
            const waLink = document.getElementById('bm-wa-link');
            waLink.href = `https://wa.me/${wa.replace(/[^0-9]/g,'')}`;
            waLink.style.display = 'inline-flex';
          }
        }

        // 2. Pwodwi (san filtre strict)
        const { data: products, error: prodErr } = await supV
          .from('user_products').select('*')
          .eq('seller_id', sellerId.trim())
          .order('created_at', { ascending: false });

        if (prodErr) throw prodErr;

        const count = products ? products.length : 0;
        document.getElementById('prodCount').innerText      = count;
        document.getElementById('prodCountBadge').innerText = count + ' pwodwi';

        if (products && products.length > 0) {
          grid.innerHTML = products.map(p => {
            const hasDisc  = p.old_price && parseFloat(p.old_price) > parseFloat(p.price);
            const disc     = hasDisc ? Math.round(((p.old_price - p.price) / p.old_price) * 100) : 0;
            const safeT    = (p.title || '').replace(/'/g, "\\'");
            const safeImg  = (p.image_url || '').replace(/'/g, "\\'");
            return `
              <div class="bm-card">
                <div class="bm-card-img-wrap">
                  <a href="/pwodwi-machann.html?id=${p.id}">
                    <img class="bm-card-img" src="${p.image_url}"
                         onerror="this.src='https://ui-avatars.com/api/?name=P&background=f1f5f9&color=cbd5e1'"
                         alt="${p.title}">
                  </a>
                  ${p.is_flash_sale ? '<span class="bm-flash-badge">⚡ Flash</span>' : ''}
                  ${hasDisc ? `<span class="bm-discount-badge">-${disc}%</span>` : ''}
                </div>
                <div class="bm-card-body">
                  <div class="bm-card-name">${p.title}</div>
                  <div class="bm-card-prices">
                    <span class="bm-price">${p.price} HTG</span>
                    ${hasDisc ? `<span class="bm-price-old">${p.old_price} HTG</span>` : ''}
                  </div>
                  <button class="btn-bm-add"
                    onclick="if(window.orderProduct) window.orderProduct('${safeT}','${p.price}','${p.id}','${safeImg}')">
                    🛒 Ajoute nan Panye
                  </button>
                </div>
              </div>`;
          }).join('');
        } else {
          grid.innerHTML = `<div class="bm-empty">
            <span class="e-icon">📦</span>
            <div class="e-title">Pa gen pwodwi toujou</div>
            <div class="e-sub">Machann sa a poko pibliye pwodwi.<br>Tounen pi ta!</div>
          </div>`;
        }
      } catch(e) {
        console.error("Erè:", e);
        grid.innerHTML = `<div class="bm-empty">
          <span class="e-icon">❌</span>
          <div class="e-title">Erè chajman</div>
          <div class="e-sub">${e.message}</div>
        </div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', loadSellerShop);
</script>
