---
layout: default
title: Detay Pwodwi
---

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
    :root {
      --primary: #ff4747;
      --primary-light: rgba(255,71,71,0.08);
      --dark: #0f172a;
      --gray: #64748b;
      --light: #f1f5f9;
      --green: #10b981;
      --gold: #f59e0b;
      --radius: 20px;
      --radius-sm: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --shadow-md: 0 8px 30px rgba(0,0,0,0.1);
    }

    .pd-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 80px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* ── LOADING ── */
    .pd-loading {
      min-height: 60vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .pd-spinner {
      width: 48px; height: 48px;
      border: 4px solid #f1f5f9;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pd-loading-text { font-size: 14px; font-weight: 600; color: var(--gray); }

    /* ── ERROR ── */
    .pd-error {
      display: none;
      background: #fef2f2; border: 1.5px solid #fca5a5;
      border-radius: var(--radius); padding: 32px; text-align: center;
      margin: 40px auto; max-width: 500px;
    }
    .pd-error h3 { font-size: 18px; font-weight: 900; color: #991b1b; margin-bottom: 8px; }
    .pd-error p  { font-size: 14px; color: #b91c1c; margin-bottom: 16px; }
    .btn-retry {
      padding: 12px 24px; background: var(--primary); color: white;
      border: none; border-radius: var(--radius-sm); font-weight: 800;
      font-size: 13px; cursor: pointer; font-family: inherit; transition: 0.2s;
    }
    .btn-retry:hover { filter: brightness(1.1); }

    /* ── CONTENT ── */
    #product-content { display: none; }

    /* BREADCRUMB */
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--gray); font-weight: 600;
      margin-bottom: 24px;
    }
    .breadcrumb a { color: var(--gray); text-decoration: none; }
    .breadcrumb a:hover { color: var(--primary); }
    .breadcrumb span { color: var(--dark); font-weight: 700; }

    /* MAIN GRID */
    .pd-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 36px;
      margin-bottom: 48px;
    }
    @media (max-width: 768px) { .pd-grid { grid-template-columns: 1fr; gap: 24px; } }

    /* IMAGE COL */
    .pd-img-col {}
    .pd-main-img-wrap {
      border-radius: 24px; overflow: hidden;
      background: var(--light); aspect-ratio: 1;
      box-shadow: var(--shadow-md); position: relative;
    }
    #mainImg {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.4s;
    }
    .pd-main-img-wrap:hover #mainImg { transform: scale(1.04); }

    .pd-img-badge {
      position: absolute; top: 14px; left: 14px;
      background: var(--primary); color: white;
      font-size: 10px; font-weight: 900; padding: 4px 10px;
      border-radius: 8px; text-transform: uppercase; letter-spacing: 0.5px;
      display: none;
    }

    /* INFO COL */
    .pd-info-col {}

    .pd-category {
      font-size: 11px; font-weight: 800; color: var(--primary);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
    }

    #title {
      font-size: 26px; font-weight: 900; letter-spacing: -0.5px;
      color: var(--dark); line-height: 1.3; margin: 0 0 16px;
    }

    .pd-price-wrap { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
    .pd-price-new { font-size: 32px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
    .pd-price-new small { font-size: 16px; font-weight: 700; }
    .pd-price-old { font-size: 16px; color: var(--gray); text-decoration: line-through; font-weight: 600; display: none; }
    .pd-discount { background: var(--primary-light); color: var(--primary); font-size: 11px; font-weight: 900; padding: 3px 9px; border-radius: 50px; display: none; }

    #desc {
      font-size: 14px; line-height: 1.75; color: var(--gray);
      font-weight: 500; margin-bottom: 24px;
      border-bottom: 1px solid var(--light); padding-bottom: 24px;
    }

    /* SELLER CARD */
    .seller-info-card {
      background: var(--light); border-radius: var(--radius-sm);
      padding: 18px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 14px;
    }
    .seller-avatar-sm {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; flex-shrink: 0;
      overflow: hidden; border: 3px solid white;
      box-shadow: 0 4px 10px rgba(255,71,71,0.2);
    }
    .seller-avatar-sm img { width: 100%; height: 100%; object-fit: cover; }
    .seller-details { flex: 1; min-width: 0; }
    #seller { font-size: 14px; font-weight: 800; color: var(--dark); margin: 0 0 3px; }
    #loc  { font-size: 12px; color: var(--gray); font-weight: 500; margin: 0 0 8px; }
    .btn-wa {
      display: inline-flex; align-items: center; gap: 6px;
      background: #25D366; color: white; border: none;
      padding: 7px 14px; border-radius: 8px; font-size: 12px;
      font-weight: 800; cursor: pointer; text-decoration: none;
      font-family: inherit; transition: 0.2s;
    }
    .btn-wa:hover { filter: brightness(1.08); transform: translateY(-1px); }

    /* ACTION BTNS */
    .pd-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-panye {
      padding: 16px; background: var(--dark); color: white;
      border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 14px; font-weight: 800;
      cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-panye:hover { background: var(--dark-2, #1e293b); transform: translateY(-1px); }
    .btn-achte {
      padding: 16px; background: var(--primary); color: white;
      border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 14px; font-weight: 800;
      cursor: pointer; transition: 0.2s;
      box-shadow: 0 8px 20px rgba(255,71,71,0.25);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-achte:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(255,71,71,0.35); }

    /* ── REVIEWS SECTION ── */
    .reviews-section {
      padding-top: 40px;
      border-top: 1px solid var(--light);
    }
    .reviews-title {
      font-size: 20px; font-weight: 900; color: var(--dark);
      margin-bottom: 24px; display: flex; align-items: center; gap: 10px;
    }

    /* REVIEW FORM */
    .review-form-card {
      background: white; border-radius: var(--radius); padding: 24px;
      box-shadow: var(--shadow); margin-bottom: 24px;
      border-left: 4px solid var(--primary);
      display: none;
    }
    .review-form-title { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
    .review-form-sub { font-size: 12px; color: var(--gray); font-weight: 500; margin-bottom: 18px; }

    .rating-select {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .star-btn {
      width: 40px; height: 40px; border-radius: 10px;
      border: 2px solid var(--light); background: #fafbfc;
      font-size: 18px; cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .star-btn.selected { background: rgba(245,158,11,0.1); border-color: var(--gold); }
    .star-btn:hover { border-color: var(--gold); }

    .review-textarea {
      width: 100%; padding: 13px 16px;
      border: 2px solid #f1f5f9; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 14px; font-weight: 500;
      outline: none; transition: 0.2s; resize: vertical; min-height: 90px;
      background: #fafbfc; color: var(--dark); box-sizing: border-box;
      margin-bottom: 14px;
    }
    .review-textarea:focus { border-color: var(--primary); background: white; }

    .btn-submit-review {
      padding: 12px 24px; background: var(--primary); color: white;
      border: none; border-radius: var(--radius-sm);
      font-family: inherit; font-size: 13px; font-weight: 800;
      cursor: pointer; transition: 0.2s;
      box-shadow: 0 4px 12px rgba(255,71,71,0.2);
    }
    .btn-submit-review:hover:not(:disabled) { transform: translateY(-1px); }
    .btn-submit-review:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; }

    /* REVIEW ITEMS */
    .review-item {
      background: white; border-radius: var(--radius-sm); padding: 18px;
      box-shadow: var(--shadow); margin-bottom: 14px;
      border-left: 3px solid var(--gold);
    }
    .review-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .review-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--light); color: var(--gray);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; flex-shrink: 0;
    }
    .review-name { font-size: 13px; font-weight: 800; color: var(--dark); }
    .review-stars { font-size: 13px; color: var(--gold); }
    .review-date { font-size: 11px; color: var(--gray); margin-left: auto; font-weight: 500; }
    .review-comment { font-size: 13px; color: var(--gray); line-height: 1.6; font-weight: 500; }

    .review-empty {
      text-align: center; padding: 40px 20px; color: var(--gray);
    }
    .review-empty .e-icon { font-size: 36px; margin-bottom: 10px; display: block; }
    .review-empty .e-text { font-size: 14px; font-weight: 700; color: var(--dark); }
    .review-empty .e-sub  { font-size: 12px; margin-top: 4px; }

    @media (max-width: 500px) {
      #title { font-size: 20px; }
      .pd-actions { grid-template-columns: 1fr; }
    }
</style>

<div class="pd-wrap">

    <!-- LOADING -->
    <div id="loader">
        <div class="pd-loading">
            <div class="pd-spinner"></div>
            <div class="pd-loading-text">Ap chaje pwodwi...</div>
        </div>
    </div>

    <!-- ERROR -->
    <div id="error-display" class="pd-error">
        <h3>⚠️ Erè nan Sistèm nan</h3>
        <p id="error-text"></p>
        <button onclick="location.reload()" class="btn-retry">🔄 Eseye ankò</button>
    </div>

    <!-- CONTENT -->
    <div id="product-content">

        <!-- BREADCRUMB -->
        <div class="breadcrumb">
            <a href="/">Akèy</a> › <a href="/shop/">Boutik</a> › <span id="bc-title">Pwodwi</span>
        </div>

        <!-- MAIN GRID -->
        <div class="pd-grid">

            <!-- IMAGE -->
            <div class="pd-img-col">
                <div class="pd-main-img-wrap">
                    <div class="pd-img-badge" id="flash-badge">⚡ Flash</div>
                    <img id="mainImg" src="" alt="Pwodwi"
                         onerror="this.src='https://ui-avatars.com/api/?name=P&background=f1f5f9&color=cbd5e1&size=400'">
                </div>
            </div>

            <!-- INFO -->
            <div class="pd-info-col">
                <div class="pd-category" id="pd-cat"></div>
                <h1 id="title"></h1>

                <div class="pd-price-wrap">
                    <div class="pd-price-new"><span id="price"></span> <small>HTG</small></div>
                    <div class="pd-price-old" id="old-price"></div>
                    <div class="pd-discount" id="discount-badge"></div>
                </div>

                <p id="desc"></p>

                <!-- SELLER -->
                <div class="seller-info-card">
                    <div class="seller-avatar-sm" id="seller-avatar">M</div>
                    <div class="seller-details">
                        <div id="seller">Machann: ...</div>
                        <div id="loc">📍 ...</div>
                        <div id="wa-link"></div>
                    </div>
                </div>

                <!-- ACTIONS -->
                <div class="pd-actions">
                    <button id="btnPanye" class="btn-panye">🛒 Mete nan Panye</button>
                    <button id="btnAchte" class="btn-achte">⚡ Achte Kounye a</button>
                </div>
            </div>
        </div>

        <!-- REVIEWS -->
        <div class="reviews-section">
            <div class="reviews-title">⭐ Avis Kliyan yo</div>

            <!-- REVIEW FORM -->
            <div id="feedback-form" class="review-form-card">
                <div class="review-form-title">✍️ Kite yon avis</div>
                <div class="review-form-sub">Ou ka kite yon avis paske ou te resevwa kòmand sa a.</div>

                <div class="rating-select" id="star-picker">
                    <button type="button" class="star-btn" data-val="1" onclick="setRating(1)">⭐</button>
                    <button type="button" class="star-btn" data-val="2" onclick="setRating(2)">⭐</button>
                    <button type="button" class="star-btn" data-val="3" onclick="setRating(3)">⭐</button>
                    <button type="button" class="star-btn" data-val="4" onclick="setRating(4)">⭐</button>
                    <button type="button" class="star-btn" data-val="5" onclick="setRating(5)">⭐</button>
                </div>
                <input type="hidden" id="fb-rating" value="5">

                <textarea id="fb-comment" class="review-textarea"
                          placeholder="Ki sa ou panse de pwodwi sa a?"></textarea>
                <button onclick="submitFeedback()" id="btnSubmitFB" class="btn-submit-review">
                    VOYE AVIS Mwen ✅
                </button>
            </div>

            <!-- REVIEW LIST -->
            <div id="feedback-list">
                <div class="review-empty">
                    <span class="e-icon">⏳</span>
                    <div class="e-text">Ap chaje avis yo...</div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const S_URL = "https://letyferfjpxmstohvgcj.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg";
    const client = window.supabase.createClient(S_URL, S_KEY);

    let currentProdId = new URLSearchParams(window.location.search).get('id');
    let sellerId = null;
    let selectedRating = 5;

    // Star rating UI
    function setRating(val) {
      selectedRating = val;
      document.getElementById('fb-rating').value = val;
      document.querySelectorAll('.star-btn').forEach(btn => {
        btn.classList.toggle('selected', parseInt(btn.dataset.val) <= val);
      });
    }
    setRating(5); // defau 5 etwal

    async function start() {
      try {
        if (!currentProdId) throw new Error("ID pwodwi a manke.");

        const { data: p, error } = await client
          .from('user_products').select('*')
          .eq('id', currentProdId).maybeSingle();

        if (error) throw error;
        if (!p) throw new Error("Pwodwi pa jwenn.");

        sellerId = p.seller_id;

        // Titre + breadcrumb
        document.getElementById('title').innerText   = p.title;
        document.getElementById('bc-title').innerText = p.title;
        document.getElementById('mainImg').src        = p.image_url;
        document.getElementById('desc').innerText     = p.description || "";
        document.getElementById('pd-cat').innerText   = p.category || "";

        // Prix
        document.getElementById('price').innerText = p.price;
        if (p.old_price && p.old_price > p.price) {
          document.getElementById('old-price').style.display = 'block';
          document.getElementById('old-price').innerText = p.old_price + ' HTG';
          const disc = Math.round(((p.old_price - p.price) / p.old_price) * 100);
          const badge = document.getElementById('discount-badge');
          badge.style.display = 'inline-flex';
          badge.innerText = '-' + disc + '%';
        }

        // Badge flash
        if (p.is_flash_sale) {
          document.getElementById('flash-badge').style.display = 'block';
        }

        // Profil machann
        if (p.seller_id) {
          const { data: prof } = await client.from('profiles')
            .select('*').eq('id', p.seller_id).maybeSingle();

          if (prof) {
            const name = prof.full_name || "Boutique Piyay";
            document.getElementById('seller').innerText = "🏪 " + name;
            document.getElementById('loc').innerText    = "📍 " + (prof.address || "Ayiti");

            // Avatar inisyal
            document.getElementById('seller-avatar').innerText = name.charAt(0).toUpperCase();

            const wa = prof.whatsapp_number || prof.whatsapp;
            if (wa) {
              document.getElementById('wa-link').innerHTML =
                `<a href="https://wa.me/${wa.replace(/[^0-9]/g,'')}" target="_blank" class="btn-wa">📱 WhatsApp</a>`;
            }
          }
        }

        // Bouton aksyon
        document.getElementById('btnPanye').onclick = () => {
          if (window.orderProduct) orderProduct(p.title, p.price, p.id, p.image_url);
          else alert("Fonksyon panye pa disponib.");
        };
        document.getElementById('btnAchte').onclick = () => {
          if (window.orderProduct) {
            orderProduct(p.title, p.price, p.id, p.image_url);
            if (window.openCart) openCart();
          }
        };

        // Afiche kontni
        document.getElementById('loader').style.display  = 'none';
        document.getElementById('product-content').style.display = 'block';

        loadFeedbacks();
        checkOrderToAllowFeedback();

      } catch(e) {
        document.getElementById('loader').style.display  = 'none';
        document.getElementById('error-display').style.display = 'block';
        document.getElementById('error-text').innerText  = e.message;
      }
    }

    async function checkOrderToAllowFeedback() {
      const { data: { user } } = await client.auth.getUser();
      if (!user) return;
      const { data: orders } = await client.from('orders')
        .select('id, status')
        .eq('customer_email', user.email)
        .eq('product_id', currentProdId)
        .in('status', ['delivered', 'completed']);
      if (orders && orders.length > 0) {
        document.getElementById('feedback-form').style.display = 'block';
      }
    }

    async function loadFeedbacks() {
      const { data: fbs } = await client.from('feedback')
        .select('*, profiles(full_name)')
        .eq('product_id', currentProdId)
        .order('created_at', { ascending: false });

      const list = document.getElementById('feedback-list');
      if (!fbs || fbs.length === 0) {
        list.innerHTML = `
          <div class="review-empty">
            <span class="e-icon">💬</span>
            <div class="e-text">Pa gen avis toujou</div>
            <div class="e-sub">Se ou k pou premye moun kite yon avis!</div>
          </div>`;
        return;
      }

      list.innerHTML = fbs.map(f => {
        const name  = f.profiles?.full_name || 'Kliyan';
        const stars = '⭐'.repeat(Math.min(f.rating || 0, 5));
        const date  = new Date(f.created_at).toLocaleDateString('fr-HT', { day:'numeric', month:'short', year:'numeric' });
        return `
          <div class="review-item">
            <div class="review-header">
              <div class="review-avatar">${name.charAt(0).toUpperCase()}</div>
              <div>
                <div class="review-name">${name}</div>
                <div class="review-stars">${stars}</div>
              </div>
              <div class="review-date">${date}</div>
            </div>
            ${f.comment ? `<div class="review-comment">${f.comment}</div>` : ''}
          </div>`;
      }).join('');
    }

    async function submitFeedback() {
      const rating  = parseInt(document.getElementById('fb-rating').value);
      const comment = document.getElementById('fb-comment').value.trim();
      const btn     = document.getElementById('btnSubmitFB');

      const { data: { user } } = await client.auth.getUser();
      if (!user) { alert("Ou dwe konekte pou kite yon avis."); return; }

      btn.disabled = true; btn.innerText = "⏳ Ap voye...";

      const { error } = await client.from('feedback').insert([{
        product_id: currentProdId,
        user_id:    user.id,
        rating:     rating,
        comment:    comment,
        seller_id:  sellerId,
        created_at: new Date().toISOString()
      }]);

      if (error) {
        alert("Erè: " + error.message);
        btn.disabled = false; btn.innerText = "VOYE AVIS Mwen ✅";
      } else {
        btn.innerText = "✅ Mèsi!";
        document.getElementById('feedback-form').style.display = 'none';
        loadFeedbacks();
      }
    }

    window.onload = start;
</script>
