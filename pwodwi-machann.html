---
layout: default
title: Detay Pwodwi
---

<div id="app" class="container" style="padding: 50px 20px; min-height: 80vh; text-align: center; font-family: sans-serif;">
    <div id="loader">
        <div style="font-size: 50px; animation: spin 2s linear infinite; display: inline-block;">⏳</div>
        <h2 id="msg">Ap chaje...</h2>
    </div>

    <div id="error-display" style="display:none; color: red; background: #ffeeee; padding: 20px; border-radius: 10px; border: 1px solid red;">
        <h3>⚠️ Erè nan Sistèm nan</h3>
        <p id="error-text"></p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">Eseye ankò</button>
    </div>

    <div id="product-content" style="display:none; text-align: left;">
        <div style="display: flex; gap: 40px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 300px;">
                <img id="mainImg" src="" style="width: 100%; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            </div>
            <div style="flex: 1.2; min-width: 300px;">
                <h1 id="title" style="font-size: 2.5rem; margin-bottom: 10px;"></h1>
                <div style="font-size: 30px; font-weight: bold; color: #ff4747; margin-bottom: 20px;">
                    <span id="price"></span> HTG
                </div>
                <p id="desc" style="line-height: 1.6; color: #555; margin-bottom: 30px;"></p>

                <div style="background: #f1f5f9; padding: 20px; border-radius: 15px; margin-bottom: 30px;">
                    <h4 id="seller">Machann: ...</h4>
                    <p id="loc">📍 ...</p>
                    <div id="wa-link"></div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button id="btnPanye" style="flex:1; padding: 15px; background: #333; color: white; border: none; border-radius: 10px; cursor: pointer;">Mete nan Panye</button>
                    <button id="btnAchte" style="flex:1; padding: 15px; background: #ff4747; color: white; border: none; border-radius: 10px; cursor: pointer;">Achte Kounye a</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const S_URL = "https://letyferfjpxmstohvgcj.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxldHlmZXJmanB4bXN0b2h2Z2NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjcwMDIsImV4cCI6MjA4OTgwMzAwMn0.Y5BVX8ewoEyiVfyy5AZRNXdn-phbhBWqwfYuWmSBjKg";

    async function start() {
        const msg = document.getElementById('msg');
        const errDisp = document.getElementById('error-display');
        const errTxt = document.getElementById('error-text');

        try {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) throw new Error("ID pwodwi a manke nan lyen an.");

            msg.innerText = "Koneksyon ak Supabase...";
            const client = supabase.createClient(S_URL, S_KEY);

            msg.innerText = "Rechèch pwodwi...";
            const { data: p, error } = await client.from('user_products').select('*').eq('id', id).maybeSingle();

            if (error) throw error;
            if (!p) throw new Error("Pwodwi sa a pa egziste nan baz done a.");

            // Afiche done
            document.getElementById('title').innerText = p.title;
            document.getElementById('price').innerText = p.price;
            document.getElementById('mainImg').src = p.image_url;
            document.getElementById('desc').innerText = p.description || "";

            // Machann
            if (p.seller_id) {
                const { data: prof } = await client.from('profiles').select('*').eq('id', p.seller_id).maybeSingle();
                if (prof) {
                    document.getElementById('seller').innerText = "Machann: " + (prof.full_name || "Boutique Piyay");
                    document.getElementById('loc').innerText = "📍 " + (prof.address || "Ayiti");
                    const wa = prof.whatsapp_number || prof.whatsapp;
                    if (wa) {
                        document.getElementById('wa-link').innerHTML = `<a href="https://wa.me/${wa.replace(/[^0-9]/g, '')}" target="_blank" style="color: green; font-weight: bold; text-decoration: none;">💬 Ekri machann nan sou WhatsApp</a>`;
                    }
                }
            }

            // Panye
            document.getElementById('btnPanye').onclick = () => {
                if (window.orderProduct) orderProduct(p.title, p.price, p.id, p.image_url);
                else alert("Pwodwi ajoute!");
            };
            document.getElementById('btnAchte').onclick = () => {
                if (window.orderProduct) {
                    orderProduct(p.title, p.price, p.id, p.image_url);
                    if (window.openCart) openCart();
                }
            };

            document.getElementById('loader').style.display = 'none';
            document.getElementById('product-content').style.display = 'block';

        } catch (e) {
            console.error(e);
            document.getElementById('loader').style.display = 'none';
            errDisp.style.display = 'block';
            errTxt.innerText = e.message;
        }
    }

    window.onload = start;
</script>

<style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
