---
layout: default
title: Detay Pwodwi - Marketplace
---

<div id="product-view" class="container" style="padding: 40px 20px; min-height: 80vh;">
    <!-- LOADING -->
    <div id="loading" style="text-align: center; padding: 100px 0;">
        <div style="font-size: 50px; animation: spin 1s linear infinite;">⏳</div>
        <p>Chajman detay pwodwi...</p>
    </div>

    <!-- CONTENT -->
    <div id="content" style="display: none;">
        <div style="display: flex; gap: 40px; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 300px;">
                <img id="pImg" src="" style="width: 100%; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            </div>
            <div style="flex: 1.2; min-width: 300px;">
                <h1 id="pTitle" style="font-size: 2.5rem; margin-bottom: 10px; font-weight: 900;"></h1>
                <div style="margin-bottom: 20px;">
                    <span id="pPrice" style="font-size: 32px; font-weight: 800; color: #ff4747;"></span>
                    <span id="pOldPrice" style="text-decoration: line-through; color: #aaa; margin-left: 10px; display: none;"></span>
                    <span style="font-weight: 800;"> HTG</span>
                </div>
                <div id="pDesc" style="line-height: 1.6; color: #444; margin-bottom: 30px; white-space: pre-wrap;"></div>

                <div style="background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 30px;">
                    <div id="sellerName" style="font-weight: 800; font-size: 18px;"></div>
                    <div id="sellerLoc" style="color: #ff4747; font-weight: 700; margin-top: 5px;">📍 </div>
                    <div id="sellerSocials" style="display: flex; gap: 10px; margin-top: 15px;"></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <button id="addBtn" style="padding: 18px; background: #0f172a; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer;">🛒 Panye</button>
                    <button id="buyBtn" style="padding: 18px; background: #ff4747; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer;">⚡ Achte</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const supV = supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13");

    async function loadData() {
        const id = new URLSearchParams(window.location.search).get('id');
        if (!id) return;

        try {
            const { data: prod, error } = await supV.from('user_products').select('*, profiles(*)').eq('id', id).single();
            if (error || !prod) throw error;

            document.getElementById('pTitle').innerText = prod.title;
            document.getElementById('pPrice').innerText = prod.price;
            document.getElementById('pImg').src = prod.image_url;
            document.getElementById('pDesc').innerText = prod.description || "";

            if (prod.old_price) {
                document.getElementById('pOldPrice').innerText = prod.old_price;
                document.getElementById('pOldPrice').style.display = 'inline';
            }

            if (prod.profiles) {
                document.getElementById('sellerName').innerText = prod.profiles.full_name;
                document.getElementById('sellerLoc').innerText += prod.profiles.address || "Zòn non-defini";
                const soc = document.getElementById('sellerSocials');
                if (prod.profiles.facebook_url) soc.innerHTML += `<a href="${prod.profiles.facebook_url}" target="_blank">🔵 Facebook</a>`;
                if (prod.profiles.instagram_url) soc.innerHTML += `<a href="${prod.profiles.instagram_url}" target="_blank">📸 Instagram</a>`;
            }

            document.getElementById('addBtn').onclick = () => orderProduct(prod.title, prod.price, prod.id, prod.image_url);
            document.getElementById('buyBtn').onclick = () => { orderProduct(prod.title, prod.price, prod.id, prod.image_url); openOrderModal(); };

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        } catch (e) {
            document.getElementById('loading').innerHTML = `<h2 style="color:red;">Erè nan chaje pwodwi a</h2><p>${e.message}</p>`;
        }
    }
    document.addEventListener('DOMContentLoaded', loadData);
</script>
<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
