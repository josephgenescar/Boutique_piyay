<!-- MODAL PANIER (POU TOUT PAJ) -->
<div id="order-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="font-size: 20px; font-weight: 800;">Mon Panier 🛒</h2>
            <button class="modal-close" onclick="closeOrderModal()">✕</button>
        </div>

        <div id="order-summary" class="modal-body">
            <!-- Kontni ap parèt via JS -->
        </div>

        <div class="modal-footer" id="order-form-container" style="border-top: 1px solid #eee; padding-top: 20px; margin-top: 15px;">
            <div class="order-form">
                <p style="font-size: 12px; font-weight: 800; color: #64748b; margin-bottom: 10px; text-transform: uppercase;">Détails de livraison</p>

                <input type="text" id="customer-name" placeholder="Nom complet *" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px;">
                <input type="tel" id="customer-phone" placeholder="Numéro de téléphone *" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px;">

                <!-- LIS ZÒN KONPLÈ -->
                <select id="delivery-zone" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff;">
                    <option value="">-- Choisissez une zone de livraison --</option>
                    <option value="Pétion-Ville">Pétion-Ville</option>
                    <option value="Delmas">Delmas</option>
                    <option value="Port-au-Prince">Port-au-Prince</option>
                    <option value="Carrefour">Carrefour</option>
                    <option value="Tabarre">Tabarre</option>
                    <option value="Kenscoff">Kenscoff</option>
                    <option value="Cap-Haïtien">Cap-Haïtien</option>
                    <option value="Gonaïves">Gonaïves</option>
                    <option value="Saint-Marc">Saint-Marc</option>
                    <option value="Jacmel">Jacmel</option>
                    <option value="Cayes">Cayes</option>
                    <option value="Lòt Zone">Lòt Zone (Ekri l anba)</option>
                </select>

                <input type="text" id="other-zone" placeholder="Précisez votre zone ici..." style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; display: none;">

                <input type="text" id="customer-address" placeholder="Adrese Livrezon (Rèn, nimewo kay, etc.) *" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px;">

                <!-- METÒD PEMAN AVEC RADIO BUTTONS -->
                <label style="font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 5px; display: block; text-transform: uppercase;">Mode de paiement</label>
                <div style="margin-bottom: 15px;">
                    <label style="display: flex; align-items: center; margin-bottom: 8px; cursor: pointer;">
                        <input type="radio" name="payment-method" value="MonCash" style="margin-right: 10px;">
                        <span>📲 Payer avec MonCash</span>
                    </label>
                    <label style="display: flex; align-items: center; margin-bottom: 8px; cursor: pointer;">
                        <input type="radio" name="payment-method" value="NatCash" style="margin-right: 10px;">
                        <span>📲 Payer avec NatCash</span>
                    </label>
                    <label style="display: flex; align-items: center; margin-bottom: 8px; cursor: pointer;">
                        <input type="radio" name="payment-method" value="Cash" checked style="margin-right: 10px;">
                        <span>💵 Cash à la livraison</span>
                    </label>
                </div>

                <!-- Boutons de paiement (affichage conditionnel) -->
                <div id="paymentButtonsSection" style="margin-bottom: 15px; display: none; padding: 15px; background: #fff8f4; border-radius: 8px; border: 1px solid #fde2cd;">
                    <p style="margin: 0 0 12px; font-size: 12px; font-weight: 700; color: #b45309;">Complétez le paiement:</p>
                    <button type="button" id="moncashPayBtn" style="width: 100%; padding: 12px; margin-bottom: 8px; background: #ef4444; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: none;">
                        ⚡ Payer avec MonCash
                    </button>
                    <button type="button" id="natcashPayBtn" style="width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: none;">
                        🔵 Payer avec NatCash
                    </button>
                </div>

                <div style="margin-bottom:10px; color:#64748b; font-size:13px;">
                    <b>Gid:</b> MonCash ak NatCash ap redireksyone w pou konplete peman. Cash se lè w resevwa pwodwi a.
                </div>

                <button id="submitOrderBtn" onclick="submitOrder()" style="width: 100%; padding: 18px; background: #1f2937; color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 5px 20px rgba(31, 41, 55, 0.25); display: flex; align-items: center; justify-content: center; gap: 10px;">
                    Valider la commande
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('delivery-zone')?.addEventListener('change', function() {
        const otherInput = document.getElementById('other-zone');
        if (this.value === 'Lòt Zone') { otherInput.style.display = 'block'; }
        else { otherInput.style.display = 'none'; }
    });

    // Afficher/masquer les boutons de paiement MonCash et NatCash
    const paymentMethodRadios = document.querySelectorAll('input[name="payment-method"]');
    const paymentButtonsSection = document.getElementById('paymentButtonsSection');
    const moncashPayBtn = document.getElementById('moncashPayBtn');
    const natcashPayBtn = document.getElementById('natcashPayBtn');

    function updatePaymentButtons() {
        const selectedMethod = document.querySelector('input[name="payment-method"]:checked')?.value;
        
        if (selectedMethod === 'MonCash') {
            paymentButtonsSection.style.display = 'block';
            moncashPayBtn.style.display = 'block';
            natcashPayBtn.style.display = 'none';
        } else if (selectedMethod === 'NatCash') {
            paymentButtonsSection.style.display = 'block';
            moncashPayBtn.style.display = 'none';
            natcashPayBtn.style.display = 'block';
        } else {
            paymentButtonsSection.style.display = 'none';
        }
    }

    paymentMethodRadios.forEach(radio => {
        radio.addEventListener('change', updatePaymentButtons);
    });

    // Initialiser au chargement
    updatePaymentButtons();
</script>

<style>
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
.modal-content { background: white; width: 95%; max-width: 550px; border-radius: 25px; padding: 25px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-close { background: #f3f4f6; border: none; font-size: 20px; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* Carte produit */
.cart-item { display: flex; align-items: center; gap: 15px; padding: 15px; border: 1px solid #f1f5f9; border-radius: 12px; margin-bottom: 12px; background: #fafbfc; }
.cart-item-image { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; }
.cart-item-details { flex: 1; }
.cart-item-title { font-weight: 700; font-size: 14px; margin-bottom: 5px; color: #1e293b; }
.cart-item-price { font-weight: 800; font-size: 16px; color: #ff4747; }
.cart-item-quantity { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.qty-btn { width: 30px; height: 30px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; cursor: pointer; font-weight: 700; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.qty-btn:hover { background: #f1f5f9; }
.cart-item-delete { background: none; border: none; font-size: 18px; cursor: pointer; color: #ef4444; padding: 5px; }

/* Ligne horizontale suggestion */
.suggestion-line { display: flex; align-items: center; margin: 20px 0; color: #64748b; font-size: 13px; font-weight: 600; }
.suggestion-line::before, .suggestion-line::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
.suggestion-line span { padding: 0 15px; }

/* Total */
.cart-total { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; padding: 15px; background: #f8fafc; border-radius: 12px; }
.cart-total-label { font-size: 14px; font-weight: 700; color: #64748b; }
.cart-total-amount { font-size: 24px; font-weight: 900; color: #ff4747; }

/* Radio buttons */
input[type="radio"] { accent-color: #ff4747; width: 18px; height: 18px; }

</style>
