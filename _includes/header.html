<style>
/* ===== HEADER — Kreyòl Modèn & Responsive ===== */
.main-header { background:#fff; box-shadow:0 2px 12px rgba(0,0,0,.08); position:sticky; top:0; z-index:1000; width: 100%; }
.top-bar { background:#222; color:#fff; padding:6px 0; font-size:11px; font-weight:600; }
.top-bar .container { display:flex; justify-content:space-between; align-items:center; padding: 0 15px; }
.top-bar-links { display:flex; gap:10px; }
.top-bar a { color:#ccc; text-decoration:none; }

.header-main { padding:10px 0; border-bottom: 1px solid #f0f0f0; }
.header-main .container { display:flex; align-items:center; justify-content: space-between; padding: 0 15px; gap: 10px; }

.logo { display:flex; align-items:center; gap:8px; text-decoration:none; flex-shrink:0; }
.logo img { height:32px; width:auto; }
.logo span { font-size:16px; font-weight:800; font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ff4747,#ff8c42);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; white-space:nowrap; }

.search-wrap { flex:1; max-width:500px; position:relative; margin: 0 15px; }
.search-form { display:flex; border:2px solid #eee; border-radius:50px; overflow:hidden; background: #f9f9f9; height: 40px; }
.search-form input { flex:1; padding:0 15px; border:none; outline:none; font-size:13px; background: transparent; }
.search-form button { padding:0 15px; background:#ff4747; border:none; color:white; font-weight:700; cursor:pointer; font-size: 12px; }

.header-actions { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.account-info { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: #333; text-decoration: none; padding: 6px 12px; background: #f4f4f4; border-radius: 50px; }
.account-info.primary { background:#ff4747; color:white; }

.act-btn { display:flex; flex-direction:column; align-items:center; background:none; border:none; cursor:pointer; color:#333; position:relative; padding: 0; }
.act-btn span { font-size: 22px; }
.act-btn small { font-size:9px; font-weight:700; }
.cart-badge { position:absolute; top:-5px; right:-5px; background:#ff4747; color:white; border-radius:50%; width:16px; height:16px; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; border: 1.5px solid white; }

/* NAVIGATION */
.site-nav { background: #fff; border-bottom: 1px solid #eee; }
.nav-scroll { display:flex; gap:15px; padding:10px 15px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
.nav-scroll::-webkit-scrollbar { display: none; }
.nav-lnk { text-decoration: none; color: #555; font-size: 13px; font-weight: 600; transition: 0.3s; }
.nav-lnk:hover { color: #ff4747; }

/* MOBILE ADJUSTMENTS */
@media (max-width: 768px) {
  .top-bar { display: none; } /* Kache top bar sou mobil pou espas */
  .search-wrap { display: none; } /* Kache search bar nan header (nou ka mete l anba) */
  .logo span { font-size: 14px; }
  .logo img { height: 28px; }
  .account-info { padding: 5px 8px; font-size: 10px; }
}
</style>

<header class="main-header">
  <div class="top-bar">
    <div class="container">
      <span>🚀 Livraison rapid nan tout peyi a 🇭🇹</span>
      <div class="top-bar-links">
        <a href="https://wa.me/50948868964" target="_blank">💬 WhatsApp</a>
      </div>
    </div>
  </div>

  <div class="header-main">
    <div class="container">
      <a href="/" class="logo">
        <img src="/assets/images/logo.png" alt="Boutique Piyay">
        <span>BOUTIQUE PIYAY</span>
      </a>

      <div class="search-wrap">
        <form class="search-form" onsubmit="return false;">
          <input type="text" id="search-input" placeholder="Chèche..." oninput="liveSearch()" autocomplete="off">
          <button type="submit">OK</button>
        </form>
        <div id="search-results" style="display:none; position:absolute; top:45px; width:100%; background:white; z-index:100; box-shadow:0 5px 15px rgba(0,0,0,0.1);"></div>
      </div>

      <div class="header-actions">
        <div id="authLinks" style="display: flex; gap: 5px;">
            <a href="/login.html" class="account-info">🔑 Kont</a>
            <a href="/signup.html" class="account-info primary">Enskri</a>
        </div>
        <div id="userInfo" style="display: none;">
            <a href="/dashboard.html" class="account-info">👤 Mwen</a>
        </div>
        <button class="act-btn" onclick="openOrderModal()">
          <span>🛒</span>
          <div class="cart-badge" id="cart-badge" style="display:none;">0</div>
          <small>Panye</small>
        </button>
      </div>
    </div>
  </div>

  <nav class="site-nav">
    <div class="nav-scroll">
      <a href="/" class="nav-lnk">Tout</a>
      <a href="/vendre.html" class="nav-lnk" style="color:#ff4747; font-weight:800;">🚀 Vann</a>
      {% for cat in site.categories %}
      <a href="{{ cat.url }}" class="nav-lnk">{{ cat.display_name | default: cat.title }}</a>
      {% endfor %}
    </div>
  </nav>
</header>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    // Sèvi ak Supabase ki nan main.js si l egziste deja
    async function updateHeaderAuth() {
        if (typeof supabase !== 'undefined') {
            const sup = supabase.createClient("https://lsyjnhqjssirtgrdfgcu.supabase.co", "sb_publishable_yoALXcRyaiBnSieRF7MSpA_bB5DGT13");
            const { data: { user } } = await sup.auth.getUser();
            if (user) {
                document.getElementById('authLinks').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
            }
        }
    }
    updateHeaderAuth();
</script>
