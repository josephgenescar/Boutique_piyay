<style>
/* ===== HEADER — Kreyòl Modèn & Animé ak Ble ===== */
.main-header { box-shadow:0 2px 15px rgba(0,0,0,0.1); position:sticky; top:0; z-index:1000; width: 100%; background: #fff; }
.top-bar { background:#111; color:#fff; padding:6px 0; font-size:11px; font-weight:600; border-bottom: 1px solid rgba(255,255,255,0.1); }
.top-bar .container { display:flex; justify-content:space-between; align-items:center; padding: 0 15px; }
.top-bar-links { display:flex; gap:10px; }
.top-bar a { color:#ccc; text-decoration:none; }

/* 1. ANIMASYON GRADIENT LOGO (ALE ADWAT - MELANJE AK BLE) */
.header-main {
    padding:10px 0;
    background: linear-gradient(90deg, #ffffff, #fff1f1, #e0f2fe, #fff1f1, #ffffff);
    background-size: 200% 100%;
    animation: move-right 10s linear infinite;
    border-bottom: 1px solid #eee;
}

@keyframes move-right {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
}

.header-main .container { display:flex; align-items:center; justify-content: space-between; padding: 0 15px; gap: 10px; }

.logo { display:flex; align-items:center; gap:8px; text-decoration:none; flex-shrink:0; }
.logo img { height:34px; width:auto; }
.logo span { font-size:18px; font-weight:900; font-family:'Sora', sans-serif;
  background:linear-gradient(135deg,#ff4747,#ff8c42);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; white-space:nowrap; }

.search-wrap { flex:1; max-width:500px; position:relative; margin: 0 15px; }
.search-form { display:flex; border:2px solid #eee; border-radius:50px; overflow:hidden; background: #fff; height: 42px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.search-form input { flex:1; padding:0 15px; border:none; outline:none; font-size:13px; background: transparent; }
.search-form button { padding:0 20px; background:#ff4747; border:none; color:white; font-weight:700; cursor:pointer; font-size: 13px; }

/* BOUTON AUTH YO */
.header-actions { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.btn-auth {
    display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800;
    text-decoration: none; padding: 9px 16px; border-radius: 50px;
    transition: all 0.3s ease; text-transform: uppercase;
}
.btn-login { background: #0f172a; color: white; box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2); }
.btn-signup {
    background: linear-gradient(135deg, #ff4747, #ff8c42); color: white;
    box-shadow: 0 4px 12px rgba(255, 71, 71, 0.3);
    animation: pulse-orange 2s infinite;
}

@keyframes pulse-orange {
    0% { transform: scale(1); }
    70% { transform: scale(1.03); }
    100% { transform: scale(1); }
}

/* 2. ANIMASYON GRADIENT KATEGORI (SOTI DWAT ALE GÒCH - MELANJE AK BLE GLACÉ) */
.site-nav {
    background: linear-gradient(270deg, #ffffff, #f0f9ff, #e5e7eb, #f0f9ff, #ffffff);
    background-size: 200% 100%;
    animation: move-left 10s linear infinite;
    border-bottom: 1px solid #eee;
}

@keyframes move-left {
    0% { background-position: 200% 50%; }
    100% { background-position: 0% 50%; }
}

.nav-scroll { display:flex; gap:18px; padding:12px 15px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; align-items: center; }
.nav-lnk { text-decoration: none; color: #475569; font-size: 13px; font-weight: 700; transition: 0.3s; }
.nav-lnk:hover { color: #ff4747; transform: translateY(-2px); }

.act-btn { display:flex; flex-direction:column; align-items:center; background:none; border:none; cursor:pointer; color:#333; position:relative; padding: 0; }
.cart-badge { position:absolute; top:-7px; right:-7px; background:#ff4747; color:white; border-radius:50%; width:18px; height:18px; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; border: 2px solid white; }

@media (max-width: 768px) {
  .top-bar { display: none; }
  .header-main .container { flex-wrap: wrap; justify-content: space-between; }
  .logo { order: 1; }
  .header-actions { order: 2; }
  .search-wrap { order: 3; flex-basis: 100%; margin: 10px 0 0 0; display: block; max-width: none; }
  .logo span { font-size: 14px; }
  .btn-auth { padding: 6px 12px; font-size: 10px; }
}
</style>

<script>
// ── NOTIFIKASYON SYSTEM (Supabase Realtime) ──────────────────
(function() {
  const ICONS = {
    new_order: "🛍️", order_confirmed: "✅", order_delivered: "📦",
    delivery_coming: "🛵", commission_earned: "💰", payment_received: "💳",
    new_message: "💬", flash_sale: "⚡", withdrawal_success: "🏦"
  };

  let supClient = null;
  let notifChannel = null;
  let allNotifs = [];

  function timeAgo(date) {
    const diff = Date.now() - new Date(date).getTime();
    const mins = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);
    if (mins < 1) return "Kounye a";
    if (mins < 60) return mins + " min";
    if (hours < 24) return hours + "h";
    return Math.floor(diff / 86400000) + "j";
  }

  function renderNotifs() {
    const list = document.getElementById("notif-list");
    const count = document.getElementById("notif-count");
    const badge = document.getElementById("notif-badge");
    if (!list) return;

    const unread = allNotifs.filter(n => !n.read).length;

    if (unread > 0) {
      count.style.display = "flex";
      count.textContent = unread > 99 ? "99+" : unread;
      badge.style.display = "inline-block";
      badge.textContent = unread + " nouvo";
    } else {
      count.style.display = "none";
      badge.style.display = "none";
    }

    if (allNotifs.length === 0) {
      list.innerHTML = '<div style="padding:40px;text-align:center;color:#9ca3af;"><div style="font-size:36px;margin-bottom:8px;">🔔</div><div style="font-size:13px;">Pa gen notifikasyon toujou</div></div>';
      return;
    }

    list.innerHTML = allNotifs.map(n => `
      <div onclick="readNotif('${n.id}')" style="padding:12px 16px;display:flex;gap:10px;cursor:pointer;background:${n.read ? 'white' : '#eff6ff'};border-bottom:1px solid #f9fafb;">
        <div style="width:36px;height:36px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">
          ${ICONS[n.type] || "🔔"}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:${n.read ? '500' : '700'};font-size:12px;color:#111;margin-bottom:2px;">${n.title}</div>
          <div style="font-size:11px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n.body}</div>
          <div style="font-size:10px;color:#9ca3af;margin-top:3px;">${timeAgo(n.created_at)}</div>
        </div>
        ${!n.read ? '<div style="width:7px;height:7px;border-radius:50%;background:#003F87;flex-shrink:0;margin-top:5px;"></div>' : ''}
      </div>
    `).join("");
  }

  async function loadNotifs(userId) {
    const res = await fetch(`${SUP_URL}/rest/v1/notifications?user_id=eq.${userId}&order=created_at.desc&limit=30`, {
      headers: { "apikey": SUP_KEY, "Authorization": "Bearer " + SUP_KEY }
    });
    if (res.ok) {
      allNotifs = await res.json();
      renderNotifs();
    }
  }

  async function subscribeRealtime(userId) {
    if (!supClient) return;
    notifChannel = supClient.channel("notifications:" + userId)
      .on("postgres_changes", {
        event: "INSERT", schema: "public",
        table: "notifications", filter: "user_id=eq." + userId
      }, (payload) => {
        allNotifs.unshift(payload.new);
        renderNotifs();
        playSound();
      }).subscribe();
  }

  window.readNotif = async function(id) {
    allNotifs = allNotifs.map(n => n.id === id ? {...n, read: true} : n);
    renderNotifs();
    await fetch(`${SUP_URL}/rest/v1/notifications?id=eq.${id}`, {
      method: "PATCH",
      headers: { "apikey": SUP_KEY, "Authorization": "Bearer " + SUP_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ read: true })
    });
  };

  window.markAllRead = async function() {
    const userId = window._currentUserId;
    if (!userId) return;
    allNotifs = allNotifs.map(n => ({...n, read: true}));
    renderNotifs();
    await fetch(`${SUP_URL}/rest/v1/notifications?user_id=eq.${userId}&read=eq.false`, {
      method: "PATCH",
      headers: { "apikey": SUP_KEY, "Authorization": "Bearer " + SUP_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ read: true })
    });
  };

  window.toggleNotifPanel = function() {
    const panel = document.getElementById("notif-panel");
    panel.style.display = panel.style.display === "flex" ? "none" : "flex";
  };

  document.addEventListener("click", function(e) {
    const btn = document.getElementById("notif-btn");
    const panel = document.getElementById("notif-panel");
    if (panel && btn && !btn.contains(e.target) && !panel.contains(e.target)) {
      panel.style.display = "none";
    }
  });

  function playSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; osc.type = "sine";
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(); osc.stop(ctx.currentTime + 0.25);
    } catch(_) {}
  }

  async function init() {
    supClient = window._supabaseClient || supabase.createClient(SUP_URL, SUP_KEY);
    window._supabaseClient = supClient;
    const { data: { user } } = await supClient.auth.getUser();
    if (!user) return;
    window._currentUserId = user.id;
    await loadNotifs(user.id);
    await subscribeRealtime(user.id);
  }

  if (typeof supabase !== "undefined") {
    init();
  } else {
    window.addEventListener("load", init);
  }
})();
</script>
