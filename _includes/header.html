<style>
    /* ===== HEADER ===== */
    .main-header { box-shadow:0 2px 15px rgba(0,0,0,0.1); position:sticky; top:0; z-index:1000; width: 100%; background: #fff; }
    .top-bar { background:#111; color:#fff; padding:6px 0; font-size:11px; font-weight:600; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .top-bar .container { display:flex; justify-content:space-between; align-items:center; padding: 0 15px; }
    .top-bar-links { display:flex; gap:10px; }
    .top-bar a { color:#ccc; text-decoration:none; }

    .header-main {
        padding:10px 0;
        background: linear-gradient(90deg, #ffffff, #fff1f1, #e0f2fe, #fff1f1, #ffffff);
        background-size: 200% 100%;
        animation: move-right 10s linear infinite;
        border-bottom: 1px solid #eee;
    }
    @keyframes move-right { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

    .header-main .container { display:flex; align-items:center; justify-content: space-between; padding: 0 15px; gap: 10px; }

    .logo { display:flex; align-items:center; gap:8px; text-decoration:none; flex-shrink:0; }
    .logo img { height:34px; width:auto; }
    .logo span { font-size:18px; font-weight:900; font-family:'Sora', sans-serif;
      background:linear-gradient(135deg,#ff4747,#ff8c42);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; white-space:nowrap; }

    /* ── SEARCH ── */
    .search-wrap { flex:1; max-width:500px; position:relative; margin: 0 15px; }
    .search-form { display:flex; border:2px solid #eee; border-radius:50px; overflow:hidden; background: #fff; height: 42px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .search-form input { flex:1; padding:0 15px; border:none; outline:none; font-size:13px; background: transparent; font-family: inherit; }
    .search-form button { padding:0 20px; background:#ff4747; border:none; color:white; font-weight:700; cursor:pointer; font-size: 13px; border-radius: 0 50px 50px 0; }
    .search-form:focus-within { border-color: #ff4747; box-shadow: 0 4px 20px rgba(255,71,71,0.15); }

    /* ── SEARCH RESULTS DROPDOWN ── */
    #search-results {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        left: 0; right: 0;
        background: white;
        border-radius: 18px;
        box-shadow: 0 16px 48px rgba(0,0,0,0.14);
        border: 1.5px solid #f1f5f9;
        overflow: hidden;
        z-index: 9999;
        max-height: 420px;
        overflow-y: auto;
    }
    #search-results::-webkit-scrollbar { width: 4px; }
    #search-results::-webkit-scrollbar-thumb { background: #f1f5f9; border-radius: 4px; }

    .search-result-item {
        display: flex; align-items: center; gap: 12px;
        padding: 12px 16px; text-decoration: none;
        border-bottom: 1px solid #f8fafc; transition: 0.15s;
        cursor: pointer;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #fff5f5; }
    .search-result-img {
        width: 46px; height: 46px; border-radius: 10px;
        object-fit: cover; flex-shrink: 0; background: #f1f5f9;
    }
    .search-result-title { font-size: 13px; font-weight: 700; color: #0f172a; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .search-result-price { font-size: 12px; font-weight: 900; color: #ff4747; }
    .search-result-cat { font-size: 10px; color: #64748b; font-weight: 600; margin-left: auto; flex-shrink: 0; }

    .search-no-result { padding: 24px; text-align: center; color: #64748b; font-size: 13px; font-weight: 600; }
    .search-loading { padding: 20px; text-align: center; color: #94a3b8; font-size: 13px; }

    /* Header actions */
    .header-actions { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .btn-auth { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; text-decoration: none; padding: 9px 16px; border-radius: 50px; transition: all 0.3s ease; text-transform: uppercase; }
    .btn-login { background: #0f172a; color: white; box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2); }
    .btn-signup { background: linear-gradient(135deg, #ff4747, #ff8c42); color: white; box-shadow: 0 4px 12px rgba(255, 71, 71, 0.3); }

    .site-nav { background: linear-gradient(270deg, #ffffff, #f0f9ff, #e5e7eb, #f0f9ff, #ffffff); background-size: 200% 100%; animation: move-left 10s linear infinite; border-bottom: 1px solid #eee; }
    @keyframes move-left { 0% { background-position: 200% 50%; } 100% { background-position: 0% 50%; } }
    .nav-scroll { display:flex; gap:18px; padding:12px 15px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; align-items: center; }
    .nav-lnk { text-decoration: none; color: #475569; font-size: 13px; font-weight: 700; transition: 0.3s; }
    .nav-lnk:hover { color: #ff4747; transform: translateY(-2px); }

    .act-btn { display:flex; flex-direction:column; align-items:center; background:none; border:none; cursor:pointer; color:#333; position:relative; padding: 0; }
    .cart-badge { position:absolute; top:-7px; right:-7px; background:#ff4747; color:white; border-radius:50%; width:18px; height:18px; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; border: 2px solid white; }

    @keyframes shake-bell { 0% { transform: rotate(0); } 15% { transform: rotate(15deg); } 30% { transform: rotate(-15deg); } 45% { transform: rotate(10deg); } 60% { transform: rotate(-10deg); } 75% { transform: rotate(5deg); } 85% { transform: rotate(-5deg); } 100% { transform: rotate(0); } }
    .bell-ring { animation: shake-bell 0.5s ease-in-out infinite; }

    @media (max-width: 768px) {
      .top-bar { display: none; }
      .header-main .container { flex-wrap: wrap; justify-content: space-between; }
      .search-wrap { order: 3; max-width: 100%; margin: 8px 0 4px; flex: 0 0 100%; }
    }
</style>

<header class="main-header">
    <div class="top-bar">
        <div class="container">
            <span>🚀 Livraison rapid nan tout peyi a 🇭🇹</span>
            <div class="top-bar-links">
                <a href="/regleman.html" style="color:#ff4747;">📜 Regleman</a>
                <a href="https://wa.me/50948868964" target="_blank">💬 WhatsApp</a>
            </div>
        </div>
    </div>

    <div class="header-main">
        <div class="container">
            <a href="/" class="logo">
                <img src="/assets/images/logo.png" alt="Boutique Piyay">
                <span>BOUTIQUE PIYAY</span>
            </a>

            <!-- SEARCH -->
            <div class="search-wrap">
                <form class="search-form" onsubmit="return false;">
                    <input type="text" id="search-input" placeholder="Chèche yon pwodwi..."
                           oninput="headerSearch(this.value)"
                           autocomplete="off">
                    <button type="submit" onclick="headerSearch(document.getElementById('search-input').value)">OK</button>
                </form>
                <!-- RESULTS DROPDOWN -->
                <div id="search-results"></div>
            </div>

            <div class="header-actions">
                <div id="authLinks" style="display: flex; gap: 8px;">
                    <a href="/login.html" class="btn-auth btn-login">🔑 Kont</a>
                    <a href="/signup.html" class="btn-auth btn-signup">✨ Enskri</a>
                </div>
                <div id="userInfo" style="display: none; gap: 8px;">
                    <a id="btn-customer-account" href="/account/" class="btn-auth btn-login" style="background:#003F87; display:none;">👤 Mwen</a>
                    <a id="btn-merchant-dash" href="/dashboard.html" class="btn-auth btn-login" style="background:#ff4747; display:none;">📊 Dashboard</a>
                    <button onclick="handleHeaderLogout()" class="btn-auth btn-login" style="background:#475569; border:none; cursor:pointer;">🚪</button>
                </div>
                <button class="act-btn" id="notif-bell-btn">
                    <span id="bell-icon" style="font-size:20px;">🔔</span>
                    <div class="cart-badge" id="notif-count" style="display:none;">0</div>
                </button>
                <button class="act-btn" onclick="openCart()">
                    <span>🛒</span>
                    <div class="cart-badge" id="cart-count" style="display:none;">0</div>
                </button>
            </div>
        </div>
    </div>

    <nav class="site-nav">
        <div class="nav-scroll">
            <a href="/" class="nav-lnk">Tout Pwodwi</a>
            <a href="/shop/" class="nav-lnk" style="color:#ff4747; font-weight:900;">🛍️ BOUTIK</a>
            <a href="/vendre.html" class="nav-lnk" style="color:#2563eb; font-weight:900;">🚀 Vann pa w</a>
            <a href="/affiliate.html" class="nav-lnk" style="color:#10b981; font-weight:900;">💸 Afilyasyon</a>
            {% for cat in site.categories %}<a href="{{ cat.url }}" class="nav-lnk">{{ cat.display_name | default: cat.title }}</a>{% endfor %}
        </div>
    </nav>
</header>

<script>
    /* ── SEARCH ── */
    let staticData = [];
    let searchTimer = null;

    // Itilize kliyan global ki nan main.js (supabaseMain)
    const getSup = () => (typeof supabaseMain !== 'undefined') ? supabaseMain : null;

    fetch('/search.json')
      .then(r => r.ok ? r.json() : [])
      .then(d => { staticData = d || []; })
      .catch(() => { staticData = []; });

    async function headerSearch(query) {
      const resultsDiv = document.getElementById('search-results');
      query = (query || '').trim().toLowerCase();
      if (query.length < 2) { resultsDiv.style.display = 'none'; return; }

      clearTimeout(searchTimer);
      resultsDiv.innerHTML = '<div class="search-loading">🔍 Ap chèche...</div>';
      resultsDiv.style.display = 'block';

      searchTimer = setTimeout(async () => {
        let results = staticData.filter(p =>
          (p.title || '').toLowerCase().includes(query) ||
          (p.category || '').toLowerCase().includes(query)
        );

        const sup = getSup();
        if (sup) {
          try {
            const { data: dbResults } = await sup
              .from('user_products')
              .select('id, title, price, image_url, category')
              .ilike('title', `%${query}%`)
              .eq('is_approved', true)
              .limit(8);

            if (dbResults) {
              dbResults.forEach(p => {
                if (!results.find(r => r.url && r.url.includes(p.id))) {
                  results.push({
                    title: p.title,
                    url: `/pwodwi-machann.html?id=${p.id}`,
                    price: p.price,
                    image: p.image_url,
                    category: p.category
                  });
                }
              });
            }
          } catch(e) {}
        }

        if (results.length === 0) {
          resultsDiv.innerHTML = `<div class="search-no-result">😔 Okenn rezilta pou "<b>${query}</b>"</div>`;
          return;
        }

        resultsDiv.innerHTML = results.slice(0, 8).map(p => `
          <a href="${p.url || '#'}" class="search-result-item">
            <img class="search-result-img" src="${p.image || '/assets/images/logo.png'}" onerror="this.src='/assets/images/logo.png'">
            <div style="flex:1; min-width:0;">
              <div class="search-result-title">${p.title}</div>
              <div class="search-result-price">${p.price} HTG</div>
            </div>
          </a>`).join('');
      }, 300);
    }

    /* ── AUTH ── */
    async function updateHeaderAuth() {
      const sup = getSup();
      if (!sup) return setTimeout(updateHeaderAuth, 500);

      const { data: { user } } = await sup.auth.getUser();
      const authLinks  = document.getElementById('authLinks');
      const userInfo   = document.getElementById('userInfo');
      const btnCustomer = document.getElementById('btn-customer-account');
      const btnMerchant = document.getElementById('btn-merchant-dash');

      if (user) {
        authLinks.style.display = 'none';
        userInfo.style.display  = 'flex';
        const { data: profile } = await sup.from('profiles').select('role').eq('id', user.id).maybeSingle();
        if (profile && profile.role === 'seller') {
          btnMerchant.style.display = 'flex';
        } else {
          btnCustomer.style.display = 'flex';
        }
      }
    }

    async function handleHeaderLogout() {
      const sup = getSup();
      if (sup) await sup.auth.signOut();
      window.location.href = '/';
    }

    document.addEventListener('DOMContentLoaded', updateHeaderAuth);
</script>
