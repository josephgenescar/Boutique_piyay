<style>
    /* ===== HEADER ===== */
    .main-header { box-shadow:0 2px 15px rgba(0,0,0,0.1); position:sticky; top:0; z-index:1000; width: 100%; background: #fff; }
    .top-bar { background:#111; color:#fff; padding:6px 0; font-size:11px; font-weight:600; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .top-bar .container { display:flex; justify-content:space-between; align-items:center; padding: 0 15px; }
    .top-bar-links { display:flex; gap:15px; }
    .top-bar a { color:#ccc; text-decoration:none; display: flex; align-items: center; gap: 5px; }
    .top-bar a:hover { color:#fff; }

    .header-main {
        padding:10px 0;
        background: linear-gradient(90deg, #ffffff, #fff1f1, #e0f2fe, #fff1f1, #ffffff);
        background-size: 200% 100%;
        animation: move-right 10s linear infinite;
        border-bottom: 1px solid #eee;
    }
    @keyframes move-right { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

    .header-main .container { display:flex; align-items:center; justify-content: space-between; padding: 0 15px; gap: 10px; }

    .logo { display:flex; align-items:center; gap:8px; text-decoration:none; flex-shrink:0; }
    .logo img { height:34px; width:auto; }
    .logo span { font-size:18px; font-weight:900; font-family:'Sora', sans-serif;
      background:linear-gradient(135deg,#ff4747,#ff8c42);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; white-space:nowrap; }

    /* ── SEARCH ── */
    .search-wrap { flex:1; max-width:550px; position:relative; margin: 0 15px; }
    .search-form { display:flex; border:2px solid #eee; border-radius:50px; overflow:hidden; background: #fff; height: 42px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .search-form input { flex:1; padding:0 15px; border:none; outline:none; font-size:13px; background: transparent; font-family: inherit; }
    .search-form button { padding:0 20px; background:#ff4747; border:none; color:white; font-weight:700; cursor:pointer; font-size: 13px; border-radius: 0 50px 50px 0; }

    /* Header actions */
    .header-actions { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .btn-auth { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; text-decoration: none; padding: 9px 16px; border-radius: 50px; transition: all 0.3s ease; text-transform: uppercase; }
    .btn-login { background: #0f172a; color: white; box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2); }
    .btn-signup { background: linear-gradient(135deg, #ff4747, #ff8c42); color: white; box-shadow: 0 4px 12px rgba(255, 71, 71, 0.3); }

    .site-nav { background: linear-gradient(270deg, #ffffff, #f0f9ff, #e5e7eb, #f0f9ff, #ffffff); background-size: 200% 100%; animation: move-left 10s linear infinite; border-bottom: 1px solid #eee; }
    .nav-scroll { display:flex; gap:18px; padding:12px 15px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; align-items: center; }
    .nav-lnk { text-decoration: none; color: #475569; font-size: 13px; font-weight: 700; transition: 0.3s; }
    .nav-lnk:hover { color: #ff4747; transform: translateY(-2px); }

    .act-btn { display:flex; flex-direction:column; align-items:center; background:none; border:none; cursor:pointer; color:#333; position:relative; padding: 0; }
    .cart-badge { position:absolute; top:-7px; right:-7px; background:#ff4747; color:white; border-radius:50%; width:18px; height:18px; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; border: 2px solid white; }

    @media (max-width: 768px) {
      .top-bar { display: none; }
      .header-main .container { flex-wrap: wrap; justify-content: space-between; }
      .search-wrap { order: 3; max-width: 100%; margin: 8px 0 4px; flex: 0 0 100%; }
    }
</style>

<header class="main-header">
    <div class="top-bar">
        <div class="container">
            <span>🚀 Livraison rapid nan tout peyi a 🇭🇹</span>
            <div class="top-bar-links">
                <a href="/kontak.html"><i class="fas fa-envelope"></i>  Kontak</a>
                <a href="/regleman.html" style="color:#ff4747;"><i class="fas fa-file-alt"></i>  Regleman</a>
            </div>
        </div>
    </div>

    <div class="header-main">
        <div class="container">
            <a href="/" class="logo">
                <img src="/assets/images/logo.png" alt="Boutique Piyay">
                <span>BOUTIQUE PIYAY</span>
            </a>

            <!-- SEARCH -->
            <div class="search-wrap">
                <form class="search-form" onsubmit="return false;">
                    <input type="text" id="search-input" placeholder="Chèche yon pwodwi..."
                           oninput="if(window.liveSearch) window.liveSearch(this.value)"
                           autocomplete="off">
                    <button type="submit" onclick="if(window.liveSearch) window.liveSearch(document.getElementById('search-input').value)">OK</button>
                </form>
                <div id="search-results"></div>
            </div>

            <div class="header-actions">
                <div id="authLinks" style="display: flex; gap: 8px;">
                    <a href="/login.html" class="btn-auth btn-login">🔑 Kont</a>
                    <a href="/signup.html" class="btn-auth btn-signup">✨ Enskri</a>
                </div>
                <div id="userInfo" style="display: none; gap: 8px;">
                    <a id="btn-customer-account" href="/account/" class="btn-auth btn-login" style="background:#003F87; display:none;">👤 Mwen</a>
                    <a id="btn-merchant-dash" href="/dashboard.html" class="btn-auth btn-login" style="background:#ff4747; display:none;">📊 Dashboard</a>
                    <button onclick="handleHeaderLogout()" class="btn-auth btn-login" style="background:#475569; border:none; cursor:pointer;">🚪</button>
                </div>
                <button class="act-btn" id="notif-bell-btn">
                    <span id="bell-icon" style="font-size:20px;">🔔</span>
                    <div class="cart-badge" id="notif-count" style="display:none;">0</div>
                </button>
                <button class="act-btn" onclick="openCart()">
                    <span>🛒</span>
                    <div class="cart-badge" id="cart-count" style="display:none;">0</div>
                </button>
            </div>
        </div>
    </div>

    <nav class="site-nav">
        <div class="nav-scroll">
            <a href="/" class="nav-lnk">Tout Pwodwi</a>
            <a href="/shop/" class="nav-lnk" style="color:#ff4747; font-weight:900;">🛍️ BOUTIK</a>
            <a href="/vendre.html" class="nav-lnk" style="color:#2563eb; font-weight:900;">🚀 Vann pa w</a>
            <a href="/affiliate.html" class="nav-lnk" style="color:#10b981; font-weight:900;">💸 Afilyasyon</a>
            {% for cat in site.categories %}<a href="{{ cat.url }}" class="nav-lnk">{{ cat.display_name | default: cat.title }}</a>{% endfor %}
        </div>
    </nav>
</header>
